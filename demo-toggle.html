<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TimelessHouse — Toggle raffiné</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #e8e9ec;
      --surface: #f1f2f5;
      --text:    #1a1a1d;
      --muted:   #72737a;
      --faint:   #a1a1aa;
      --accent:  #b08968;
      --sh-r:  10px 10px 24px rgba(166,171,189,0.45), -10px -10px 24px rgba(255,255,255,0.95);
      --sh-xs: 3px 3px 7px rgba(166,171,189,0.3), -3px -3px 7px rgba(255,255,255,0.85);
    }
    [data-theme="dark"] {
      --bg:      #1c1d21;
      --surface: #23242a;
      --text:    #e2e3e8;
      --muted:   #9899a0;
      --faint:   #5a5b62;
      --accent:  #c9a07a;
      --sh-r:  10px 10px 24px rgba(0,0,0,0.55), -5px -5px 15px rgba(45,47,58,0.28);
      --sh-xs: 3px 3px 7px rgba(0,0,0,0.42), -2px -2px 5px rgba(45,47,58,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 48px; padding: 60px 24px;
      transition: background 0.55s cubic-bezier(0.65,0.05,0.35,1),
                  color 0.55s cubic-bezier(0.65,0.05,0.35,1);
    }

    /* ══════════════════════════════════════
       TOGGLE — fin + arc SVG qui voyage
    ══════════════════════════════════════ */
    .th-toggle {
      display: inline-block;
      width: 42px; height: 22px;
      border-radius: 11px;
      background: linear-gradient(145deg, #28282c, #323236);
      position: relative;
      border: none; cursor: pointer; padding: 0;
      flex-shrink: 0;
      box-shadow:
        inset 0 1.5px 4px rgba(0,0,0,0.6),
        inset 0 -1px 1px rgba(255,255,255,0.03),
        0 1px 2px rgba(0,0,0,0.25);
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: box-shadow 0.4s ease;
    }
    .th-toggle:focus-visible {
      box-shadow: inset 0 1.5px 4px rgba(0,0,0,0.6),
                  0 0 0 3px rgba(176,137,104,0.45);
    }
    .th-arc-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      overflow: visible;
      pointer-events: none;
      display: block;
    }
    .th-arc {
      fill: none;
      stroke: rgba(135,135,140,0.75);  /* JOUR : C foncé */
      stroke-width: 2.4;
      stroke-dasharray: 50 50;
      stroke-dashoffset: -9.8;
      transition:
        stroke-dashoffset 0.7s cubic-bezier(0.65,0.05,0.35,1),
        stroke 0.7s cubic-bezier(0.65,0.05,0.35,1);
    }
    .th-toggle.is-dark .th-arc {
      stroke: rgba(255,255,255,0.92);  /* NUIT : C blanc */
    }

    /* ─── Logo & nav ─── */
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text); transition: color 0.55s ease;
    }
    .logo em { color: var(--accent); font-style: normal; }

    .fake-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); box-shadow: var(--sh-r);
      border-radius: 20px; padding: 16px 28px;
      width: min(680px, 90vw);
      transition: background 0.55s ease, box-shadow 0.55s ease;
    }
    .nav-links { display: flex; gap: 24px; }
    .nav-link {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); cursor: pointer;
      transition: color 0.3s;
    }
    .nav-link.active { color: var(--accent); }
    .nav-actions { display: flex; align-items: center; gap: 14px; }
    .badge {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 99px;
      background: var(--accent); color: white;
    }

    .toggle-row {
      display: flex; align-items: center; gap: 20px;
      background: var(--surface); box-shadow: var(--sh-r);
      border-radius: 28px; padding: 22px 36px;
      transition: background 0.55s ease, box-shadow 0.55s ease;
    }
    .toggle-hint {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--faint); transition: color 0.55s ease;
    }
    .mode-label {
      font-family: 'Instrument Serif', serif;
      font-style: italic; font-size: 20px;
      color: var(--text); min-width: 50px;
      transition: color 0.55s ease;
    }

    .cards { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: var(--surface); box-shadow: var(--sh-r);
      border-radius: 24px; padding: 26px; width: 200px;
      transition: background 0.55s ease, box-shadow 0.55s ease;
    }
    .card-icon {
      width: 42px; height: 42px; border-radius: 14px;
      background: var(--bg); box-shadow: var(--sh-xs);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 14px;
      transition: background 0.55s ease, box-shadow 0.55s ease;
    }
    .card-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--faint); margin-bottom: 6px;
      transition: color 0.55s ease;
    }
    .card-value {
      font-family: 'Instrument Serif', serif;
      font-size: 30px; color: var(--text);
      transition: color 0.55s ease;
    }
    .card-delta { font-size: 11px; font-weight: 700; color: #10b981; margin-top: 6px; }

    .caption {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--faint); transition: color 0.55s ease;
      text-align: center; line-height: 1.8;
    }
    .caption strong { color: var(--accent); }
  </style>
</head>
<body>

  <div class="logo">Timeless<em>House</em></div>

  <!-- Nav avec toggle intégré -->
  <nav class="fake-nav">
    <div class="logo" style="font-size:16px;letter-spacing:0.15em">
      Timeless<em>House</em>
    </div>
    <div class="nav-links">
      <span class="nav-link active">Mariage</span>
      <span class="nav-link">Portfolio</span>
      <span class="nav-link">Contact</span>
    </div>
    <div class="nav-actions">
      <span class="badge">Mon espace</span>
      <button class="th-toggle js-toggle" role="switch" aria-checked="false">
        <svg class="th-arc-svg" viewBox="0 0 42 22" preserveAspectRatio="none" aria-hidden="true">
          <rect class="th-arc" x="1.2" y="1.2" width="39.6" height="19.6"
                rx="9.8" ry="9.8" pathLength="100"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Toggle principal avec état affiché -->
  <div class="toggle-row">
    <span class="toggle-hint">Thème</span>
    <button class="th-toggle js-toggle" role="switch" aria-checked="false">
      <svg class="th-arc-svg" viewBox="0 0 42 22" preserveAspectRatio="none" aria-hidden="true">
        <rect class="th-arc" x="1.2" y="1.2" width="39.6" height="19.6"
              rx="9.8" ry="9.8" pathLength="100"/>
      </svg>
    </button>
    <span class="mode-label" id="mode-label">Jour</span>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">📷</div>
      <div class="card-label">Médias livrés</div>
      <div class="card-value">142</div>
      <div class="card-delta">↑ +12 ce mois</div>
    </div>
    <div class="card">
      <div class="card-icon">📅</div>
      <div class="card-label">Tournages</div>
      <div class="card-value">3</div>
    </div>
    <div class="card">
      <div class="card-icon">💰</div>
      <div class="card-label">Revenus</div>
      <div class="card-value">8 900€</div>
      <div class="card-delta">↑ +8,4%</div>
    </div>
  </div>

  <p class="caption">
    Le C voyage par <strong>le haut</strong> en passant en mode nuit<br>
    et par <strong>le bas</strong> en revenant au mode jour
  </p>

  <script>
    var STEP = 50;
    var INITIAL = -9.8;
    var KEY = 'th-dark-mode';
    var OFFSET_KEY = 'th-c-offset';

    var savedOffset = parseFloat(localStorage.getItem(OFFSET_KEY));
    var cOffset = isNaN(savedOffset) ? INITIAL : savedOffset;
    var isDark = localStorage.getItem(KEY) === 'dark';

    // État initial sans animation
    document.querySelectorAll('.th-arc').forEach(function(arc) {
      arc.style.transition = 'none';
      arc.style.strokeDashoffset = cOffset;
      arc.getBoundingClientRect();
    });

    if (isDark) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.querySelectorAll('.th-toggle').forEach(function(t) { t.classList.add('is-dark'); });
      document.getElementById('mode-label').textContent = 'Nuit';
    }

    // Réactive les transitions à la prochaine frame
    requestAnimationFrame(function() {
      document.querySelectorAll('.th-arc').forEach(function(arc) {
        arc.style.transition = '';
      });
    });

    function apply(dark) {
      var wasDark = isDark;
      isDark = dark;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.querySelectorAll('.th-toggle').forEach(function(t) {
        t.classList.toggle('is-dark', dark);
        t.setAttribute('aria-checked', String(dark));
      });
      document.getElementById('mode-label').textContent = dark ? 'Nuit' : 'Jour';
      try { localStorage.setItem(KEY, dark ? 'dark' : 'light'); } catch(e) {}

      if (wasDark !== dark) {
        cOffset += STEP;
        try { localStorage.setItem(OFFSET_KEY, cOffset); } catch(e) {}
        document.querySelectorAll('.th-arc').forEach(function(arc) {
          arc.style.strokeDashoffset = cOffset;
        });
      }
    }

    function toggle() { apply(!isDark); }
    document.querySelectorAll('.js-toggle').forEach(function(btn) {
      btn.addEventListener('click', toggle);
    });
  </script>
</body>
</html>
