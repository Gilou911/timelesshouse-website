<!DOCTYPE html>
<html lang="fr" data-theme="noir">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <!-- Galeries privées : jamais indexées. -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Ta galerie photobooth — TimelessHouse" />
  <title>Ta galerie photobooth — TimelessHouse</title>

  <!-- Aperçu quand le lien est partagé (WhatsApp, iMessage…) : visuel de
       marque, jamais les photos privées de l'invité. -->
  <meta property="og:title" content="Ta galerie photobooth — TimelessHouse" />
  <meta property="og:description" content="Tes photos de la soirée, prêtes à télécharger." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://timelesshouse.org/og-photobooth.jpg?v=1" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/png" href="/favicon-th.png?v=1" />
  <!-- Épinglage sur l'écran d'accueil : vraie icône TimelessHouse. -->
  <link rel="apple-touch-icon" href="/apple-touch-icon-th.png?v=1" />
  <link rel="manifest" href="/photobooth.webmanifest?v=1" />
  <meta name="apple-mobile-web-app-title" content="Ma galerie" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ── Palettes : parité exacte avec event-photos-cinematic ── */
    :root {
      --bg: #0a0a0a; --bg-deep: #050505; --bg-elev: #111110;
      --ink: #f4f0eb; --ink-soft: #a39c8f; --ink-dim: #5a554b;
      --accent: #b08968; --accent-dk: #97714f; --accent-gl: rgba(176,137,104,0.14);
      --line: rgba(244,240,235,0.10); --line-soft: rgba(244,240,235,0.06);
      --gap: 10px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --shadow: 0 30px 90px rgba(0,0,0,0.7);
    }
    [data-theme="creme"] {
      --bg:#f3eee7; --bg-deep:#ece5db; --bg-elev:#e7e0d6;
      --ink:#1a1714; --ink-soft:#6b6560; --ink-dim:#a39d95;
      --accent:#8b6a48; --accent-dk:#74552f; --accent-gl:rgba(139,106,72,0.12);
      --line:rgba(26,23,20,0.10); --line-soft:rgba(26,23,20,0.06);
      --shadow:0 30px 90px rgba(0,0,0,0.18);
    }
    [data-theme="ardoise"] {
      --bg:#13161c; --bg-deep:#0d1014; --bg-elev:#1a1e26;
      --ink:#e8eaef; --ink-soft:#828a98; --ink-dim:#4a505a;
      --accent:#7fa0bd; --accent-dk:#6585a0; --accent-gl:rgba(127,160,189,0.15);
      --line:rgba(232,234,239,0.09); --line-soft:rgba(232,234,239,0.05);
    }
    [data-theme="fumee"] {
      --bg:#1a1714; --bg-deep:#131110; --bg-elev:#221e1a;
      --ink:#ece5da; --ink-soft:#9c9286; --ink-dim:#5d5549;
      --accent:#b1916f; --accent-dk:#957653; --accent-gl:rgba(177,145,111,0.13);
      --line:rgba(236,229,218,0.09); --line-soft:rgba(236,229,218,0.05);
    }
    [data-theme="encre"] {
      --bg:#0d0f14; --bg-deep:#090a0e; --bg-elev:#161922;
      --ink:#e6e8ee; --ink-soft:#8b909e; --ink-dim:#4d525e;
      --accent:#8a93a6; --accent-dk:#6f7889; --accent-gl:rgba(138,147,166,0.14);
      --line:rgba(230,232,238,0.09); --line-soft:rgba(230,232,238,0.05);
    }
    [data-theme="sapin"] {
      --bg:#0c0f0d; --bg-deep:#080a09; --bg-elev:#141813;
      --ink:#e7ebe4; --ink-soft:#8a9387; --ink-dim:#4e564b;
      --accent:#8a9c84; --accent-dk:#6f8169; --accent-gl:rgba(138,156,132,0.13);
      --line:rgba(231,235,228,0.08); --line-soft:rgba(231,235,228,0.05);
    }
    [data-theme="lin"] {
      --bg:#f1ece3; --bg-deep:#e9e2d6; --bg-elev:#e5ddcf;
      --ink:#2b2620; --ink-soft:#7a7164; --ink-dim:#a89e8d;
      --accent:#8a7458; --accent-dk:#6f5b41; --accent-gl:rgba(138,116,88,0.12);
      --line:rgba(43,38,32,0.10); --line-soft:rgba(43,38,32,0.05);
      --shadow:0 30px 90px rgba(0,0,0,0.16);
    }
    [data-theme="sauge"] {
      --bg:#e8ebe4; --bg-deep:#dfe3d9; --bg-elev:#dbe0d3;
      --ink:#242821; --ink-soft:#6f766a; --ink-dim:#9aa090;
      --accent:#6e7d63; --accent-dk:#58654f; --accent-gl:rgba(110,125,99,0.12);
      --line:rgba(36,40,33,0.10); --line-soft:rgba(36,40,33,0.05);
      --shadow:0 30px 90px rgba(0,0,0,0.14);
    }
    [data-theme="brume"] {
      --bg:#e9ebee; --bg-deep:#e0e3e7; --bg-elev:#dde0e5;
      --ink:#21252b; --ink-soft:#6c7480; --ink-dim:#97a0ac;
      --accent:#6b7785; --accent-dk:#56616e; --accent-gl:rgba(107,119,133,0.12);
      --line:rgba(33,37,43,0.10); --line-soft:rgba(33,37,43,0.05);
      --shadow:0 30px 90px rgba(0,0,0,0.14);
    }
    [data-theme="bordeaux"] {
      --bg:#45100f; --bg-deep:#2c0a0a; --bg-elev:#531818;
      --ink:#f3e7e0; --ink-soft:#b89a90; --ink-dim:#7a5953;
      --accent:#d2b48c; --accent-dk:#b2916a; --accent-gl:rgba(210,180,140,0.16);
      --line:rgba(243,231,224,0.10); --line-soft:rgba(243,231,224,0.05);
    }
    [data-theme="acajou"] {
      --bg:#2a1812; --bg-deep:#1a0f0b; --bg-elev:#3a241b;
      --ink:#efe4d9; --ink-soft:#b59a88; --ink-dim:#745b4b;
      --accent:#c98a5e; --accent-dk:#a96f47; --accent-gl:rgba(201,138,94,0.15);
      --line:rgba(239,228,217,0.09); --line-soft:rgba(239,228,217,0.05);
    }
    [data-theme="foret"] {
      --bg:#0e2118; --bg-deep:#07140e; --bg-elev:#173025;
      --ink:#e7efe7; --ink-soft:#8fa596; --ink-dim:#4f6356;
      --accent:#c2a878; --accent-dk:#a48a5b; --accent-gl:rgba(194,168,120,0.15);
      --line:rgba(231,239,231,0.08); --line-soft:rgba(231,239,231,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Jost", sans-serif; font-weight: 300;
      background: var(--bg); color: var(--ink);
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;  /* coupe le pull-to-refresh parasite */
      touch-action: manipulation;      /* supprime le délai double-tap (300ms) */
    }
    body.no-scroll { overflow: hidden; }
    ::selection { background: var(--accent); color: var(--bg); }
    :focus-visible { outline: 1px solid var(--accent); outline-offset: 3px; }
    img { -webkit-user-drag: none; user-select: none; }
    button { font-family: inherit; }

    /* Grain cinéma */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 3;
      opacity: 0.035; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    /* ── Loader ── */
    .boot {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg-deep);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 1s var(--ease), visibility 1s var(--ease);
    }
    .boot.gone { opacity: 0; visibility: hidden; pointer-events: none; }
    .boot-mark {
      font-family: "Cormorant Garamond", serif; font-style: italic;
      font-size: 1.7rem; color: var(--accent); letter-spacing: 0.06em;
      opacity: 0; animation: bootIn 1.1s var(--ease) 0.15s forwards;
    }
    .boot-mark span { color: var(--ink-dim); }
    .boot-line {
      width: 1px; height: 0; background: var(--accent); margin: 22px auto 0;
      animation: bootLine 1.5s var(--ease) 0.5s forwards;
    }
    @keyframes bootIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
    @keyframes bootLine { to { height: 54px; } }

    /* ── Héro ── */
    .cover {
      position: relative; height: 92svh; min-height: 520px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden; text-align: center;
    }
    .cover-bg {
      position: absolute; inset: -4%;
      background-size: cover; background-position: center;
      transform: scale(1.06);
      animation: kenburns 26s ease-out infinite alternate;
      filter: brightness(0.5) saturate(1.05);
    }
    .is-light .cover-bg { filter: brightness(0.62) saturate(1.02); }
    @keyframes kenburns {
      from { transform: scale(1.06) translate(0,0); }
      to   { transform: scale(1.16) translate(-1.5%, -2%); }
    }
    .cover::after {
      content: ""; position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.45) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 25%, transparent 60%, rgba(0,0,0,0.55) 100%);
    }
    .cover.no-photo { height: 72svh; }
    .cover.no-photo .cover-bg, .cover.no-photo::after { display: none; }
    .cover.no-photo .cover-inner { color: var(--ink); }
    .cover.no-photo h1 { text-shadow: none; }
    .cover.no-photo .cover-photog, .cover.no-photo .cover-meta { color: var(--ink-soft); }

    .cover-inner { position: relative; z-index: 2; padding: 0 24px; color: #fff; }
    .cover-photog {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.42em;
      color: rgba(255,255,255,0.78); margin-bottom: 30px; display: inline-block;
      opacity: 0; animation: rise 1.3s var(--ease) 0.5s forwards;
    }
    .cover h1 {
      font-family: "Cormorant Garamond", serif; font-weight: 300; font-style: italic;
      font-size: clamp(2.8rem, 10vw, 7.5rem); line-height: 0.98;
      text-shadow: 0 4px 40px rgba(0,0,0,0.4);
      opacity: 0; animation: rise 1.5s var(--ease) 0.8s forwards;
    }
    .cover-meta {
      margin-top: 26px; font-size: 11.5px; text-transform: uppercase;
      letter-spacing: 0.4em; color: rgba(255,255,255,0.82);
      display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap;
      opacity: 0; animation: rise 1.3s var(--ease) 1.1s forwards;
    }
    .cover-meta i { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
    @keyframes rise { from { opacity:0; transform: translateY(26px); } to { opacity:1; transform:none; } }

    .cover-scroll {
      position: absolute; bottom: 30px; left: 0; right: 0; z-index: 2;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.75);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.34em;
      opacity: 0; animation: rise 1.2s var(--ease) 1.5s forwards;
    }
    .cover.no-photo .cover-scroll { display: none; }
    .cover-scroll span:not(.ln) { margin-left: 0.34em; }
    .cover-scroll .ln { width: 1px; height: 44px; background: rgba(255,255,255,0.4); position: relative; overflow: hidden; }
    .cover-scroll .ln::after {
      content: ""; position: absolute; left: 0; top: -60%; width: 100%; height: 60%;
      background: #fff; animation: scrollPulse 2.2s var(--ease) infinite;
    }
    @keyframes scrollPulse { 0%{ top:-60%; } 60%,100%{ top:120%; } }

    /* ── Galerie ── */
    .gallery { padding: clamp(40px, 7vh, 90px) clamp(14px, 3.5vw, 44px) 40px; max-width: 1560px; margin: 0 auto; }
    .gallery-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin-bottom: clamp(20px, 3.5vh, 40px);
      padding-bottom: 16px; border-bottom: 1px solid var(--line-soft);
    }
    .gallery-title {
      font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 300;
      font-size: clamp(1.5rem, 3.4vw, 2.2rem); color: var(--ink);
    }
    .gallery-note { font-size: 11px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--ink-soft); }

    .grid-masonry { columns: 4 300px; column-gap: var(--gap); }
    .grid-masonry .ph { margin-bottom: var(--gap); break-inside: avoid; }
    .grid-masonry .ph img { width: 100%; display: block; height: auto; }

    .grid-grille { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(46vw, 280px), 1fr)); gap: var(--gap); }
    .grid-grille .ph { aspect-ratio: 1; }
    .grid-grille .ph img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .ph {
      position: relative; overflow: hidden; cursor: zoom-in;
      background: var(--bg-elev); box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    }
    .ph img { transition: transform 1.1s var(--ease), opacity 0.8s var(--ease); opacity: 0; }
    .ph img.on { opacity: 1; }
    .ph:hover img { transform: scale(1.035); }
    /* Bouton de téléchargement minimaliste : un simple glyphe, zone de
       pression conservée (44px) — visible au survol, discret au tactile. */
    .ph .dl {
      position: absolute; right: 0; bottom: 0; z-index: 2;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; text-decoration: none; font-size: 14px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.75);
      opacity: 0; transition: opacity 0.3s;
    }
    .ph:hover .dl, .ph:focus-within .dl { opacity: 0.7; }
    .ph .dl:hover { opacity: 1; }
    .ph .dl:active { opacity: 1; transform: scale(0.9); }
    @media (pointer: coarse) { .ph .dl { opacity: 0.55; } }

    /* ── Lightbox ── */
    .lb {
      position: fixed; inset: 0; z-index: 90; background: rgba(5,5,5,0.94);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      /* Tactile : aucun geste ne doit atteindre la page derrière. */
      touch-action: none; overscroll-behavior: contain;
    }
    .lb.open { display: flex; }
    @supports not (backdrop-filter: blur(1px)) { .lb { background: rgba(5,5,5,0.985); } }
    @media (prefers-reduced-transparency: reduce) {
      .lb { background: #050505; backdrop-filter: none; }
    }
    .lb img {
      max-width: min(94vw, 1500px); max-height: 84vh; object-fit: contain;
      box-shadow: var(--shadow);
    }
    .lb-btn {
      position: absolute; z-index: 2; background: none; border: 1px solid rgba(255,255,255,0.22);
      color: #fff; width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 17px;
      transition: border-color 0.3s, background 0.3s;
    }
    .lb-btn:hover { border-color: var(--accent); background: var(--accent-gl); }
    .lb-btn:active { transform: scale(0.94); background: var(--accent-gl); }
    .lb-prev:active, .lb-next:active { transform: translateY(-50%) scale(0.94); }
    .lb-close { top: 20px; right: 20px; }
    .lb-prev { left: 16px; top: 50%; transform: translateY(-50%); }
    .lb-next { right: 16px; top: 50%; transform: translateY(-50%); }
    .lb-bar {
      position: absolute; bottom: 22px; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center; gap: 22px;
      color: rgba(255,255,255,0.85); font-size: 11.5px;
      text-transform: uppercase; letter-spacing: 0.3em;
    }
    .lb-bar a {
      color: rgba(255,255,255,0.85); text-decoration: none; position: relative;
      padding: 10px 6px; letter-spacing: 0.24em; font-size: 11px;
      transition: color 0.3s;
    }
    .lb-bar a::after {
      content: ""; position: absolute; left: 4px; right: 4px; bottom: 6px;
      height: 1px; background: var(--accent); opacity: 0.7; transition: opacity 0.3s;
    }
    .lb-bar a:active { opacity: 0.6; }
    .lb-bar a:hover { color: #fff; }
    .lb-bar a:hover::after { opacity: 1; }
    /* Lien de retrait : présent mais en retrait — c'est un recours, pas
       une action courante. */
    #lb-report { color: rgba(255,255,255,0.58); font-size: 11px; }
    #lb-report::after { display: none; }
    @media (max-width: 640px) {
      .lb-prev, .lb-next { display: none; }
      .lb img { max-height: 76vh; }
    }

    /* ── Mobile (≤600px) : 2 colonnes, respiration réduite ── */
    @media (max-width: 600px) {
      :root { --gap: 6px; }
      .grid-masonry { columns: 2; }
      .gallery { padding-left: 10px; padding-right: 10px; }
    }

    /* ── Écrans tactiles : zones pressables au pouce (≥44px) ── */
    @media (pointer: coarse) {
      .lb-btn { width: 48px; height: 48px; font-size: 19px; }
      .lb-close { top: max(14px, env(safe-area-inset-top)); right: 14px; }
      .lb-bar a { padding: 13px 10px; }
    }

    /* ── États vides / erreurs ── */
    .state {
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .state-box { max-width: 460px; }
    .state-mark {
      font-family: "Cormorant Garamond", serif; font-style: italic;
      font-size: clamp(2rem, 6vw, 3rem); color: var(--accent); letter-spacing: 0.02em;
    }
    .state-mark span { color: var(--ink-dim); }
    .state-sep { width: 40px; height: 1px; background: var(--accent); opacity: 0.4; margin: 20px auto; }
    .state-kicker { font-size: 11px; letter-spacing: 0.25em; color: var(--ink-soft); text-transform: uppercase; margin-bottom: 16px; }
    .state-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.4rem, 4vw, 1.9rem); color: var(--ink); margin-bottom: 16px; line-height: 1.3;
    }
    .state p { font-size: 13px; color: var(--ink-soft); line-height: 1.7; margin-bottom: 28px; }
    .state a {
      display: inline-block; padding: 12px 28px; border: 1px solid var(--line);
      color: var(--accent); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      text-decoration: none; transition: border-color 0.2s;
    }
    .state a:hover { border-color: var(--accent); }

    /* ── Invitation TimelessHouse (fin de galerie) ── */
    .cta {
      max-width: 640px; margin: 0 auto; padding: clamp(48px, 9vh, 110px) 24px 20px;
      text-align: center;
    }
    .cta .ln { width: 1px; height: 52px; background: var(--accent); opacity: 0.45; margin: 0 auto 26px; }
    .cta-kicker {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.4em;
      color: var(--ink-soft); margin: 0 0 18px;
    }
    .cta h2 {
      font-family: "Cormorant Garamond", serif; font-weight: 300; font-style: italic;
      font-size: clamp(1.7rem, 4.6vw, 2.6rem); line-height: 1.15; margin: 0 0 14px;
      color: var(--ink);
    }
    .cta p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.7; margin: 0 0 30px; }
    .cta a {
      display: inline-block; padding: 14px 34px; border: 1px solid var(--accent);
      color: var(--accent); font-size: 11px; letter-spacing: 0.26em;
      text-transform: uppercase; text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .cta a:hover { background: var(--accent); color: var(--bg); }
    .cta a:active { transform: scale(0.97); }

    /* ── Formulaire de contact (CTA) ── */
    .cta form { text-align: left; max-width: 460px; margin: 0 auto; }
    .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .seg-opt {
      display: flex; align-items: center; justify-content: center; text-align: center;
      min-height: 52px; padding: 10px 12px; cursor: pointer;
      border: 1px solid var(--line); color: var(--ink-soft);
      font-size: 12.5px; letter-spacing: 0.08em; line-height: 1.35;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
    }
    .seg-opt:active { transform: scale(0.98); }
    .seg-opt input { position: absolute; opacity: 0; width: 0; height: 0; }
    .seg-opt.on { border-color: var(--accent); color: var(--ink); background: var(--accent-gl); }
    @media (max-width: 480px) { .seg { grid-template-columns: 1fr; } }

    .lf { display: block; margin-top: 18px; font-size: 11.5px;
      text-transform: uppercase; letter-spacing: 0.2em; color: var(--ink-soft); }
    .lf .opt { text-transform: none; letter-spacing: 0.02em; opacity: 0.75; }
    .lf input, .lf select, .lf textarea {
      width: 100%; margin-top: 8px; padding: 12px 2px; font-size: 16px;
      font-family: "Jost", sans-serif; font-weight: 300;
      background: none; border: none; border-bottom: 1px solid var(--line);
      color: var(--ink); transition: border-color 0.3s; border-radius: 0;
    }
    .lf select { appearance: none; -webkit-appearance: none; cursor: pointer; }
    .lf textarea { resize: vertical; min-height: 52px; }
    .lf input:focus, .lf select:focus, .lf textarea:focus {
      outline: none; border-bottom-color: var(--accent); }
    .lf-check, .lead-check {
      display: flex; gap: 10px; align-items: flex-start; margin-top: 18px;
      font-size: 13px; color: var(--ink-soft); line-height: 1.55; cursor: pointer;
      min-height: 28px;
    }
    .lf-check input, .lead-check input { width: 17px; height: 17px; margin-top: 1px;
      accent-color: var(--accent); flex: none; }
    .lf-cap { margin-top: 20px; font-size: 11.5px; text-transform: uppercase;
      letter-spacing: 0.2em; color: var(--ink-soft); }
    .lead-err { margin-top: 16px; padding: 12px 14px; font-size: 13px;
      border: 1px solid rgba(220,120,90,0.4); background: rgba(220,120,90,0.08);
      color: var(--ink); }
    .lead-go {
      margin-top: 24px; width: 100%; min-height: 50px; cursor: pointer;
      background: none; border: 1px solid var(--accent); color: var(--accent);
      font-family: "Jost", sans-serif; font-size: 11px; letter-spacing: 0.26em;
      text-transform: uppercase; transition: background 0.3s, color 0.3s, opacity 0.3s;
    }
    .lead-go:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
    .lead-go:active:not(:disabled) { transform: scale(0.98); }
    .lead-go:disabled { opacity: 0.55; cursor: wait; }

    .lead-done { max-width: 460px; margin: 0 auto; }
    .ld-title { font-family: "Cormorant Garamond", serif; font-style: italic;
      font-size: clamp(1.4rem, 4vw, 1.9rem); color: var(--ink); margin-bottom: 8px; }
    .price-card { margin: 24px auto 6px; padding: 22px 20px;
      border: 1px solid var(--accent); text-align: center; }
    .price-kicker { font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.3em; color: var(--ink-soft); margin-bottom: 12px; }
    .price-main { font-family: "Cormorant Garamond", serif;
      font-size: clamp(2rem, 6vw, 2.6rem); color: var(--ink); }
    .price-main span { font-size: 0.45em; color: var(--ink-soft); font-style: italic; }
    .price-notes { margin-top: 12px; font-size: 12.5px; color: var(--ink-soft); line-height: 1.7; }

    footer.site {
      padding: 40px 20px 56px; text-align: center;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--ink-soft);
    }
    footer.site a { color: var(--accent); text-decoration: none; }
    footer.site .help { display: block; margin-top: 12px; letter-spacing: 0.22em; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
      .boot { display: none; }
      .cover-photog, .cover h1, .cover-meta, .cover-scroll, .ph img { opacity: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="boot" id="boot" aria-hidden="true">
    <div class="boot-mark">TimelessHouse<span>.</span></div>
    <div class="boot-line"></div>
  </div>

  <div id="app"></div>

  <div class="lb" id="lb" role="dialog" aria-label="Photo en grand">
    <button class="lb-btn lb-close" id="lb-close" aria-label="Fermer">✕</button>
    <button class="lb-btn lb-prev" id="lb-prev" aria-label="Précédente">←</button>
    <button class="lb-btn lb-next" id="lb-next" aria-label="Suivante">→</button>
    <img id="lb-img" alt="Photo">
    <div class="lb-bar">
      <span id="lb-count"></span>
      <a id="lb-dl" href="#">Télécharger</a>
      <a id="lb-share" href="#" hidden>Partager</a>
      <a id="lb-report" href="#" title="Demander le retrait de cette photo">Un souci&nbsp;?</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from '@supabase/supabase-js';

    const sb = createClient(
      import.meta.env.VITE_SUPABASE_URL,
      import.meta.env.VITE_SUPABASE_ANON_KEY
    );

    const app   = document.getElementById('app');
    const boot  = document.getElementById('boot');
    const token = new URLSearchParams(location.search).get('g');

    const LIGHT_THEMES = new Set(['creme', 'lin', 'sauge', 'brume']);
    const KNOWN_THEMES = new Set(['noir','creme','ardoise','fumee','encre','sapin',
                                  'lin','sauge','brume','bordeaux','acajou','foret']);

    const esc = (s) => String(s ?? '').replace(/[&<>"']/g,
      (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function applyTheme(cfg) {
      const theme = KNOWN_THEMES.has(cfg.theme) ? cfg.theme : 'noir';
      document.documentElement.dataset.theme = theme;
      document.documentElement.classList.toggle('is-light', LIGHT_THEMES.has(theme));
      const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta && bg) meta.setAttribute('content', bg);
    }

    /* ── Compteurs anonymes (audience de l'événement, visibles dans
       l'admin de l'app). Silencieux en cas d'échec : jamais bloquant. ── */
    function track(metric) {
      try { sb.rpc('photobooth_track', { p_token: token, p_metric: metric }); }
      catch (e) { /* hors ligne : tant pis, l'expérience prime */ }
    }

    function stateScreen(kicker, title, body) {
      boot.classList.add('gone');
      app.innerHTML = `
        <div class="state"><div class="state-box">
          <div class="state-mark">TimelessHouse<span>.</span></div>
          <div class="state-sep"></div>
          <div class="state-kicker">${esc(kicker)}</div>
          <div class="state-title">${esc(title)}</div>
          <p>${esc(body)}</p>
          <a href="mailto:service@timelesshouse.org">Contacter TimelessHouse</a>
        </div></div>`;
    }

    /* ── Lightbox ── */
    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lb-img');
    const lbCount = document.getElementById('lb-count');
    const lbDl = document.getElementById('lb-dl');
    let FLAT = [];
    let lbIndex = -1;
    let lastFocus = null;
    let lbInHistory = false;

    /* Verrouillage du fond, version iOS-safe (même technique que les
       galeries mariage) : overflow:hidden ne suffit pas sur iOS Safari —
       la page continue de défiler sous le doigt. On fige <body> à sa
       position via position:fixed + top négatif, restauré à la fermeture. */
    let savedScrollY = 0;
    function lockBody() {
      savedScrollY = window.scrollY || 0;
      const b = document.body.style;
      b.position = 'fixed';
      b.top = `-${savedScrollY}px`;
      b.left = '0'; b.right = '0'; b.width = '100%';
      document.body.classList.add('no-scroll'); // ceinture + bretelles (Android)
    }
    function unlockBody() {
      const b = document.body.style;
      b.position = ''; b.top = ''; b.left = ''; b.right = ''; b.width = '';
      document.body.classList.remove('no-scroll');
      window.scrollTo(0, savedScrollY);
    }

    function lbShow(i) {
      if (!FLAT.length) return;
      const wasOpen = lb.classList.contains('open');
      lbIndex = (i + FLAT.length) % FLAT.length;
      const photo = FLAT[lbIndex];
      //  Version 2048px à l'écran ; l'original (pleine taille) reste
      //  réservé au téléchargement.
      lbImg.src = photo.display_url || photo.url;
      lbDl.href = photo.url;
      lbCount.textContent = (lbIndex + 1) + ' / ' + FLAT.length;
      lb.classList.add('open');
      if (!wasOpen) {
        lockBody();
        //  Accessibilité + navigation : focus dans la visionneuse, et le
        //  bouton retour du téléphone la ferme au lieu de quitter la page.
        lastFocus = document.activeElement;
        document.getElementById('lb-close').focus();
        history.pushState({ pbLightbox: true }, '');
        lbInHistory = true;
      }
    }

    /* ── Partage natif : la photo elle-même (logos incrustés) part sur
       WhatsApp/Instagram/iMessage. Repli : partage du lien de galerie. ── */
    const lbShare = document.getElementById('lb-share');
    if (navigator.share) lbShare.hidden = false;
    lbShare.addEventListener('click', async (e) => {
      e.preventDefault();
      const photo = FLAT[lbIndex];
      if (!photo) return;
      const original = lbShare.textContent;
      lbShare.textContent = 'Préparation…';
      try {
        const resp = await fetch(photo.display_url || photo.url);
        const blob = await resp.blob();
        const file = new File([blob], (photo.stem || 'photo') + '.jpg', { type: 'image/jpeg' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file] });
        } else {
          await navigator.share({ title: 'Ma photo — TimelessHouse', url: location.href });
        }
        track('share');
      } catch (err) {
        //  Fermeture du volet de partage par l'invité : pas une erreur.
        if (err && err.name !== 'AbortError') {
          try { await navigator.share({ url: location.href }); } catch (e2) {}
        }
      }
      lbShare.textContent = original;
    });
    function lbClose(fromHistory = false) {
      lb.classList.remove('open');
      unlockBody();
      lbIndex = -1;
      if (lastFocus && lastFocus.focus) { lastFocus.focus(); lastFocus = null; }
      if (lbInHistory && !fromHistory) { lbInHistory = false; history.back(); }
      else lbInHistory = false;
    }
    window.addEventListener('popstate', () => {
      if (lb.classList.contains('open')) lbClose(true);
    });
    //  Le focus clavier reste dans la visionneuse tant qu'elle est ouverte.
    lb.addEventListener('keydown', (e) => {
      if (e.key !== 'Tab') return;
      const focusables = [...lb.querySelectorAll('button, a[href]')]
        .filter((el) => !el.hidden && el.offsetParent !== null);
      if (!focusables.length) return;
      const first = focusables[0], last = focusables[focusables.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    });
    lbDl.addEventListener('click', () => track('download'));

    //  Droit de retrait praticable : mailto pré-rempli avec la référence
    //  exacte de la photo — Gil retire ensuite le match depuis sa revue.
    document.getElementById('lb-report').addEventListener('click', (e) => {
      e.preventDefault();
      const photo = FLAT[lbIndex];
      if (!photo) return;
      const subject = encodeURIComponent('Photobooth — retirer une photo');
      const body = encodeURIComponent(
        'Bonjour,\n\nJe souhaite retirer cette photo de ma galerie :\n'
        + 'Photo : ' + photo.stem + '\nGalerie : ' + location.href + '\n\nMerci.'
      );
      location.href = 'mailto:service@timelesshouse.org?subject=' + subject + '&body=' + body;
    });
    document.getElementById('lb-close').addEventListener('click', lbClose);
    document.getElementById('lb-prev').addEventListener('click', () => lbShow(lbIndex - 1));
    document.getElementById('lb-next').addEventListener('click', () => lbShow(lbIndex + 1));
    window.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') lbClose();
      if (e.key === 'ArrowLeft') lbShow(lbIndex - 1);
      if (e.key === 'ArrowRight') lbShow(lbIndex + 1);
    });
    //  Aucun geste ne traverse la lightbox : preventDefault non-passif sur
    //  touchmove (les swipes utilisent touchstart/touchend, jamais bloqués).
    lb.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    let touchX = null;
    lb.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend', (e) => {
      if (e.target.closest('a, button')) { touchX = null; return; }
      if (touchX === null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 48) lbShow(lbIndex + (dx < 0 ? 1 : -1));
      touchX = null;
    }, { passive: true });

    /* ── Rendu ── */
    /* ── Formulaire de contact en fin de galerie ──
       L'état survit aux rafraîchissements automatiques : on ne re-rend JAMAIS
       par-dessus une saisie en cours (HIG : ne jamais perdre le travail). */
    const leadState = { done: false, firstName: '', pricing: false, dirty: false };
    const siteUrl = (code) =>
      'https://timelesshouse.org/?utm_source=photobooth&utm_medium=gallery&utm_campaign='
      + encodeURIComponent(code || 'photobooth');

    function leadZoneHtml(data) {
      if (leadState.done) return leadDoneHtml(data);
      return `
        <form id="lead-form" novalidate>
          <div class="seg" role="radiogroup" aria-label="Ta demande">
            <label class="seg-opt"><input type="radio" name="motif" value="evenement">
              J'organise un événement</label>
            <label class="seg-opt"><input type="radio" name="motif" value="infos">
              Découvrir les prestations</label>
          </div>
          <div id="lead-fields" hidden>
            <div data-branch="evenement" hidden>
              <label class="lf">Type d'événement
                <select name="event_type">
                  <option>Mariage</option>
                  <option>Anniversaire</option>
                  <option>Événement d'entreprise</option>
                  <option>Autre</option>
                </select>
              </label>
              <label class="lf">Période envisagée <span class="opt">(facultatif)</span>
                <input type="text" name="event_date" placeholder="septembre 2026">
              </label>
              <label class="lf-check"><input type="checkbox" name="wants_pricing">
                Je souhaite connaître le tarif du photobooth</label>
              <label class="lf">Téléphone <span class="opt">(facultatif)</span>
                <input type="tel" name="phone" inputmode="tel" autocomplete="tel">
              </label>
            </div>
            <div data-branch="infos" hidden>
              <p class="lf-cap">Ce qui t'intéresse</p>
              <label class="lead-check"><input type="checkbox" name="interests" value="Film de mariage">Film de mariage</label>
              <label class="lead-check"><input type="checkbox" name="interests" value="Photographie">Photographie</label>
              <label class="lead-check"><input type="checkbox" name="interests" value="Photobooth">Photobooth</label>
              <label class="lead-check"><input type="checkbox" name="interests" value="Immobilier">Immobilier</label>
              <label class="lead-check"><input type="checkbox" name="interests" value="Contenu & réseaux sociaux">Contenu &amp; réseaux sociaux</label>
            </div>
            <label class="lf">Prénom
              <input type="text" name="first_name" autocomplete="given-name" maxlength="80">
            </label>
            <label class="lf">Email
              <input type="email" name="email" inputmode="email" autocomplete="email"
                     placeholder="nom@exemple.com" maxlength="200">
            </label>
            <label class="lf">Un mot sur ton projet <span class="opt">(facultatif)</span>
              <textarea name="message" rows="2" maxlength="1000"></textarea>
            </label>
            <div class="lead-err" id="lead-err" hidden></div>
            <button type="submit" class="lead-go" id="lead-go">Envoyer</button>
          </div>
        </form>`;
    }

    function leadDoneHtml(data) {
      return `
        <div class="lead-done">
          <p class="ld-title">Merci ${esc(leadState.firstName)} — c'est bien reçu.</p>
          <p>Réponse personnalisée par email, très vite.</p>
          ${leadState.pricing ? `
          <div class="price-card">
            <p class="price-kicker">Photobooth studio</p>
            <p class="price-main">500&nbsp;€ <span>· 4 heures</span></p>
            <p class="price-notes">Hors installation et désinstallation.<br>
              Au-delà des 4 heures : 100&nbsp;€ par tranche de 30 minutes.</p>
          </div>` : ''}
          <p style="margin-top:22px"><a class="btn-site" id="ld-link"
            href="${esc(siteUrl(data.event_code))}"
            style="color:var(--accent);letter-spacing:0.2em;text-transform:uppercase;font-size:11px;text-decoration:none;border-bottom:1px solid var(--accent);padding-bottom:3px">
            Découvrir TimelessHouse</a></p>
        </div>`;
    }

    function bindLeadZone(data) {
      const done = document.getElementById('ld-link');
      if (done) done.addEventListener('click', () => track('cta_click'));
      const form = document.getElementById('lead-form');
      if (!form) return;
      const fields = document.getElementById('lead-fields');
      const branches = [...form.querySelectorAll('[data-branch]')];

      form.querySelectorAll('input[name="motif"]').forEach((radio) => {
        radio.addEventListener('change', () => {
          leadState.dirty = true;
          form.querySelectorAll('.seg-opt').forEach((opt) =>
            opt.classList.toggle('on', opt.querySelector('input').checked));
          fields.hidden = false;
          branches.forEach((b) => { b.hidden = b.dataset.branch !== radio.value; });
        });
      });
      form.addEventListener('input', () => { leadState.dirty = true; });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('lead-err');
        const go = document.getElementById('lead-go');
        const fail = (msg) => { err.textContent = msg; err.hidden = false; };
        err.hidden = true;

        const motif = (form.querySelector('input[name="motif"]:checked') || {}).value;
        const firstName = form.first_name.value.trim();
        const email = form.email.value.trim().toLowerCase();
        if (!motif) return fail('Choisis d’abord ce qui t’amène.');
        if (!firstName) return fail('Ton prénom est obligatoire.');
        if (!email.includes('@')) return fail('Une adresse email valide est obligatoire.');

        const isEvent = motif === 'evenement';
        const wantsPricing = isEvent && form.wants_pricing.checked;
        const interests = [...form.querySelectorAll('input[name="interests"]:checked')]
          .map((c) => c.value).join(', ');

        go.disabled = true;
        go.textContent = 'Envoi…';
        try {
          const { data: res, error } = await sb.rpc('photobooth_lead', {
            p_token: token,
            p_motif: motif,
            p_first_name: firstName,
            p_email: email,
            p_event_type: isEvent ? form.event_type.value : null,
            p_event_date: isEvent ? form.event_date.value.trim() : null,
            p_interests: isEvent ? null : interests,
            p_wants_pricing: wantsPricing,
            p_phone: isEvent ? form.phone.value.trim() : null,
            p_message: form.message.value.trim(),
          });
          if (error) throw error;
          if (res && res.error) throw new Error(res.error);
          leadState.done = true;
          leadState.firstName = firstName;
          leadState.pricing = wantsPricing;
          leadState.dirty = false;
          document.getElementById('lead-zone').innerHTML = leadDoneHtml(data);
          bindLeadZone(data);
          return;
        } catch (e2) {
          console.error(e2);
          fail('Le réseau n’a pas répondu — réessaie dans un instant.');
        }
        go.disabled = false;
        go.textContent = 'Envoyer';
      });
    }

    function render(data) {
      const cfg = data.config || {};
      applyTheme(cfg);

      const photos = data.photos || [];
      FLAT = photos;
      const eventName = cfg.event_name || '';
      const count = photos.length;
      const layout = cfg.layout === 'grille' ? 'grille' : 'masonry';
      const coverUrl = count ? (photos[count - 1].display_url || photos[count - 1].url) : '';

      app.innerHTML = `
        <header class="cover ${count ? '' : 'no-photo'}">
          ${count ? `<div class="cover-bg" style="background-image:url('${esc(coverUrl)}')"></div>` : ''}
          <div class="cover-inner">
            <span class="cover-photog">TimelessHouse — Photobooth</span>
            <h1>${esc(data.first_name)}</h1>
            <div class="cover-meta">
              ${eventName ? `<span>${esc(eventName)}</span><i></i>` : ''}
              <span>${count ? count + ' photo' + (count > 1 ? 's' : '') : 'Tes photos arrivent'}</span>
            </div>
          </div>
          <button class="cover-scroll" id="to-gallery" type="button">
            <span>Découvrir</span><span class="ln"></span>
          </button>
        </header>

        ${count ? `
        <main class="gallery" id="gallery">
          <div class="gallery-head">
            <div class="gallery-title">La galerie</div>
            <div class="gallery-note">Un clic sur une photo pour l'ouvrir · ⬇ pour l'enregistrer</div>
          </div>
          <div class="grid-${layout}">
            ${photos.map((p, i) => `
              <figure class="ph" data-i="${i}">
                <img src="${esc(p.thumb_url || p.url)}" alt="Photo ${esc(p.stem)}" loading="lazy"
                     ${p.thumb_w && p.thumb_h ? `style="aspect-ratio:${p.thumb_w}/${p.thumb_h}"` : ''}>
                <a class="dl" href="${esc(p.url)}" title="Enregistrer" aria-label="Enregistrer">⬇</a>
              </figure>`).join('')}
          </div>
        </main>` : `
        <main class="gallery">
          <div class="gallery-head">
            <div class="gallery-title">Encore un peu de patience…</div>
            <div class="gallery-note">La page se met à jour toute seule</div>
          </div>
          <p style="color:var(--ink-soft); font-size:14px; line-height:1.8; max-width:480px">
            Passe devant l'objectif : chaque photo où tu apparais rejoint cette
            galerie automatiquement, quelques secondes après la prise de vue.
          </p>
        </main>`}

        <section class="cta">
          <div class="ln"></div>
          <p class="cta-kicker">TimelessHouse</p>
          <h2>Un projet, une envie&nbsp;?</h2>
          <p>Deux questions, trente secondes — et une vraie réponse par email.</p>
          <div id="lead-zone">${leadZoneHtml(data)}</div>
        </section>

        <footer class="site">Photos &amp; souvenirs par
          <a href="https://timelesshouse.org">TimelessHouse</a>
          <span class="help">Un souci avec tes photos&nbsp;?
            <a href="mailto:service@timelesshouse.org?subject=${encodeURIComponent('Photobooth — besoin d\'aide')}&body=${encodeURIComponent('Mon lien de galerie : ' + location.href)}">Écris-nous</a></span>
        </footer>
      `;

      const toGallery = document.getElementById('to-gallery');
      if (toGallery) toGallery.addEventListener('click', () => {
        const g = document.getElementById('gallery');
        if (g) g.scrollIntoView({ behavior: 'smooth' });
      });

      app.querySelectorAll('.ph').forEach((fig) => {
        const img = fig.querySelector('img');
        if (img.complete) img.classList.add('on');
        else img.addEventListener('load', () => img.classList.add('on'));
        fig.addEventListener('click', (e) => {
          if (e.target.closest('.dl')) { track('download'); return; }  // le bouton ⬇ télécharge
          lbShow(Number(fig.dataset.i));
        });
      });

      bindLeadZone(data);

      boot.classList.add('gone');
    }

    /* ── Chargement + rafraîchissement ── */
    let lastCount = -1;

    async function load(first) {
      if (!token) {
        stateScreen('Accès', 'Lien incomplet.',
          "Utilise le lien personnel reçu par email de TimelessHouse — "
          + "cherche « TimelessHouse » dans ta boîte mail (pense aux spams).");
        return;
      }
      const { data, error } = await sb.rpc('photobooth_gallery', { p_token: token });
      if (error) {
        if (first) stateScreen('Connexion', 'Petit souci de réseau.',
          'Réessaie dans un instant — tes photos sont bien à l’abri.');
        console.error(error);
        return;
      }
      if (!data) {
        stateScreen('Accès', 'Galerie introuvable.',
          'Ce lien ne correspond à aucune galerie. Vérifie le lien exact reçu '
          + 'par email, ou écris-nous.');
        return;
      }
      const count = (data.photos || []).length;
      if (count !== lastCount && !(leadState.dirty && !leadState.done)) {
        lastCount = count;
        render(data);
      }
      //  Une ouverture de galerie par session de navigation, pas par
      //  rafraîchissement automatique.
      if (first && !sessionStorage.getItem('pb-open-' + token)) {
        sessionStorage.setItem('pb-open-' + token, '1');
        track('gallery_open');
      }
    }

    load(true);
    //  Les photos tombent au fil de la soirée. On ne re-rend pas pendant
    //  qu'une photo est ouverte en grand.
    setInterval(() => { if (!lb.classList.contains('open')) load(false); }, 45_000);
  </script>
</body>
</html>
