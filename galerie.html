<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- GALERIE AUTONOME (SaaS B.3, brique 13).
       Une galerie de livraison est un objet de premier rang : elle a SON
       code d'accès et SON lien, indépendants de l'espace client.
         · /galerie?c=<code>  → ouverture directe (lien de partage)
         · /galerie           → saisie manuelle du code
       Lien de partage : https://<slug-agence>.laloge.house/galerie?c=<code>
       (https://timelesshouse.org/galerie?c=<code> pour TimelessHouse).
       La marque de l'agence est appliquée AVANT et APRÈS la saisie,
       comme sur app.html. -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0b0b0c" id="metaTheme" />
  <title>Galerie</title>
  <link rel="icon" href="/favicon-th.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* Mode sombre assumé : une galerie se regarde sur fond noir
       (exception média assumée, HIG §7). --accent est la seule couleur
       reprise de la marque de l'agence. */
    :root {
      /* §7 : les contrôles natifs (champ de code, scrollbars) suivent. */
      color-scheme: dark;
      /* Charte cinéma alignée sur les pages event (event-photos-cinematic /
         event-video) : fond #0a0a0a, encre #f4f0eb, accent #b08968. Les gris
         --muted/--faint gardent leurs valeurs accessibles (≥4.5:1, HIG §6). */
      --bg:      #0a0a0a;
      --bg-deep: #060606;
      --surface: #161616;
      --ink:     #f4f0eb;
      /* Variables « event » (palettes portées d'event-photos.html) — la
         palette choisie dans l'admin les redéfinit via [data-theme]. */
      --bg-elev: #161616;
      --ink-soft: #9b958a;
      --ink-dim: #8a8478;
      --line: rgba(244,240,235,0.10);
      --line-soft: rgba(244,240,235,0.05);
      --accent-gl: rgba(176,137,104,0.14);
      --shadow: 0 30px 90px rgba(0,0,0,0.7);
      /* Pont : les anciens noms de la galerie SUIVENT la palette (HIG §6 :
         chaque palette embarque des gris déjà accessibles sur son fond). */
      --muted:   var(--ink-soft);
      --faint:   var(--ink-soft);
      --hair:    var(--line);
      --accent:  #b08968;
    }
    /* ── Palettes (parité event-photos.html) — posées sur <html> ── */
    [data-theme="fumee"] { --bg:#1a1714; --bg-deep:#131110; --bg-elev:#221e1a;
      --ink:#ece5da; --ink-soft:#9c9286; --ink-dim:#5d5549;
      --accent:#b1916f; --accent-gl:rgba(177,145,111,0.13);
      --line:rgba(236,229,218,0.09); --line-soft:rgba(236,229,218,0.05); }
    [data-theme="encre"] { --bg:#0d0f14; --bg-deep:#090a0e; --bg-elev:#161922;
      --ink:#e6e8ee; --ink-soft:#8b909e; --ink-dim:#4d525e;
      --accent:#8a93a6; --accent-gl:rgba(138,147,166,0.14);
      --line:rgba(230,232,238,0.09); --line-soft:rgba(230,232,238,0.05); }
    [data-theme="sapin"] { --bg:#0c0f0d; --bg-deep:#080a09; --bg-elev:#141813;
      --ink:#e7ebe4; --ink-soft:#8a9387; --ink-dim:#4e564b;
      --accent:#8a9c84; --accent-gl:rgba(138,156,132,0.13);
      --line:rgba(231,235,228,0.08); --line-soft:rgba(231,235,228,0.05); }
    [data-theme="ardoise"] { --bg:#13161c; --bg-deep:#0d1014; --bg-elev:#1a1e26;
      --ink:#e8eaef; --ink-soft:#828a98; --ink-dim:#4a505a;
      --accent:#7fa0bd; --accent-gl:rgba(127,160,189,0.15);
      --line:rgba(232,234,239,0.09); --line-soft:rgba(232,234,239,0.05); }
    [data-theme="bordeaux"] { --bg:#45100f; --bg-deep:#2c0a0a; --bg-elev:#531818;
      --ink:#f3e7e0; --ink-soft:#b89a90; --ink-dim:#7a5953;
      --accent:#d2b48c; --accent-gl:rgba(210,180,140,0.16);
      --line:rgba(243,231,224,0.10); --line-soft:rgba(243,231,224,0.05); }
    [data-theme="acajou"] { --bg:#2a1812; --bg-deep:#1a0f0b; --bg-elev:#3a241b;
      --ink:#efe4d9; --ink-soft:#b59a88; --ink-dim:#745b4b;
      --accent:#c98a5e; --accent-gl:rgba(201,138,94,0.15);
      --line:rgba(239,228,217,0.09); --line-soft:rgba(239,228,217,0.05); }
    [data-theme="foret"] { --bg:#0e2118; --bg-deep:#07140e; --bg-elev:#173025;
      --ink:#e7efe7; --ink-soft:#8fa596; --ink-dim:#4f6356;
      --accent:#c2a878; --accent-gl:rgba(194,168,120,0.15);
      --line:rgba(231,239,231,0.08); --line-soft:rgba(231,239,231,0.05); }
    [data-theme="creme"] { --bg:#f3eee7; --bg-deep:#ece5db; --bg-elev:#e7e0d6;
      --ink:#1a1714; --ink-soft:#6b6560; --ink-dim:#a39d95;
      --accent:#8b6a48; --accent-gl:rgba(139,106,72,0.12);
      --line:rgba(26,23,20,0.10); --line-soft:rgba(26,23,20,0.06);
      --shadow:0 30px 90px rgba(0,0,0,0.18); }
    [data-theme="lin"] { --bg:#f1ece3; --bg-deep:#e9e2d6; --bg-elev:#e5ddcf;
      --ink:#2b2620; --ink-soft:#7a7164; --ink-dim:#a89e8d;
      --accent:#8a7458; --accent-gl:rgba(138,116,88,0.12);
      --line:rgba(43,38,32,0.10); --line-soft:rgba(43,38,32,0.05);
      --shadow:0 30px 90px rgba(0,0,0,0.16); }
    [data-theme="sauge"] { --bg:#e8ebe4; --bg-deep:#dfe3d9; --bg-elev:#dbe0d3;
      --ink:#242821; --ink-soft:#6f766a; --ink-dim:#9aa090;
      --accent:#6e7d63; --accent-gl:rgba(110,125,99,0.12);
      --line:rgba(36,40,33,0.10); --line-soft:rgba(36,40,33,0.05);
      --shadow:0 30px 90px rgba(0,0,0,0.14); }
    [data-theme="brume"] { --bg:#e9ebee; --bg-deep:#e0e3e7; --bg-elev:#dde0e5;
      --ink:#21252b; --ink-soft:#6c7480; --ink-dim:#97a0ac;
      --accent:#6b7785; --accent-gl:rgba(107,119,133,0.12);
      --line:rgba(33,37,43,0.10); --line-soft:rgba(33,37,43,0.05);
      --shadow:0 30px 90px rgba(0,0,0,0.14); }
    /* Palettes claires : les contrôles natifs suivent */
    .is-light { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100vh; min-height: 100dvh;
      background: var(--bg); color: var(--ink);
      font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      opacity: 0; transition: opacity 0.4s ease;
    }
    body.ready { opacity: 1; }

    /* ── Porte : saisie du code ── */
    .gate {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 30px; padding: 28px;
    }
    .gate[hidden] { display: none; }
    .brand { text-align: center; }
    .brand .nm {
      font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
      font-size: clamp(1.9rem, 6vw, 2.5rem); letter-spacing: -0.01em; line-height: 1.1;
    }
    .brand .nm span { color: var(--faint); }
    .brand img { max-height: 66px; max-width: 250px; object-fit: contain; }
    .brand .tag {
      font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--muted); margin-top: 12px; font-weight: 600;
    }
    .panel {
      width: 100%; max-width: 420px; background: var(--surface);
      border: 1px solid var(--hair); border-radius: 26px; padding: 28px 26px;
    }
    .panel h1 {
      font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400;
      font-size: 23px; letter-spacing: -0.01em;
    }
    .panel p { font-size: 13.5px; line-height: 1.6; color: var(--muted); margin-top: 7px; }
    .row { display: flex; gap: 10px; margin-top: 20px; }
    .row input {
      flex: 1; min-width: 0; min-height: 48px; padding: 0 18px;
      border: 1px solid var(--hair); border-radius: 999px;
      background: var(--bg); color: var(--ink);
      /* HIG : 16 px minimum, sinon iOS zoome la page au focus */
      font-size: 16px; font-family: inherit; letter-spacing: 0.05em; outline: none;
    }
    .row input:focus { border-color: var(--accent); }
    .row input::placeholder {
      color: var(--faint); letter-spacing: 0.12em; font-size: 13px; text-transform: uppercase;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 48px; padding: 0 24px; border: none; border-radius: 999px;
      background: var(--accent); color: #fff; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .btn:active { transform: scale(0.96); }
    .btn[disabled] { opacity: 0.5; }
    .err { display: none; font-size: 13px; color: #e0736f; margin-top: 14px; line-height: 1.5; }
    .err.on { display: block; }
    .gate footer { font-size: 12.5px; color: var(--faint); text-align: center; line-height: 1.9; }
    /* HIG §4 : un lien reste une cible tactile de 44 px. */
    .gate footer a { color: var(--muted); display: inline-flex; align-items: center; min-height: 44px; padding: 0 6px; }

    /* ── Galerie ── */
    .view { display: none; }
    .view.on { display: block; }
    .wrap { max-width: 1640px; margin: 0 auto; padding: 0 clamp(14px, 3vw, 40px); }
    .head {
      padding: clamp(46px, 9vw, 96px) 0 clamp(30px, 5vw, 54px); text-align: center;
    }
    .head .mk {
      font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
      font-size: 15px; color: var(--muted); margin-bottom: 22px;
    }
    .head .mk img { max-height: 40px; max-width: 170px; object-fit: contain; }
    .head .kicker {
      font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 14px; font-weight: 600;
    }
    .head h1 {
      font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400;
      font-size: clamp(2rem, 6.5vw, 3.5rem); letter-spacing: -0.015em; line-height: 1.08;
    }
    .head .sub { font-size: 13.5px; color: var(--muted); margin-top: 14px; }
    .sep { width: 38px; height: 1px; background: var(--accent); opacity: 0.5; margin: 26px auto 0; }
    .view footer {
      padding: clamp(50px, 8vw, 90px) 0 44px; text-align: center;
      font-size: 12.5px; color: var(--faint); line-height: 2; letter-spacing: 0.04em;
    }
    .view footer a { color: var(--muted); display: inline-flex; align-items: center; min-height: 44px; padding: 0 6px; }

    /* ══ COUVERTURE — 5 dispositions (portées d'event-photos.html) ══
       fill (plein écran + Ken Burns) · fit (cadrée sur fond palette) ·
       split (photo à gauche, titre à droite) · editorial (typo géante à
       gauche, photo à droite) · portrait (photo arquée centrée). */
    .cover {
      position: relative; height: 100svh; min-height: 560px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden; text-align: center;
    }
    .cover[hidden] { display: none; }
    .cover-bg {
      position: absolute; inset: -4%;
      background-size: cover; background-position: center;
      transform: scale(1.06);
      animation: kenburns 26s ease-out infinite alternate;
      filter: brightness(0.55) saturate(1.05);
    }
    @keyframes kenburns {
      from { transform: scale(1.06) translate(0,0); }
      to   { transform: scale(1.16) translate(-1.5%, -2%); }
    }
    .cover::after {
      content: ""; position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.45) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 25%, transparent 60%, rgba(0,0,0,0.55) 100%);
    }
    .is-light .cover-bg { filter: brightness(0.72) saturate(1.04); }
    .is-light .cover::after {
      background:
        radial-gradient(ellipse at center, transparent 35%, rgba(20,16,12,0.32) 100%),
        linear-gradient(to bottom, rgba(20,16,12,0.30) 0%, transparent 30%, transparent 62%, rgba(20,16,12,0.42) 100%);
    }
    @keyframes rise { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: none; } }

    .cover-mk {
      position: relative; z-index: 2;
      font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
      font-size: 16px; color: rgba(255,255,255,0.85); margin-bottom: 30px;
      opacity: 0; animation: rise 1.3s ease 0.6s forwards;
    }
    .cover-mk img { max-height: 44px; max-width: 190px; object-fit: contain; }

    .cover-frame {
      display: none; position: relative; z-index: 2;
      align-items: center; justify-content: center;
      max-width: min(88vw, 1180px); margin: 0;
      opacity: 0; animation: rise 1.5s ease 0.55s forwards;
    }
    .cover-photo {
      display: block; width: auto; height: auto;
      max-width: 100%; max-height: 58vh; object-fit: contain;
      box-shadow: var(--shadow);
      opacity: 0; transform: scale(0.985);
      transition: opacity 1.1s ease, transform 1.4s ease;
    }
    .cover-photo.on { opacity: 1; transform: scale(1); }

    .cover-inner { position: relative; z-index: 2; padding: 0 24px; color: #fff; }
    .cover-kicker {
      font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 18px; font-weight: 500;
      opacity: 0; animation: rise 1.3s ease 0.75s forwards;
    }
    .cover-title {
      font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-style: italic;
      font-size: clamp(3rem, 11vw, 8.5rem); line-height: 0.95; letter-spacing: 0.005em;
      margin: 0; text-shadow: 0 4px 40px rgba(0,0,0,0.4);
      opacity: 0; animation: rise 1.5s ease 0.9s forwards;
    }
    .cover-sub {
      margin-top: 30px; font-size: 10.5px; text-transform: uppercase;
      letter-spacing: 0.4em; color: rgba(255,255,255,0.82);
      display: flex; align-items: center; justify-content: center; gap: 18px; flex-wrap: wrap;
      opacity: 0; animation: rise 1.3s ease 1.25s forwards;
    }
    .cover-sub i { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); font-style: normal; }

    .cover-scroll {
      position: absolute; bottom: 34px; left: 0; right: 0;
      z-index: 2; background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.75); font-family: 'Jost', sans-serif;
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.34em;
      opacity: 0; animation: rise 1.2s ease 1.6s forwards;
    }
    .cover-scroll span:not(.ln) { margin-left: 0.34em; }
    .cover-scroll .ln { width: 1px; height: 46px; background: rgba(255,255,255,0.4); position: relative; overflow: hidden; }
    .cover-scroll .ln::after {
      content: ""; position: absolute; left: 0; top: -60%; width: 100%; height: 60%;
      background: #fff; animation: scrollPulse 2.2s ease infinite;
    }
    @keyframes scrollPulse { 0% { top: -60%; } 60%, 100% { top: 120%; } }

    /* — CADRÉE : photo au ratio naturel sur fond palette — */
    .cover.mode-fit { justify-content: center; gap: clamp(24px, 4.2vh, 50px);
      padding: clamp(64px, 9vh, 104px) clamp(20px, 5vw, 56px) clamp(74px, 10vh, 116px);
      background: var(--bg); }
    .cover.mode-fit .cover-bg { display: none; }
    .cover.mode-fit::after { display: none; }
    .cover.mode-fit .cover-frame { display: flex; }
    .cover.mode-fit.is-portrait  .cover-photo { max-height: 68vh; }
    .cover.mode-fit.is-landscape .cover-photo { max-height: 56vh; }
    .cover.mode-fit .cover-mk { color: var(--ink-soft); margin-bottom: 0; }
    .cover.mode-fit .cover-title { color: var(--ink); text-shadow: none; font-size: clamp(2.4rem, 7vw, 5.4rem); }
    .cover.mode-fit .cover-sub { color: var(--ink-soft); margin-top: 18px; }
    .cover.mode-fit .cover-scroll { color: var(--ink-soft); }
    .cover.mode-fit .cover-scroll .ln { background: var(--line); }
    .cover.mode-fit .cover-scroll .ln::after { background: var(--accent); }

    /* — Tronc commun SPLIT / ÉDITORIAL : deux volets, fond palette — */
    .cover.mode-split,
    .cover.mode-editorial {
      flex-direction: row; align-items: stretch; gap: 0; padding: 0;
      text-align: left; background: var(--bg);
    }
    .cover.mode-split::after,
    .cover.mode-editorial::after,
    .cover.mode-portrait::after { display: none; }
    .cover.mode-split .cover-bg,
    .cover.mode-editorial .cover-bg,
    .cover.mode-portrait .cover-bg { display: none; }
    .cover.mode-split .cover-frame,
    .cover.mode-editorial .cover-frame {
      display: flex; position: relative; z-index: 2;
      max-width: none; margin: 0; height: 100%; align-self: stretch;
      opacity: 0; animation: rise 1.5s ease 0.45s forwards;
    }
    .cover.mode-split .cover-frame     { flex: 0 0 46%; padding: clamp(26px, 4vw, 68px); }
    .cover.mode-editorial              { flex-direction: row-reverse; }
    .cover.mode-editorial .cover-frame { flex: 0 0 54%; }
    .cover.mode-split .cover-photo,
    .cover.mode-editorial .cover-photo {
      width: 100%; height: 100%; max-width: none; max-height: none;
      object-fit: cover;
    }
    .cover.mode-split .cover-photo     { box-shadow: var(--shadow); }
    .cover.mode-editorial .cover-photo { box-shadow: none; }
    .cover.mode-split .cover-inner {
      /* min-width:0 : sans lui, le flex item refuse de rétrécir sous la
         largeur de son titre et le volet déborde hors de l'écran. */
      flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center;
      padding: clamp(36px, 6vw, 104px); color: var(--ink);
    }
    .cover.mode-editorial .cover-inner {
      flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between;
      padding: clamp(92px, 14vh, 152px) clamp(36px, 6vw, 92px) clamp(40px, 7vh, 82px);
      color: var(--ink);
    }
    .cover.mode-split .cover-title,
    .cover.mode-editorial .cover-title { overflow-wrap: break-word; }
    .cover.mode-split .cover-title,
    .cover.mode-editorial .cover-title { color: var(--ink); text-shadow: none; }
    .cover.mode-split .cover-title { font-size: clamp(2.4rem, 5.5vw, 4.6rem); letter-spacing: 0; }
    .cover.mode-editorial .cover-title {
      font-style: normal; font-weight: 400; letter-spacing: 0.005em;
      font-size: clamp(3.2rem, 9vw, 9rem); line-height: 0.92;
      text-transform: uppercase; margin: 0;
    }
    .cover.mode-split .cover-sub,
    .cover.mode-editorial .cover-sub { color: var(--ink-soft); justify-content: flex-start; }
    .cover.mode-editorial .cover-sub { order: -1; margin: 0; }
    .cover.mode-split .cover-kicker,
    .cover.mode-editorial .cover-kicker { animation-delay: 0.6s; }

    /* — PORTRAIT : photo arquée centrée, titre dessous — */
    .cover.mode-portrait {
      background: var(--bg); justify-content: center;
      gap: clamp(28px, 4.5vh, 56px);
      padding: clamp(92px, 12vh, 148px) 24px clamp(70px, 9vh, 112px);
    }
    .cover.mode-portrait .cover-frame {
      display: flex; position: relative; z-index: 2; margin: 0;
      max-width: min(78vw, 500px);
      opacity: 0; animation: rise 1.5s ease 0.5s forwards;
    }
    .cover.mode-portrait .cover-photo {
      width: 100%; height: auto; max-width: 100%; max-height: 58vh;
      object-fit: cover;
      border-radius: clamp(110px, 22vw, 250px) clamp(110px, 22vw, 250px) 14px 14px;
      box-shadow: var(--shadow);
    }
    .cover.mode-portrait .cover-inner { padding-top: 0; }
    .cover.mode-portrait .cover-title { color: var(--ink); text-shadow: none; font-size: clamp(2.4rem, 7vw, 5rem); }
    .cover.mode-portrait .cover-sub { color: var(--ink-soft); }

    /* Marque de l'agence selon la disposition */
    .cover.mode-editorial .cover-mk,
    .cover.mode-portrait .cover-mk {
      position: absolute; top: clamp(26px, 5vh, 54px); left: clamp(26px, 5vw, 56px);
      margin: 0; color: var(--ink-soft);
    }
    .cover.mode-split .cover-mk {
      position: absolute; bottom: clamp(24px, 5vh, 46px); right: clamp(26px, 5vw, 56px);
      top: auto; left: auto; margin: 0; color: var(--ink-soft);
    }
    .cover.mode-split .cover-scroll,
    .cover.mode-editorial .cover-scroll,
    .cover.mode-portrait .cover-scroll { color: var(--ink-soft); }
    .cover.mode-split .cover-scroll .ln,
    .cover.mode-editorial .cover-scroll .ln,
    .cover.mode-portrait .cover-scroll .ln { background: var(--line); }
    .cover.mode-split .cover-scroll .ln::after,
    .cover.mode-editorial .cover-scroll .ln::after,
    .cover.mode-portrait .cover-scroll .ln::after { background: var(--accent); }

    /* Empilement mobile des dispositions à deux volets */
    @media (max-width: 880px) {
      .cover.mode-split,
      .cover.mode-editorial { flex-direction: column; }
      .cover.mode-split .cover-frame {
        flex: 0 0 auto; width: 100%; height: 44svh; padding: 14px 14px 0;
      }
      .cover.mode-editorial .cover-frame { flex: 0 0 auto; width: 100%; height: 42svh; }
      .cover.mode-split .cover-inner,
      .cover.mode-editorial .cover-inner {
        justify-content: center; padding: 26px 22px 70px;
      }
      .cover.mode-split .cover-mk { bottom: auto; top: 16px; right: 20px; }
    }
    /* ── HIG §16 : focus clavier toujours visible ──
       Le champ de code pose outline:none pour son style « pressé » ;
       sans remplacement, la navigation au clavier devient aveugle. */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 6px;
    }

    /* ── HIG §16 : respecter « réduire les animations » ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    /* Mention « propulsé par » de l'offre Découverte : présente mais
       jamais concurrente de la marque du studio (HIG §2, hiérarchie). */
    .pw { color: var(--faint); opacity: 0.75; font-size: 11.5px; letter-spacing: 0.05em; }
    .pw:hover { opacity: 1; }
  </style>
</head>
<body>

  <!-- ── Porte d'entrée (code de galerie) ── -->
  <div class="gate" id="gate" hidden>
    <div class="brand">
      <div class="nm" id="gateName">La Loge<span>.</span></div>
      <div class="tag" id="gateTag">Galerie privée</div>
    </div>
    <main class="panel">
      <h1>Votre galerie</h1>
      <p id="gateHint">Entrez le code de galerie qui vous a été communiqué.</p>
      <form class="row" id="gateForm">
        <input type="text" id="gateCode" placeholder="Code de galerie" autocomplete="off"
               autocapitalize="none" autocorrect="off" spellcheck="false"
               aria-label="Code de galerie" enterkeyhint="go" />
        <button type="submit" class="btn" id="gateBtn">Ouvrir</button>
      </form>
      <div class="err" id="gateErr"></div>
    </main>
    <footer id="gateFoot">Un accès vous manque&nbsp;? <a href="mailto:service@timelesshouse.org">Contactez votre studio</a>.</footer>
  </div>

  <!-- ── Galerie ── -->
  <div class="view" id="view">
    <!-- Couverture — 5 dispositions (remplie selon config.coverMode) -->
    <section class="cover" id="cover" hidden>
      <div class="cover-bg" id="coverBg" aria-hidden="true"></div>
      <div class="cover-mk" id="coverMark"></div>
      <figure class="cover-frame" id="coverFrame">
        <img class="cover-photo" id="coverPhoto" alt="" />
      </figure>
      <div class="cover-inner">
        <div class="cover-kicker" id="coverKicker"></div>
        <h1 class="cover-title" id="coverTitle"></h1>
        <div class="cover-sub" id="coverSub"></div>
      </div>
      <button class="cover-scroll" id="coverScroll" aria-label="Découvrir la galerie">
        <span>Découvrir</span><span class="ln" aria-hidden="true"></span>
      </button>
    </section>
    <header class="head wrap">
      <div class="mk" id="vMark"></div>
      <div class="kicker" id="vKicker"></div>
      <h1 id="vTitle"></h1>
      <div class="sub" id="vSub"></div>
      <div class="sep"></div>
    </header>
    <div class="wrap">
      <div id="videos"></div>
      <div id="photos"></div>
    </div>
    <footer id="vFoot"></footer>
  </div>

  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    import { mountPhotos, mountVideos, normalizeVideos } from './galerie-rendu.js';

    const sb = createClient(import.meta.env.VITE_SUPABASE_URL, import.meta.env.VITE_SUPABASE_ANON_KEY);
    const el = (id) => document.getElementById(id);
    const qs = new URLSearchParams(location.search);

    /* ── Gabarits : le `template` module le wording, pas la mécanique ──
       Liste volontairement extensible (la colonne SQL n'a pas de CHECK) :
       un gabarit inconnu retombe sur 'evenement'. */
    const TEMPLATES = {
      mariage:      { kicker: 'Votre mariage',       video: 'Votre film de mariage',     photos: 'Votre galerie de mariage' },
      fiancailles:  { kicker: 'Vos fiançailles',     video: 'Votre film de fiançailles', photos: 'Vos fiançailles' },
      anniversaire: { kicker: 'Votre anniversaire',  video: 'Votre film anniversaire',   photos: 'Votre anniversaire' },
      evenement:    { kicker: 'Votre événement',     video: 'Votre film',                photos: 'Votre galerie' },
      mannequinat:  { kicker: 'Votre shooting',      video: 'Votre film',                photos: 'Votre shooting' },
      immobilier:   { kicker: 'Votre bien',          video: 'Votre visite guidée',       photos: 'Votre bien' },
      corporate:    { kicker: 'Votre collection',    video: 'Votre film',                photos: 'Vos images' },
    };
    const tpl = (t) => TEMPLATES[t] || TEMPLATES.evenement;

    /* ── Lisibilité de l'accent sur fond sombre (HIG §6) ───────
       Éclaircit progressivement une couleur jusqu'à 4.5:1 contre le
       fond de la galerie, sans toucher à sa teinte : la marque de
       l'agence reste reconnaissable, le texte redevient lisible. */
    function readableOnDark(hex, bg = [11, 11, 12], target = 4.5) {
      const lum = (c) => {
        const [r, g, b] = c.map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
      };
      const ratio = (a, b) => {
        const l1 = lum(a), l2 = lum(b);
        return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
      };
      let c = [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16));
      for (let i = 0; i < 24 && ratio(c, bg) < target; i++) {
        c = c.map(v => Math.min(255, Math.round(v + (255 - v) * 0.12) + 4));
      }
      return '#' + c.map(v => v.toString(16).padStart(2, '0')).join('');
    }

    /* ── Marque de l'agence ────────────────────────────────────
       Seul --accent est repris : le fond reste noir (une galerie se
       regarde sur fond sombre), mais logo, nom et couleur d'accent
       portent bien l'identité de l'agence, avant comme après saisie. */
    let BRAND = null;
    function applyBrand(b) {
      if (!b) return;
      BRAND = b;
      if (b.accent_color && /^#[0-9a-f]{6}$/i.test(b.accent_color)) {
        // La galerie est volontairement sombre (expérience média, HIG §7).
        // Or l'accent d'une agence est choisi pour un fond CLAIR : posé tel
        // quel ici, un accent foncé devient illisible (l'accent
        // TimelessHouse #2a2620 tombait à 1.3:1 sur le fond noir — le
        // sur-titre « Votre mariage » disparaissait). On éclaircit donc
        // l'accent jusqu'à atteindre 4.5:1, en gardant sa teinte.
        document.documentElement.style.setProperty('--accent', readableOnDark(b.accent_color));
      }
      const nameHtml = b.logo_url
        ? `<img src="${b.logo_url}" alt="${(b.name || '').replace(/"/g, '&quot;')}" />`
        : null;
      if (nameHtml) el('gateName').innerHTML = nameHtml;
      else el('gateName').innerHTML = `${b.name || 'La Loge'}<span>.</span>`;
      el('gateHint').textContent = `Entrez le code de galerie que ${b.name} vous a communiqué.`;
      const mail = b.contact_email || 'service@timelesshouse.org';
      el('gateFoot').innerHTML = `Un accès vous manque&nbsp;? <a href="mailto:${mail}">Contactez ${b.name}</a>.`;
      el('vMark').innerHTML = nameHtml || `${b.name || ''}`;
      // Offre Découverte : mention discrète en pied de page, comme
      // annoncé sur /offres. C'est la contrepartie du plan gratuit —
      // elle disparaît dès le premier palier payant.
      const badge = b.badge
        ? `<br/><a href="https://laloge.app" target="_blank" rel="noopener" class="pw">Propulsé par La&nbsp;Loge</a>`
        : '';
      el('vFoot').innerHTML = `${b.name || ''} — Collection privée<br/><a href="mailto:${mail}">${mail}</a>${badge}`;
    }

    /* Sous-domaine d'agence (<slug>.laloge.house) ou ?agence= en local :
       la porte porte la marque AVANT toute saisie, comme app.html. */
    const subMatch = location.hostname.match(/^([a-z0-9-]+)\.laloge\.house$/);
    const AGENCY_SLUG = qs.get('agence') ||
      (subMatch && !['www', 'app'].includes(subMatch[1]) ? subMatch[1] : null);

    function showGate(msg) {
      el('gate').hidden = false;
      if (msg) { el('gateErr').textContent = msg; el('gateErr').classList.add('on'); }
      document.body.classList.add('ready');
      el('gateCode').focus();
    }

    /* ── Ouverture d'une galerie ─────────────────────────────── */
    async function open(code) {
      const { data, error } = await sb.rpc('get_gallery_by_code', { p_code: code });
      if (error || !data || !data.gallery) return null;

      // La Loge : sur le sous-domaine d'une agence, la galerie d'une AUTRE
      // agence est refusée (cohérence espace ↔ marque, comme app.html et
      // les pages event-*). Le lien de partage canonique d'une galerie
      // porte toujours le sous-domaine de son agence.
      if (AGENCY_SLUG && data.agency && data.agency.slug &&
          data.agency.slug !== AGENCY_SLUG) return null;

      const g = data.gallery, cfg = g.config || {}, T = tpl(g.template);
      applyBrand(data.agency);

      const kind = g.kind || 'photos';
      const heading = kind === 'video' ? T.video : T.photos;
      document.title = `${g.title} — ${(data.agency && data.agency.name) || 'La Loge'}`;
      el('vKicker').textContent = T.kicker;
      el('vTitle').textContent = g.title || heading;
      const who = (data.client && data.client.name) || '';
      const bits = [who, cfg.date || '', cfg.lieu || ''].filter(Boolean);
      el('vSub').textContent = bits.join(' · ');

      // ── Palette de couleurs (parité event-photos.html) ──
      // Choisie dans l'admin ; « custom » dérive toute la gamme depuis
      // fond + accent + base sombre/claire (même moteur qu'event-photos).
      const PAL = cfg.palette || 'noir';
      const LIGHT_PRESETS = ['creme', 'lin', 'sauge', 'brume'];
      let isLight = LIGHT_PRESETS.includes(PAL);
      const rootStyle = document.documentElement.style;
      if (PAL === 'custom') {
        const hx = (h) => {
          h = (h || '').replace('#', '').trim();
          if (h.length === 3) h = h.split('').map(ch => ch + ch).join('');
          if (!/^[0-9a-fA-F]{6}$/.test(h)) h = '1a1714';
          return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
        };
        const clp = (v) => Math.max(0, Math.min(255, Math.round(v)));
        const hex = (c) => '#' + c.map(v => clp(v).toString(16).padStart(2, '0')).join('');
        const mix = (a, b, t) => a.map((v, i) => v + (b[i] - v) * t);
        const rgba = (c, a) => 'rgba(' + c.map(v => clp(v)).join(',') + ',' + a + ')';
        const W = [255, 255, 255], K = [0, 0, 0];
        const bgC = hx(cfg.customBg || '#1a1714'), accC = hx(cfg.customAccent || '#b08968');
        isLight = cfg.customMode === 'light';
        const ink = isLight ? mix(K, bgC, 0.13) : mix(W, bgC, 0.07);
        const vars = {
          '--bg': hex(bgC),
          '--bg-deep': hex(mix(bgC, K, isLight ? 0.06 : 0.42)),
          '--bg-elev': hex(isLight ? mix(bgC, K, 0.045) : mix(bgC, W, 0.07)),
          '--surface': hex(isLight ? mix(bgC, K, 0.045) : mix(bgC, W, 0.07)),
          '--ink': hex(ink),
          '--ink-soft': hex(mix(ink, bgC, isLight ? 0.46 : 0.44)),
          '--ink-dim': hex(mix(ink, bgC, isLight ? 0.66 : 0.68)),
          '--accent': hex(accC),
          '--accent-gl': rgba(accC, isLight ? 0.12 : 0.14),
          '--line': rgba(ink, 0.10),
          '--line-soft': rgba(ink, isLight ? 0.05 : 0.06),
          '--shadow': isLight ? '0 30px 90px rgba(0,0,0,0.15)' : '0 30px 90px rgba(0,0,0,0.7)',
        };
        for (const [k, v] of Object.entries(vars)) rootStyle.setProperty(k, v);
      } else if (PAL !== 'noir') {
        document.documentElement.setAttribute('data-theme', PAL);
        // La palette choisie PORTE son accent : elle prime sur l'accent de
        // marque posé par applyBrand (inline, qui gagnerait sinon sur le CSS).
        rootStyle.removeProperty('--accent');
      }
      document.documentElement.classList.toggle('is-light', isLight);
      // La barre d'état mobile suit le fond de la palette
      try {
        el('metaTheme').setAttribute('content',
          getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0a0a0a');
      } catch (_) {}

      // ── Couverture : 5 dispositions (config.coverMode) ──
      // Héritage : style 'cinematic' (1re version) → 'fill' ; rien → en-tête
      // simple (galeries déjà partagées : comportement inchangé).
      const MODES = ['fill', 'fit', 'split', 'editorial', 'portrait'];
      const coverMode = MODES.includes(cfg.coverMode) ? cfg.coverMode
        : (cfg.style === 'cinematic' ? 'fill' : null);
      const hasPhotos = kind === 'photos' || kind === 'mixte';
      const flatPhotos = (data.photos || []).flatMap(c => (c && c.photos) || []);
      const cover = flatPhotos.find(p => String(p.id) === String(cfg.cover)) || flatPhotos[0];
      if (coverMode && hasPhotos && cover) {
        el('coverMark').innerHTML = el('vMark').innerHTML;
        el('coverKicker').textContent = T.kicker;
        el('coverTitle').textContent = g.title || heading;
        const sub = el('coverSub');
        sub.innerHTML = '';
        bits.forEach((b, i) => {
          if (i) sub.appendChild(document.createElement('i'));
          sub.appendChild(document.createTextNode(b));
        });
        const hi = cover.url_view || cover.url_original || cover.url_grid || '';
        const lo = cover.url_grid || hi;
        if (coverMode === 'fill') {
          el('coverBg').style.backgroundImage = 'url("' + hi.replace(/"/g, '%22') + '")';
        } else {
          el('cover').classList.add('mode-' + coverMode);
          const img = el('coverPhoto');
          img.src = lo;
          const big = new Image();
          big.onload = () => {
            if (coverMode === 'fit') {
              const r = big.naturalWidth / big.naturalHeight;
              el('cover').classList.add(r >= 1.15 ? 'is-landscape' : (r <= 0.85 ? 'is-portrait' : 'is-square'));
            }
            img.src = big.src;
            requestAnimationFrame(() => img.classList.add('on'));
          };
          big.onerror = () => img.classList.add('on');
          big.src = hi;
        }
        el('cover').hidden = false;
        el('view').querySelector('.head').style.display = 'none';
        el('coverScroll').onclick = () => {
          const target = el('videos').parentElement;
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
      }

      // ⚠️ La galerie est révélée AVANT le montage : la grille justifiée
      // mesure la largeur réelle de son conteneur, qui vaut 0 tant que
      // #view est en display:none (toutes les cellules tomberaient alors
      // sur la largeur plancher de 80 px).
      el('gate').hidden = true;
      el('view').classList.add('on');
      document.body.classList.add('ready');

      // Vidéos — 'video' et 'mixte'
      if (kind === 'video' || kind === 'mixte') {
        const vids = normalizeVideos(cfg);
        if (vids.length) await mountVideos(el('videos'), vids, { forceTitles: kind === 'mixte' });
      }
      // Photos — 'photos' et 'mixte'.
      // Mode galerie : 'flat' fusionne toutes les catégories en une seule
      // (tout mélangé, sans têtes de section) ; 'categorized' les garde.
      if (kind === 'photos' || kind === 'mixte') {
        let cats = data.photos || [];
        if ((cfg.galleryMode || 'categorized') === 'flat' && cats.length > 1) {
          cats = [{ category: '', photos: flatPhotos }];
        }
        mountPhotos(el('photos'), cats, { favKey: code, title: g.title });
      }
      return true;
    }

    /* ── Démarrage ───────────────────────────────────────────── */
    (async () => {
      // Marque du sous-domaine, chargée avant toute saisie
      if (AGENCY_SLUG) {
        try {
          const { data } = await sb.rpc('resolve_agency_brand', { p_slug: AGENCY_SLUG });
          if (data) applyBrand(data);
        } catch (_) {}
      }
      const code = (qs.get('c') || '').trim().toLowerCase();
      if (!code) return showGate();
      const ok = await open(code);
      if (!ok) showGate("Cette galerie est introuvable ou n'est plus partagée.");
    })();

    /* ── Saisie manuelle ─────────────────────────────────────── */
    el('gateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      // Même normalisation que les autres portes d'entrée (app.html)
      const code = el('gateCode').value.toLowerCase().normalize('NFD')
        .replace(/[̀-ͯ]/g, '').replace(/&/g, ' ').trim()
        .replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-+|-+$/g, '');
      if (!code) return;
      const btn = el('gateBtn');
      btn.disabled = true;
      el('gateErr').classList.remove('on');
      const ok = await open(code);
      if (ok) {
        // Le lien devient partageable / rechargeable tel quel
        history.replaceState(null, '', '?c=' + encodeURIComponent(code));
      } else {
        el('gateErr').textContent = "Code incorrect. Vérifiez-le et réessayez.";
        el('gateErr').classList.add('on');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
