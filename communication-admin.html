<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>/* HIG : contenu hors de l'encoche en paysage iPhone */body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);}</style>
  <title>TimelessHouse — Admin</title>

  <!-- PWA : app installable -->
  <link rel="manifest" href="/manifest-admin.webmanifest" />
  <meta name="theme-color" content="#e9e4d9" />
  <link rel="apple-touch-icon" href="/icons/admin-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TH Admin" />
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />


  <!-- Apply theme BEFORE rendering to avoid flash -->
  <script>
    (function(){
      try {
        if (localStorage.getItem('th-dark-mode') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {}
    })();
  </script>

  <style>
    body { margin: 0; background: #e9e4d9; font-family: 'Manrope', system-ui, sans-serif; transition: background 0.5s ease; }
    [data-theme="dark"] body { background: #181b20; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(134,121,106,0.32); border-radius: 4px; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(232,216,190,0.18); }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(232,216,190,0.32); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* ─── RÈGLE « HALO » (anti-collision d'ombres neumorphiques) ───
       Un conteneur qui défile rogne toute ombre peinte hors de sa boîte.
       Toute bande défilante de pastilles réserve donc d'office 12 px
       verticaux (portée du halo d'une pastille raisedXs = 10 px).
       Ne jamais compenser à la main avec py-*/-my-* : la règle gagne.
       display:flex rend chaque enfant « flex item », ce qui active le
       zIndex:2 du jeton raisedXs : une pastille est ainsi toujours
       peinte AU-DESSUS du halo des grandes cartes voisines.
       Les contrôles segmentés (.rounded-full, relief porté par le
       conteneur lui-même, ombres internes) sont exemptés. */
    .overflow-x-auto.no-scrollbar:not(.rounded-full) { display: flex; padding-top: 12px; padding-bottom: 12px; }
    input, textarea, select { font-family: inherit; }
    /* ── HIG P0 : AUCUN contrôle sous 16 px sur téléphone ──
       Sous 16 px, iOS zoome la page au focus… et le zoom RESTE après
       fermeture : c'est le bug « barre de navigation au milieu de
       l'écran » constaté par Gil le 22/07/2026 (formulaire galerie —
       des champs écrits hors composants héritaient de 13-14 px).
       Filet global : impossible d'oublier un champ à l'avenir.
       Les tailles desktop (sm:) restent libres. */
    @media (max-width: 639px) {
      input, select, textarea { font-size: 16px !important; }
    }
    input:focus, textarea:focus, select:focus { outline: none; }

    /* ─── Dark-mode color overrides (palette graphite + ivoire chaud) ─── */
    [data-theme="dark"] .text-stone-900 { color: #e6e8eb !important; }
    [data-theme="dark"] .text-stone-800 { color: #d4d6dc !important; }
    [data-theme="dark"] .text-stone-700 { color: #b6b9c0 !important; }
    [data-theme="dark"] .text-stone-600 { color: #969aa3 !important; }
    [data-theme="dark"] .text-stone-500 { color: #7e828b !important; }
    [data-theme="dark"] .text-stone-400 { color: #686c75 !important; }
    [data-theme="dark"] .text-stone-300 { color: #4f535c !important; }
    [data-theme="dark"] .bg-white { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-50 { background-color: #1d2025 !important; }
    [data-theme="dark"] .bg-stone-100 { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-200 { background-color: rgba(232,216,190,0.12) !important; }
    [data-theme="dark"] .bg-stone-300 { background-color: rgba(232,216,190,0.18) !important; }
    [data-theme="dark"] .bg-stone-900 { background-color: #e8d8be !important; }
    [data-theme="dark"] .text-white { color: #1a1410 !important; }
    [data-theme="dark"] .placeholder\:text-stone-400::placeholder { color: #686c75 !important; }
    [data-theme="dark"] .border-stone-200 { border-color: rgba(255,255,255,0.07) !important; }
    [data-theme="dark"] .border-stone-300 { border-color: rgba(232,216,190,0.22) !important; }
    [data-theme="dark"] .border-stone-900 { border-color: #e8d8be !important; }
    [data-theme="dark"] hr { border-color: rgba(255,255,255,0.07) !important; }

    /* Smooth theme transitions — only on direct theme-relevant containers,
       NOT on every single DOM element (that caused massive layout thrashing
       with React re-renders and memory spikes). */
    body, header, aside, nav, main {
      transition: background-color 0.45s ease, color 0.45s ease, border-color 0.45s ease;
    }
    /* ════════════════════════════════════════════════════════
       ♿ Correctifs HIG — vague 1 (P0), audit du 20/07/2026
       ════════════════════════════════════════════════════════ */

    /* §6 — Contrastes. Sur le fond crème #e9e4d9, les gris Tailwind
       utilisés pour le texte secondaire tombaient sous 4.5:1 :
       stone-500 → 3.3:1, stone-400 → 2.2:1. Illisibles pour beaucoup
       de gens, surtout sur les libellés de 10-12 px. On assombrit
       sans toucher à la palette de marque. */
    .text-stone-500 { color: #635c50 !important; }   /* 5.2:1 */
    .text-stone-400 { color: #6b6357 !important; }   /* 4.7:1 */
    .placeholder\:text-stone-400::placeholder,
    .placeholder\:text-stone-500::placeholder { color: #6b6357 !important; }

    /* §16 — Le focus clavier doit toujours se voir. Plusieurs champs
       posent outline:none pour leur style « pressé » : sans ce
       remplacement, la navigation au clavier devient aveugle. */
    :focus-visible {
      outline: 2px solid #2a2620;
      outline-offset: 3px;
      border-radius: 8px;
    }
    [data-theme="dark"] :focus-visible { outline-color: #e8d8be; }

    /* §4 — Cibles tactiles : l'interrupteur jour/nuit mesure 42×22 px.
       On garde son dessin fin et on étend la ZONE TACTILE à 44×44 px
       (la zone cliquable peut dépasser le visuel). `.dark-toggle` sert
       à l'espace client, `.th-hit-44` au composant React de la console
       — qui ne porte aucune classe de style. */
    .dark-toggle, .th-hit-44 { position: relative; }
    .dark-toggle::after, .th-hit-44::after {
      content: ""; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px;
    }

    /* §16 — Respecter « réduire les animations ». */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    /* ── Champs date et heure sur iOS (audit HIG du 20/07/2026) ──
       Safari donne aux <input type="date|time"> une largeur INTRINSÈQUE
       calculée sur le gabarit natif, qui l'emporte sur `width: 100%` :
       le champ débordait du cadre de la modale, seul élément du
       formulaire à ne pas s'aligner sur les autres (HIG §3, une
       interface s'adapte à son conteneur ; §13, champs de largeur
       cohérente). Trois règles suffisent :
         · appearance: none  → retire le gabarit natif qui impose la largeur
         · min-width: 0      → autorise la réduction sous la largeur mini
         · width/max-width   → aligne exactement sur les autres champs   */
    input[type="date"],
    input[type="time"],
    input[type="datetime-local"],
    input[type="month"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      /* Safari centre verticalement de travers sans hauteur explicite. */
      min-height: 48px;
      /* HIG §13 : 16 px minimum, sinon iOS zoome la page au focus. */
      font-size: 16px;
      font-family: inherit;
      color: inherit;
    }
    /* L'icône native de calendrier reste cliquable et alignée à droite. */
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      margin-left: auto;
      opacity: 0.55;
      cursor: pointer;
    }
    input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
    }
  </style>
</head>
<body>
  <div id="root"></div>


  <script type="module" src="./communication-admin.jsx"></script>
</body>
</html>
