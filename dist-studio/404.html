<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page introuvable</title>
  <!-- ⚠️ CE FICHIER EST UN GARDE-FOU CRITIQUE — NE PAS SUPPRIMER.
       Sans 404.html, Cloudflare Pages bascule en « repli SPA » : toute URL
       manquante (y compris /assets/xxx.js pendant la propagation d'un
       déploiement) reçoit index.html en 200… que le CDN met alors en cache
       « immutable, 1 an » sous l'URL du fichier JS. Résultat : bundle
       empoisonné, page blanche pour tous (incidents du 21/07/2026, admin
       puis galerie). Un vrai 404 n'est jamais caché ainsi. -->
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           background: #e9e4d9; color: #2a2620; font-family: -apple-system, "Segoe UI", sans-serif; text-align: center; padding: 24px; }
    h1 { font-size: 20px; font-weight: 600; margin: 12px 0 6px; }
    p { color: #6b6357; font-size: 14px; margin: 0 0 20px; }
    a { display: inline-block; min-height: 44px; line-height: 44px; padding: 0 22px; border-radius: 999px;
        background: #2a2620; color: #e8d8be; text-decoration: none; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div>
    <div style="font-size:40px">🧭</div>
    <h1>Page introuvable</h1>
    <p>Cette adresse n'existe pas ou n'existe plus.</p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
