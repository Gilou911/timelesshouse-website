<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Portfolio — TimelessHouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />

  <!-- Lien envoyé à des tiers : thème clair par défaut, mais on respecte
       un choix sombre déjà stocké (cohérent avec strategie-public). -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('th-dark-mode') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    })();
  </script>

  <style>
    body { margin: 0; background: #e9e4d9; font-family: 'Manrope', system-ui, sans-serif; }
    [data-theme="dark"] body { background: #181b20; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(134,121,106,0.32); border-radius: 4px; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(232,216,190,0.18); }
    input, textarea, select { font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; }

    /* ─── Dark-mode overrides (palette graphite + ivoire chaud) ─── */
    [data-theme="dark"] .text-stone-900 { color: #e6e8eb !important; }
    [data-theme="dark"] .text-stone-700 { color: #b6b9c0 !important; }
    [data-theme="dark"] .text-stone-500 { color: #7e828b !important; }
    [data-theme="dark"] .text-stone-400 { color: #686c75 !important; }
    [data-theme="dark"] .placeholder\:text-stone-400::placeholder { color: #686c75 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./portfolio-public.jsx"></script>
</body>
</html>
