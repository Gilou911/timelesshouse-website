<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Galerie — Lightbox UX (démo mobile)</title>
<style>
  /* ───────────── Reset / base ───────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { max-width: 100%; overflow-x: hidden; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: #f5f0ea;
    color: #1a1714;
    min-height: 100dvh;
  }
  h1 {
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    padding: 32px 24px 8px;
  }
  .hint {
    padding: 0 24px 24px;
    font-size: 13px;
    color: #6b5e54;
    letter-spacing: 0.04em;
  }

  /* ───────────── Grille ───────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(220px, 45vw), 1fr));
    gap: 8px;
    padding: 0 16px 80px;
  }
  .tile {
    aspect-ratio: 4 / 5;
    overflow: hidden;
    cursor: pointer;
    background: #e8e1d8;
    position: relative;
  }
  .tile img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .tile:hover img { transform: scale(1.04); }

  /* ═════════════════════════════════════════════════════════════
     LIGHTBOX
     ───────────────────────────────────────────────────────────── */
  .lb {
    position: fixed; inset: 0; z-index: 1000;
    background: #0c0a08;
    opacity: 0; visibility: hidden;
    transition: opacity 0.35s ease, visibility 0.35s ease;
    /* Bloque scroll natif et rubber-band sur iOS / Android */
    overscroll-behavior: contain;
    touch-action: none;
    /* Respecte la safe-area iPhone (notch + barre gestuelle) */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .lb.open { opacity: 1; visibility: visible; }

  /* Barre du haut : compteur + bouton fermer */
  .lb-bar {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 3;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(16px + env(safe-area-inset-top)) 18px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    pointer-events: none; /* le fond ne capte pas le tap, seul le bouton oui */
  }
  .lb-bar > * { pointer-events: auto; }
  .lb-count {
    font-family: "Cormorant Garamond", serif; font-style: italic;
    color: rgba(255,255,255,0.85);
    font-size: 0.95rem; letter-spacing: 0.18em;
  }
  .lb-count b { color: #fff; font-weight: 400; }

  /* Bouton de fermeture — la SEULE sortie possible */
  .lb-close {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.25s ease;
  }
  .lb-close:hover, .lb-close:focus-visible {
    background: rgba(255,255,255,0.15);
    transform: rotate(90deg);
    outline: none;
  }
  .lb-close svg { width: 20px; height: 20px; stroke-width: 1.8; }

  /* Boutons précédent/suivant (visibles desktop, masqués mobile) */
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 3;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.25s ease;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.15); }
  .lb-nav.prev { left: 18px; }
  .lb-nav.next { right: 18px; }
  .lb-nav svg { width: 22px; height: 22px; stroke-width: 1.6; }
  @media (hover: none) and (pointer: coarse) {
    .lb-nav { display: none; } /* mobile = swipe uniquement */
  }

  /* ─── Le carrousel : 3 slides côte à côte qui glissent ─── */
  .lb-track-wrap {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  .lb-track {
    position: absolute;
    top: 0;
    left: -100%;          /* slide actuelle = milieu, donc on décale */
    width: 300%;          /* 3 slides */
    height: 100%;
    display: flex;
    /* Pas de transition par défaut ; on l'active à la fin du swipe */
    will-change: transform;
  }
  .lb-slide {
    width: 33.3333%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;   /* marge pour la barre du haut */
  }
  .lb-slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none; /* le tap sur l'image NE doit PAS fermer */
  }

  /* Légende en bas */
  .lb-cap {
    position: absolute; bottom: calc(24px + env(safe-area-inset-bottom));
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    pointer-events: none;
    z-index: 3;
  }
</style>
</head>
<body>

  <h1>Notre galerie</h1>
  <p class="hint">Tape une photo. Glisse à gauche / droite pour passer à la suivante. Seul le bouton ✕ ferme.</p>

  <div class="grid" id="grid"></div>

  <!-- ═════════════ LIGHTBOX ═════════════ -->
  <div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="Visionneuse photo">

    <div class="lb-bar">
      <div class="lb-count"><b id="lbI">1</b> <span style="opacity:.5">/</span> <span id="lbN">1</span></div>
      <button class="lb-close" id="lbClose" type="button" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <button class="lb-nav prev" id="lbPrev" type="button" aria-label="Précédente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="lb-nav next" id="lbNext" type="button" aria-label="Suivante">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <!-- Le carrousel : on rend 3 slides en permanence (prev / current / next) -->
    <div class="lb-track-wrap">
      <div class="lb-track" id="lbTrack">
        <div class="lb-slide" data-pos="prev"><img alt="" /></div>
        <div class="lb-slide" data-pos="current"><img alt="" /></div>
        <div class="lb-slide" data-pos="next"><img alt="" /></div>
      </div>
    </div>

    <div class="lb-cap" id="lbCap"></div>
  </div>

<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║  DÉMO — données factices (Picsum). Remplace par FLAT[]       ║
   ║  dans event-photos.html (chaque entrée a au moins .id + .scene) ║
   ╚══════════════════════════════════════════════════════════════╝ */
const PHOTOS = Array.from({ length: 16 }, (_, i) => ({
  id: 100 + i * 7,
  scene: ['Cérémonie', 'Cocktail', 'Dîner', 'Soirée'][i % 4]
}));
const imgUrl = (p, size) => `https://picsum.photos/id/${p.id}/${size}`;

/* Construction de la grille */
const grid = document.getElementById('grid');
PHOTOS.forEach((p, i) => {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.innerHTML = `<img src="${imgUrl(p, '600/750')}" loading="lazy" alt="">`;
  tile.addEventListener('click', () => openLb(i));
  grid.appendChild(tile);
});


/* ╔══════════════════════════════════════════════════════════════╗
   ║  LIGHTBOX — état & helpers                                   ║
   ╚══════════════════════════════════════════════════════════════╝ */
const lb       = document.getElementById('lb');
const lbTrack  = document.getElementById('lbTrack');
const lbSlides = lbTrack.querySelectorAll('.lb-slide img');
const lbCount  = { i: document.getElementById('lbI'), n: document.getElementById('lbN') };
const lbCap    = document.getElementById('lbCap');

let lbOpen  = false;
let lbIdx   = 0;
let isAnimating = false;


/* ────────────────────────────────────────────────────────────────
   1) VERROUILLAGE DU FOND — version iOS-safe
   ────────────────────────────────────────────────────────────────
   `overflow:hidden` sur <body> N'EST PAS fiable sur iOS Safari.
   La technique fiable : on fige <body> à sa position actuelle
   via position:fixed + top négatif, puis on restaure au close.
   ──────────────────────────────────────────────────────────────── */
let savedScrollY = 0;

function lockBody() {
  savedScrollY = window.scrollY || window.pageYOffset || 0;
  const body = document.body;
  body.style.position = 'fixed';
  body.style.top = `-${savedScrollY}px`;
  body.style.left = '0';
  body.style.right = '0';
  body.style.width = '100%';
  body.style.overflow = 'hidden'; // ceinture + bretelles pour Android
}

function unlockBody() {
  const body = document.body;
  body.style.position = '';
  body.style.top = '';
  body.style.left = '';
  body.style.right = '';
  body.style.width = '';
  body.style.overflow = '';
  // Restauration EXACTE de la position de scroll
  window.scrollTo(0, savedScrollY);
}


/* ────────────────────────────────────────────────────────────────
   Rendu du carrousel : 3 slides (prev / current / next)
   ──────────────────────────────────────────────────────────────── */
function renderSlides() {
  const n = PHOTOS.length;
  const prevIdx = (lbIdx - 1 + n) % n;
  const nextIdx = (lbIdx + 1) % n;

  lbSlides[0].src = imgUrl(PHOTOS[prevIdx], '1600/1200');
  lbSlides[1].src = imgUrl(PHOTOS[lbIdx],   '1600/1200');
  lbSlides[2].src = imgUrl(PHOTOS[nextIdx], '1600/1200');

  lbSlides[0].alt = PHOTOS[prevIdx].scene;
  lbSlides[1].alt = PHOTOS[lbIdx].scene;
  lbSlides[2].alt = PHOTOS[nextIdx].scene;

  lbCount.i.textContent = lbIdx + 1;
  lbCount.n.textContent = n;
  lbCap.textContent = PHOTOS[lbIdx].scene;

  // Toujours recentré sur la slide du milieu, sans animation
  lbTrack.style.transition = 'none';
  lbTrack.style.transform  = 'translateX(0)';
}


/* ────────────────────────────────────────────────────────────────
   Navigation : passage à la slide suivante / précédente
   ──────────────────────────────────────────────────────────────── */
function step(direction) {
  if (isAnimating) return;
  isAnimating = true;

  // 1) Animation de sortie : la track glisse hors écran
  const w = lb.clientWidth;
  lbTrack.style.transition = 'transform 0.32s cubic-bezier(0.22, 0.61, 0.36, 1)';
  lbTrack.style.transform  = `translateX(${-direction * w}px)`;

  // 2) À la fin de l'anim, on met à jour l'index et on recentre instantanément
  const onEnd = () => {
    lbTrack.removeEventListener('transitionend', onEnd);
    lbIdx = (lbIdx + direction + PHOTOS.length) % PHOTOS.length;
    renderSlides();      // recentre la track sans transition
    isAnimating = false;
  };
  lbTrack.addEventListener('transitionend', onEnd);
}


/* ────────────────────────────────────────────────────────────────
   Open / Close
   ──────────────────────────────────────────────────────────────── */
function openLb(i) {
  lbIdx = i;
  lbOpen = true;
  renderSlides();
  lb.classList.add('open');
  lockBody();
}

function closeLb() {
  if (!lbOpen) return;
  lbOpen = false;
  lb.classList.remove('open');
  unlockBody();
}


/* ────────────────────────────────────────────────────────────────
   2) SORTIE STRICTE : seul le bouton ✕ (et Échap au clavier) ferme.
      Aucun listener sur le fond. AUCUN swipe vertical ne ferme.
   ──────────────────────────────────────────────────────────────── */
document.getElementById('lbClose').addEventListener('click', closeLb);
document.getElementById('lbPrev').addEventListener('click',  () => step(-1));
document.getElementById('lbNext').addEventListener('click',  () => step(1));

document.addEventListener('keydown', (e) => {
  if (!lbOpen) return;
  if (e.key === 'Escape')      closeLb();
  else if (e.key === 'ArrowRight') step(1);
  else if (e.key === 'ArrowLeft')  step(-1);
});


/* ╔══════════════════════════════════════════════════════════════╗
   ║ 3) SWIPE TEMPS RÉEL — l'image suit le doigt                 ║
   ╚══════════════════════════════════════════════════════════════╝
   Principe :
   - touchstart : on note la position du doigt.
   - touchmove  : si le mouvement est principalement HORIZONTAL,
                  on prend la main (preventDefault) et on déplace
                  la track en suivant le doigt en temps réel.
                  Si le mouvement est VERTICAL, on l'ignore (le
                  fond reste verrouillé par lockBody + touch-action).
   - touchend   : on décide — flick (vitesse) ou drag suffisant
                  (> 20% de la largeur) → on change de slide ;
                  sinon → retour à la position d'origine.
   ────────────────────────────────────────────────────────────── */

const SWIPE_RATIO    = 0.20;   // 20% de la largeur écran = commit
const SWIPE_VELOCITY = 0.5;    // px/ms = flick rapide
const LOCK_THRESHOLD = 8;      // px avant de décider de la direction

let touchStartX = 0;
let touchStartY = 0;
let touchStartT = 0;
let dragX = 0;
let isDragging = false;       // on a verrouillé en "horizontal"
let directionLocked = false;  // direction déterminée pour ce geste

lb.addEventListener('touchstart', (e) => {
  if (isAnimating || e.touches.length !== 1) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartT = Date.now();
  dragX = 0;
  isDragging = false;
  directionLocked = false;
  // Coupe la transition pour suivre le doigt sans latence
  lbTrack.style.transition = 'none';
}, { passive: true });

lb.addEventListener('touchmove', (e) => {
  if (isAnimating || e.touches.length !== 1) return;
  const t  = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;

  // Étape 1 : tant que la direction n'est pas verrouillée,
  // on observe vers où le geste part vraiment.
  if (!directionLocked) {
    if (Math.abs(dx) < LOCK_THRESHOLD && Math.abs(dy) < LOCK_THRESHOLD) return;
    directionLocked = true;
    isDragging = Math.abs(dx) > Math.abs(dy);
    // Si geste vertical : on ne fait RIEN. Le fond est verrouillé,
    // donc rien ne bouge ; aucune fermeture déclenchée.
  }

  if (isDragging) {
    // On prend la main : empêche le navigateur de scroller / rubber-band
    if (e.cancelable) e.preventDefault();
    dragX = dx;
    lbTrack.style.transform = `translateX(${dx}px)`;
  }
}, { passive: false }); // passive:false OBLIGATOIRE pour preventDefault

lb.addEventListener('touchend', () => {
  if (!isDragging || isAnimating) {
    isDragging = false;
    directionLocked = false;
    return;
  }
  isDragging = false;
  directionLocked = false;

  const w        = lb.clientWidth;
  const dt       = Date.now() - touchStartT;
  const velocity = Math.abs(dragX) / Math.max(dt, 1);

  const farEnough = Math.abs(dragX) > w * SWIPE_RATIO;
  const fastEnough = velocity > SWIPE_VELOCITY;

  lbTrack.style.transition = 'transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1)';

  if (farEnough || fastEnough) {
    // Commit : on glisse jusqu'au bord et on change d'index
    const direction = dragX < 0 ? 1 : -1;
    isAnimating = true;
    lbTrack.style.transform = `translateX(${-direction * w}px)`;
    const onEnd = () => {
      lbTrack.removeEventListener('transitionend', onEnd);
      lbIdx = (lbIdx + direction + PHOTOS.length) % PHOTOS.length;
      renderSlides();
      isAnimating = false;
    };
    lbTrack.addEventListener('transitionend', onEnd);
  } else {
    // Snap back
    lbTrack.style.transform = 'translateX(0)';
  }
});

// Annule proprement si le geste est interrompu (appel téléphonique, etc.)
lb.addEventListener('touchcancel', () => {
  if (isDragging) {
    lbTrack.style.transition = 'transform 0.25s ease-out';
    lbTrack.style.transform  = 'translateX(0)';
  }
  isDragging = false;
  directionLocked = false;
});
</script>
</body>
</html>
