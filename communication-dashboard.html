<!DOCTYPE html>
<html lang="fr">
<head>
  <script src="/maintenance-banner.js"></script>

  <meta charset="UTF-8" />
  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tableau de bord — TimelessHouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />

  <!-- PWA : app installable (écran d'accueil, plein écran) -->
  <link rel="manifest" href="/manifest-client.webmanifest" />
  <meta name="theme-color" content="#e9e4d9" />
  <link rel="apple-touch-icon" href="/icons/client-192.png" />

  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>


  <!-- Apply theme BEFORE rendering to avoid flash -->
  <script>
    (function(){
      try {
        if (localStorage.getItem('th-dark-mode') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {}
    })();
  </script>

  <style>
    body { margin: 0; background: #e9e4d9; font-family: 'Manrope', system-ui, sans-serif; transition: background 0.5s ease; }
    [data-theme="dark"] body { background: #181b20; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(134,121,106,0.32); border-radius: 4px; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(232,216,190,0.18); }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(232,216,190,0.32); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* ─── RÈGLE « HALO » (anti-collision d'ombres neumorphiques) ───
       Un conteneur qui défile rogne toute ombre peinte hors de sa boîte.
       Toute bande défilante de pastilles réserve donc d'office 12 px
       verticaux (portée du halo d'une pastille raisedXs = 10 px).
       Ne jamais compenser à la main avec py-*/-my-* : la règle gagne.
       display:flex rend chaque enfant « flex item », ce qui active le
       zIndex:2 du jeton raisedXs : une pastille est ainsi toujours
       peinte AU-DESSUS du halo des grandes cartes voisines.
       Les contrôles segmentés (.rounded-full, relief porté par le
       conteneur lui-même, ombres internes) sont exemptés. */
    .overflow-x-auto.no-scrollbar:not(.rounded-full) { display: flex; padding-top: 12px; padding-bottom: 12px; }
    /* ── HIG P0 : AUCUN contrôle sous 16 px sur téléphone ──
       Sous 16 px, iOS zoome la page au focus et le zoom RESTE après —
       page « cassée » (nav flottante au milieu). Filet global, même
       raison que côté console (bug du 22/07/2026). */
    @media (max-width: 639px) {
      input, select, textarea { font-size: 16px !important; }
    }
    .loading-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #e9e4d9; z-index: 9999; transition: opacity 0.5s ease, background 0.5s ease; }
    [data-theme="dark"] .loading-screen { background: #181b20; }
    .loading-screen.hide { opacity: 0; pointer-events: none; }
    .loading-spinner { width: 38px; height: 38px; border: 2.5px solid #d8d1c0; border-top-color: #2a2620; border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 18px; }
    [data-theme="dark"] .loading-spinner { border-color: rgba(232,216,190,0.18); border-top-color: #e8d8be; box-shadow: 0 0 14px rgba(232,216,190,0.35); }
    .loading-text { font-family: 'Instrument Serif', serif; font-size: 22px; color: #2a2620; letter-spacing: -0.01em; }
    [data-theme="dark"] .loading-text { color: #e6e8eb; }
    .loading-sub { font-size: 12px; color: #86796a; margin-top: 4px; }
    [data-theme="dark"] .loading-sub { color: #7e828b; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Overrides Tailwind pour mode DARK (palette cyan + graphite) ─── */
    [data-theme="dark"] .text-stone-900 { color: #e6e8eb !important; }
    [data-theme="dark"] .text-stone-800 { color: #d4d6dc !important; }
    [data-theme="dark"] .text-stone-700 { color: #b6b9c0 !important; }
    [data-theme="dark"] .text-stone-600 { color: #969aa3 !important; }
    [data-theme="dark"] .text-stone-500 { color: #7e828b !important; }
    [data-theme="dark"] .text-stone-400 { color: #686c75 !important; }
    [data-theme="dark"] .text-stone-300 { color: #4f535c !important; }
    [data-theme="dark"] .bg-white { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-50 { background-color: #1d2025 !important; }
    [data-theme="dark"] .bg-stone-100 { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-200 { background-color: rgba(232,216,190,0.12) !important; }
    [data-theme="dark"] .bg-stone-300 { background-color: rgba(232,216,190,0.18) !important; }
    [data-theme="dark"] .bg-stone-900 { background-color: #e8d8be !important; }
    [data-theme="dark"] .text-white { color: #1a1410 !important; }
    [data-theme="dark"] .placeholder\:text-stone-400::placeholder { color: #686c75 !important; }
    [data-theme="dark"] .border-stone-200 { border-color: rgba(255,255,255,0.07) !important; }
    [data-theme="dark"] .border-stone-300 { border-color: rgba(232,216,190,0.22) !important; }
    [data-theme="dark"] hr { border-color: rgba(255,255,255,0.07) !important; }

    /* — Tabs / underlines — cyan en dark */
    [data-theme="dark"] .border-stone-900 { border-color: #e8d8be !important; }

    /* — Hover states sur boutons cyan (bg-stone-900 → cyan, hover doit rester cyan-darker, pas gris) */
    [data-theme="dark"] .hover\:bg-stone-800:hover { background-color: #1bbabe !important; }
    [data-theme="dark"] .hover\:bg-white\/20:hover { background-color: rgba(232,216,190,0.18) !important; }

    /* — bg-stone-700 / bg-stone-800 statiques (rares — calendar today photo chip, etc.) */
    [data-theme="dark"] .bg-stone-700 { background-color: rgba(255,255,255,0.08) !important; }
    [data-theme="dark"] .bg-stone-800 { background-color: #1bbabe !important; }

    /* — Status colors — emerald / amber / rose adoucis pour fond graphite */
    [data-theme="dark"] .bg-emerald-50  { background-color: rgba(52,211,153,0.10) !important; }
    [data-theme="dark"] .bg-emerald-100 { background-color: rgba(52,211,153,0.14) !important; }
    [data-theme="dark"] .text-emerald-700 { color: #6ee7b7 !important; }
    [data-theme="dark"] .text-emerald-600 { color: #34d399 !important; }
    [data-theme="dark"] .text-emerald-500 { color: #34d399 !important; }
    [data-theme="dark"] .bg-emerald-500 { background-color: #10b981 !important; }
    [data-theme="dark"] .bg-emerald-600 { background-color: #10b981 !important; }
    [data-theme="dark"] .hover\:bg-emerald-100:hover { background-color: rgba(52,211,153,0.20) !important; }

    [data-theme="dark"] .bg-amber-100 { background-color: rgba(251,191,36,0.14) !important; }
    [data-theme="dark"] .text-amber-700 { color: #fcd34d !important; }
    [data-theme="dark"] .text-amber-600 { color: #fbbf24 !important; }
    [data-theme="dark"] .text-amber-200 { color: #fde68a !important; }
    [data-theme="dark"] .bg-amber-400 { background-color: #f59e0b !important; }

    [data-theme="dark"] .bg-rose-50  { background-color: rgba(244,114,182,0.10) !important; }
    [data-theme="dark"] .bg-rose-100 { background-color: rgba(244,114,182,0.14) !important; }
    [data-theme="dark"] .text-rose-700 { color: #fda4af !important; }
    [data-theme="dark"] .text-rose-400 { color: #fb7185 !important; }
    [data-theme="dark"] .bg-rose-600 { background-color: #e11d48 !important; }
    [data-theme="dark"] .hover\:bg-rose-100:hover { background-color: rgba(244,114,182,0.20) !important; }

    /* — Recharts (Cartesian grid + Axis ticks + Tooltip) */
    [data-theme="dark"] .recharts-cartesian-grid line { stroke: rgba(255,255,255,0.06) !important; }
    [data-theme="dark"] .recharts-cartesian-axis-tick-value tspan { fill: #7e828b !important; }
    [data-theme="dark"] .recharts-default-tooltip { background-color: #22262d !important; border-color: rgba(232,216,190,0.25) !important; color: #e6e8eb !important; }
    [data-theme="dark"] .recharts-tooltip-label,
    [data-theme="dark"] .recharts-tooltip-item { color: #e6e8eb !important; }

    /* — Utilitaires custom : glow cyan signature */
    .th-glow-accent { transition: box-shadow 0.3s ease; }
    [data-theme="dark"] .th-glow-accent { box-shadow: 0 0 24px rgba(232,216,190,0.28); }
    [data-theme="dark"] .th-glow-accent:hover { box-shadow: 0 0 32px rgba(232,216,190,0.45); }

    /* — Transitions thème globales — restreint aux conteneurs principaux
       pour éviter le layout thrashing lors des re-renders React */
    body, header, aside, nav, main {
      transition: background-color 0.45s ease, color 0.45s ease, border-color 0.45s ease;
    }

    /* — Selection texte — cyan glow en dark, warm en light */
    ::selection { background: rgba(42,38,32,0.18); color: #2a2620; }
    [data-theme="dark"] ::selection { background: rgba(232,216,190,0.35); color: #1a1410; }

    /* — Focus visible (accessibilité) — */
    [data-theme="dark"] *:focus-visible { outline: 2px solid #e8d8be; outline-offset: 2px; }
    *:focus-visible { outline: 2px solid #2a2620; outline-offset: 2px; }
  
    /* ════════════════════════════════════════════════
       DURCISSEMENT RESPONSIVE UNIVERSEL — TimelessHouse
       Filet de sécurité mobile/tablette, additif et non destructif
       ════════════════════════════════════════════════ */

    /* 1 — Anti-débordement horizontal global */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }
    *, *::before, *::after { -webkit-tap-highlight-color: transparent; }
    img, video, svg, iframe { max-width: 100%; height: auto; }
    video, iframe { display: block; }

    /* Exception lightbox : on laisse le média remplir son conteneur.
       Le wrapper React .fixed.inset-0 sert d'ancrage CSS, indépendant de Tailwind.
       ⚠️ iframe inclus : sans ça, le `iframe { height: auto }` ci-dessus (non-layéré)
       bat le Tailwind .h-full (layéré dans @layer utilities), et l'iframe reste à
       sa taille intrinsèque 300×150 — créant une boucle de calcul avec aspect-video. */
    .fixed.inset-0 video,
    .fixed.inset-0 img,
    .fixed.inset-0 iframe {
      width: 100%;
      height: 100%;
      max-height: 100%;
    }

    /* 2 — 100vh → utilise la hauteur dynamique réelle (barre URL mobile) */
    @supports (height: 100dvh) {
      .full-h, .hero, .min-h-screen { min-height: 100dvh; }
    }

    /* 3 — Confort tactile : cibles ≥ 44px sur écrans tactiles */
    @media (hover: none) and (pointer: coarse) {
      a, button, [role="button"], input[type="submit"], input[type="button"], .btn, .btn-primary, .btn-action, .filter-btn {
        min-height: 44px;
      }
      a:not(.logo):not(.inline-link), button, [role="button"] {
        touch-action: manipulation;
      }
    }

    /* 4 — Empêche le zoom auto iOS sur focus champ (police ≥ 16px) */
    @media (max-width: 768px) {
      input, select, textarea {
        font-size: 16px !important;
      }
    }

    /* 5 — Safe-area : encoches & barre gestuelle iPhone */
    @supports (padding: max(0px)) {
      body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* 6 — Tablette : conteneurs fluides */
    @media (max-width: 1024px) {
      .container, .wrapper, [class*="max-w-"] {
        padding-left: clamp(16px, 4vw, 40px);
        padding-right: clamp(16px, 4vw, 40px);
      }
    }

    /* 7 — Téléphone : typographie & espacement resserrés */
    @media (max-width: 640px) {
      h1 { font-size: clamp(1.6rem, 7vw, 2.4rem); line-height: 1.1; }
      h2 { font-size: clamp(1.3rem, 5.5vw, 2rem); }
      h3 { font-size: clamp(1.1rem, 4.5vw, 1.5rem); }
      .grid, [class*="grid-cols"] { gap: 12px; }
    }

    /* 8 — Très petits écrans : grilles multi-colonnes → 1 colonne */
    @media (max-width: 420px) {
      [style*="grid-template-columns"]:not([data-keep-grid]) {
        grid-template-columns: 1fr !important;
      }
    }

    /* 9 — Scroll fluide tactile pour barres horizontales */
    .filter-bar, .scroll-x, [class*="overflow-x"] {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar, .scroll-x::-webkit-scrollbar { display: none; }

    /* 10 — Désactive le hover « collant » sur tactile */
    @media (hover: none) {
      *:hover { transition: none !important; }
    }

    /* ════════════════════════════════════════════════════════
       ♿ Correctifs HIG — vague 1 (P0), audit du 20/07/2026
       ════════════════════════════════════════════════════════ */

    /* §6 — Contrastes. Sur le fond crème #e9e4d9, les gris Tailwind
       utilisés pour le texte secondaire tombaient sous 4.5:1 :
       stone-500 → 3.3:1, stone-400 → 2.2:1. Illisibles pour beaucoup
       de gens, surtout sur les libellés de 10-12 px. On assombrit
       sans toucher à la palette de marque. */
    .text-stone-500 { color: #635c50 !important; }   /* 5.2:1 */
    .text-stone-400 { color: #6b6357 !important; }   /* 4.7:1 */
    .placeholder\:text-stone-400::placeholder,
    .placeholder\:text-stone-500::placeholder { color: #6b6357 !important; }

    /* §16 — Le focus clavier doit toujours se voir. Plusieurs champs
       posent outline:none pour leur style « pressé » : sans ce
       remplacement, la navigation au clavier devient aveugle. */
    :focus-visible {
      outline: 2px solid #2a2620;
      outline-offset: 3px;
      border-radius: 8px;
    }
    [data-theme="dark"] :focus-visible { outline-color: #e8d8be; }

    /* §4 — Cibles tactiles : l'interrupteur jour/nuit mesure 42×22 px.
       On garde son dessin fin et on étend la ZONE TACTILE à 44×44 px
       (la zone cliquable peut dépasser le visuel). `.dark-toggle` sert
       à l'espace client, `.th-hit-44` au composant React de la console
       — qui ne porte aucune classe de style. */
    .dark-toggle, .th-hit-44 { position: relative; }
    .dark-toggle::after, .th-hit-44::after {
      content: ""; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px;
    }

    /* §16 — Respecter « réduire les animations ». */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    /* ── Champs date et heure sur iOS (audit HIG du 20/07/2026) ──
       Safari donne aux <input type="date|time"> une largeur INTRINSÈQUE
       calculée sur le gabarit natif, qui l'emporte sur `width: 100%` :
       le champ débordait du cadre de la modale, seul élément du
       formulaire à ne pas s'aligner sur les autres (HIG §3, une
       interface s'adapte à son conteneur ; §13, champs de largeur
       cohérente). Trois règles suffisent :
         · appearance: none  → retire le gabarit natif qui impose la largeur
         · min-width: 0      → autorise la réduction sous la largeur mini
         · width/max-width   → aligne exactement sur les autres champs   */
    input[type="date"],
    input[type="time"],
    input[type="datetime-local"],
    input[type="month"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      /* Safari centre verticalement de travers sans hauteur explicite. */
      min-height: 48px;
      /* HIG §13 : 16 px minimum, sinon iOS zoome la page au focus. */
      font-size: 16px;
      font-family: inherit;
      color: inherit;
    }
    /* L'icône native de calendrier reste cliquable et alignée à droite. */
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      margin-left: auto;
      opacity: 0.55;
      cursor: pointer;
    }
    input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Chargement de votre espace</div>
    <div class="loading-sub">Connexion sécurisée…</div>
  </div>

  <div id="root"></div>


  <script type="module">
    // — Config Supabase injectée par Vite depuis .env (variables VITE_*)
    const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL;
    const SUPABASE_ANON_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;
    // Rétrocompatibilité pour les scripts classiques de la page qui lisent window.SUPABASE_*
    window.SUPABASE_URL = SUPABASE_URL;
    window.SUPABASE_ANON_KEY = SUPABASE_ANON_KEY;

    import { createClient } from '@supabase/supabase-js';
    import { allowsAnalytics } from './univers.js';

    let code = sessionStorage.getItem('access_granted');
    if (!code) {
      // App installée / nouvel onglet : reprend le code mémorisé au login
      try { code = localStorage.getItem('th_access_code'); } catch (e) {}
      if (code) sessionStorage.setItem('access_granted', code);
    }
    if (!code) { window.location.href = '/app'; throw new Error('No access'); }

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Hall des galeries (SaaS B.3, brique 13) — lancé EN PARALLÈLE du
    // portail pour ne rien ajouter au temps de chargement. Les galeries
    // autonomes ont leur propre code ; l'espace client se contente de
    // lister celles de son client et d'y renvoyer.
    const galleriesPromise = sb.rpc('get_client_galleries', { p_code: code })
      .then(r => (r.error ? [] : (r.data || [])))
      .catch(() => []);

    // RPC scellée (SaaS B.2) : tout le portail en un appel, vérifié
    // côté serveur par le code d'accès — remplace 8 selects anon.
    const { data: portal, error: cErr } = await sb.rpc('get_client_portal', { p_code: code });

    if (cErr || !portal) {
      sessionStorage.removeItem('access_granted');
      window.location.href = '/app';
      throw new Error('Client not found');
    }

    const client = portal.client;

    // ── Marque blanche (SaaS B.3) : la marque de l'AGENCE du client ──
    const agency = portal.agency || {};
    window.__AGENCY = agency;

    // La Loge : sur le sous-domaine d'une agence, un code étranger à
    // cette agence est refusé (cohérence espace ↔ marque)
    const subLoge = location.hostname.match(/^([a-z0-9-]+)\.laloge\.house$/);
    if (subLoge && !['www', 'app'].includes(subLoge[1]) && agency.slug && agency.slug !== subLoge[1]) {
      sessionStorage.removeItem('access_granted');
      window.location.href = '/app';
      throw new Error('Code étranger à cet espace');
    }
    /* ── Le client n'a QUE sa livraison ? → droit à ses photos ──
       Depuis le 22/07/2026, le code d'accès ouvre toujours l'espace
       (avant, un client célébration atterrissait sur sa galerie et ne
       voyait jamais ses documents ni ses factures). Mais un couple
       qui n'a rien d'autre que son album n'a que faire d'un tableau
       de bord : ici, avec toutes les données en main, on le renvoie
       droit à ses photos — l'arrivée d'origine, intacte.
       `sessionStorage` évite la boucle si la page de livraison
       renvoyait un jour vers l'espace. */
    const aDesPages = Array.isArray(portal.event_pages) && portal.event_pages.length > 0;
    const aAutreChose = (portal.documents || []).length > 0
      || (portal.invoices || []).length > 0
      || (portal.shoots || []).length > 0;
    const { routeForDelivery } = await import('./univers.js');
    if (new URLSearchParams(location.search).get('espace') === '1') {
      sessionStorage.setItem('espace_demande', '1');
    }
    if (aDesPages && !aAutreChose && !sessionStorage.getItem('espace_demande')) {
      window.location.replace(routeForDelivery(client.universe));
      throw new Error('redirect → livraison');
    }

    const agencyName = agency.name || client.agency_name || 'TimelessHouse';
    document.title = 'Tableau de bord — ' + agencyName;
    // Couleurs personnalisées : uniquement si l'agence a changé les
    // valeurs par défaut (TimelessHouse garde exactement son design
    // actuel ; le mode sombre garde sa palette graphite dans tous les cas)
    if ((agency.accent_color && agency.accent_color.toLowerCase() !== '#2a2620') ||
        (agency.bg_color && agency.bg_color.toLowerCase() !== '#e9e4d9')) {
      const acc = agency.accent_color || '#2a2620';
      const bg  = agency.bg_color || '#e9e4d9';
      const st = document.createElement('style');
      st.textContent =
        ':root:not([data-theme="dark"]) body { background: ' + bg + '; }' +
        ':root:not([data-theme="dark"]) .loading-screen { background: ' + bg + '; }' +
        ':root:not([data-theme="dark"]) .bg-stone-900 { background-color: ' + acc + ' !important; }' +
        ':root:not([data-theme="dark"]) .border-stone-900 { border-color: ' + acc + ' !important; }';
      document.head.appendChild(st);
      const tc = document.querySelector('meta[name="theme-color"]');
      if (tc) tc.setAttribute('content', bg);
    }

    const mediaRes      = { data: portal.media };
    const invoicesRes   = { data: portal.invoices };
    const shootsRes     = { data: portal.shoots };
    const analyticsRes  = { data: portal.analytics };
    const documentsRes  = { data: portal.documents };
    const strategiesRes = { data: portal.strategies };
    const allComments   = portal.comments;

    // Exposé global pour que l'app React puisse rappeler Supabase (commentaires, approbations)
    window.__SUPABASE = sb;
    window.__CLIENT = client;

    window.CLIENT_DATA = {
      id:         client.id,
      name:       client.name,
      greeting:   client.greeting || (client.name || '').split(' ')[0],
      initials:   client.initials || '',
      sector:     client.sector || '',
      code:       client.code,
      // Galeries autonomes du client (peut être vide → la carte « Vos
      // galeries » ne s'affiche simplement pas)
      galleries:  await galleriesPromise,
      // Livraison événement (album / film) : depuis le 22/07/2026 le
      // code d'accès ouvre l'espace, il faut donc un chemin d'ici vers
      // les photos — sans ça, un client qui a AUSSI des factures ne
      // reverrait plus jamais son album.
      deliveryUrl: aDesPages ? routeForDelivery(client.universe) : '',
      deliveryKinds: (portal.event_pages || []).map(p => p.page_type),
      agencyName: agencyName,
      agencyEmail: agency.contact_email || 'service@timelesshouse.org',
      agencyLogo:  agency.logo_url || '',
      // Offre Découverte (brique 17) : mention « Propulsé par La Loge »
      // en pied de page, comme annoncé sur /offres. Elle disparaît dès
      // le premier palier payant.
      agencyBadge: agency.badge === true,
      // Analyses sociales : option du client ET fonctionnalité ouverte à
      // son agence (SaaS B.3 — les apps Meta/TikTok sont au nom de
      // TimelessHouse, un locataire n'y a pas droit par défaut)
      analyticsEnabled: client.analytics_enabled === true && agency.features_analytics === true,
      // L'option est-elle seulement PROPOSABLE ? Le tableau de bord
      // affiche sinon un encart « Activer cette option — 49 €/mois ».
      // Il n'a de sens que dans l'univers communication (jamais dans
      // `neutre`, brique 14) et chez une agence qui dispose vraiment de
      // la fonctionnalité — sans quoi un locataire vendait, sous SA
      // marque, une option qu'il ne peut pas livrer.
      analyticsOffered: allowsAnalytics(client.universe) && agency.features_analytics === true,
      mediaEnabled:     client.media_enabled    !== false,
      invoicesEnabled:  client.invoices_enabled !== false,
      shootsEnabled:    client.shoots_enabled   !== false,
      documentsEnabled: client.documents_enabled !== false,
      strategiesEnabled: client.strategies_enabled !== false,
      media: (mediaRes.data || []).map(m => ({
        id:              m.id,
        type:            m.type,
        title:           m.title,
        url:             m.url || '',
        preview_url:     m.preview_url || '',
        hover_url:       m.hover_url || '',
        date:            m.date_label || '',
        duration:        m.duration,
        size:            m.size_label,
        tag:             m.tag,
        thumb:           m.thumb_grad || 'linear-gradient(135deg,#1a1a1d 0%,#3a3a3d 100%)',
        thumb_url:       m.thumb_url,
        shoot_id:        m.shoot_id,
        approval_status: m.approval_status || 'pending',
        // Métadonnées réelles de l'original (affichage qualité côté client)
        source_width:      m.source_width,
        source_height:     m.source_height,
        source_size_bytes: m.source_size_bytes,
        // Cadrage de l'aperçu au survol (réglé dans l'admin)
        preview_focus_x: m.preview_focus_x,
        preview_focus_y: m.preview_focus_y,
        preview_zoom:    m.preview_zoom,
      })),
      invoices: (invoicesRes.data || []).map(i => ({
        id: i.reference, date: i.date_label || '', amount: parseFloat(i.amount || 0),
        status: i.status, desc: i.description || '', url: i.pdf_url,
        shoot_id: i.shoot_id || null,
      })),
      shoots: (shootsRes.data || []).map(s => ({
        id: s.id, title: s.title, type: s.type, date: s.date_day,
        month: s.month_label || 'Avr', year: s.year || new Date().getFullYear(),
        time: s.time_label || '', location: s.location || '',
        strategy_id: s.strategy_id || null, concept_id: s.concept_id || null,
      })),
      documents: (documentsRes.data || []).map(d => ({
        id: d.id, title: d.title, category: d.category || 'Autre',
        url: d.file_url, date: d.date_label || '', size: d.size_label || '',
        shoot_id: d.shoot_id || null, strategy_id: d.strategy_id || null,
      })),
      strategies: (strategiesRes.data || []).map(s => ({
        id:            s.id,
        title:         s.title,
        subtitle:      s.subtitle      || '',
        sector_label:  s.sector_label  || '',
        intro:         s.intro         || '',
        format_note:   s.format_note   || '',
        concepts:      s.concepts      || [],
        kpis:          s.kpis          || [],
        stats:         s.stats         || [],
        share_token:   s.share_token   || '',
        share_enabled: s.share_enabled === true,
        status:        s.status        || 'draft',
        updated_at:    s.updated_at,
      })),
      comments: allComments || [],
      analytics: analyticsRes.data ? {
        kpis: {
          totalFollowers:  analyticsRes.data.total_followers,  followersDelta:  analyticsRes.data.followers_delta,
          engagement:      analyticsRes.data.engagement,       engagementDelta: analyticsRes.data.engagement_delta,
          reach:           analyticsRes.data.reach,            reachDelta:      analyticsRes.data.reach_delta,
          clicks:          analyticsRes.data.clicks,           clicksDelta:     analyticsRes.data.clicks_delta,
          spentDelta:      analyticsRes.data.spent_delta,      mediaDelta:      analyticsRes.data.media_delta,
        },
        platforms:       analyticsRes.data.platforms        || [],
        demographics:    analyticsRes.data.demographics     || [],
        followerGrowth:  analyticsRes.data.follower_growth  || [],
        engagementByDay: analyticsRes.data.engagement_by_day || [],
        aiSummary:       analyticsRes.data.ai_summary,
      } : {},
    };

    document.getElementById('loadingScreen').classList.add('hide');
    setTimeout(() => document.getElementById('loadingScreen').remove(), 500);

    // Charge l'app React une fois que window.CLIENT_DATA / window.__SUPABASE / window.__CLIENT
    // sont définis : l'import dynamique garantit cet ordre (équivalent compilé Vite de
    // l'ancienne injection runtime via Babel standalone).
    await import('./communication-app.jsx');
  </script>
</body>
</html>
