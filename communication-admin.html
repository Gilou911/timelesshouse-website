<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TimelessHouse — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />


  <!-- Apply theme BEFORE rendering to avoid flash -->
  <script>
    (function(){
      try {
        if (localStorage.getItem('th-dark-mode') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {}
    })();
  </script>

  <style>
    body { margin: 0; background: #e9e4d9; font-family: 'Manrope', system-ui, sans-serif; transition: background 0.5s ease; }
    [data-theme="dark"] body { background: #181b20; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(134,121,106,0.32); border-radius: 4px; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(232,216,190,0.18); }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(232,216,190,0.32); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input, textarea, select { font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; }

    /* ─── Dark-mode color overrides (palette graphite + ivoire chaud) ─── */
    [data-theme="dark"] .text-stone-900 { color: #e6e8eb !important; }
    [data-theme="dark"] .text-stone-800 { color: #d4d6dc !important; }
    [data-theme="dark"] .text-stone-700 { color: #b6b9c0 !important; }
    [data-theme="dark"] .text-stone-600 { color: #969aa3 !important; }
    [data-theme="dark"] .text-stone-500 { color: #7e828b !important; }
    [data-theme="dark"] .text-stone-400 { color: #686c75 !important; }
    [data-theme="dark"] .text-stone-300 { color: #4f535c !important; }
    [data-theme="dark"] .bg-white { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-50 { background-color: #1d2025 !important; }
    [data-theme="dark"] .bg-stone-100 { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-200 { background-color: rgba(232,216,190,0.12) !important; }
    [data-theme="dark"] .bg-stone-300 { background-color: rgba(232,216,190,0.18) !important; }
    [data-theme="dark"] .bg-stone-900 { background-color: #e8d8be !important; }
    [data-theme="dark"] .text-white { color: #1a1410 !important; }
    [data-theme="dark"] .placeholder\:text-stone-400::placeholder { color: #686c75 !important; }
    [data-theme="dark"] .border-stone-200 { border-color: rgba(255,255,255,0.07) !important; }
    [data-theme="dark"] .border-stone-300 { border-color: rgba(232,216,190,0.22) !important; }
    [data-theme="dark"] .border-stone-900 { border-color: #e8d8be !important; }
    [data-theme="dark"] hr { border-color: rgba(255,255,255,0.07) !important; }

    /* Smooth theme transitions — only on direct theme-relevant containers,
       NOT on every single DOM element (that caused massive layout thrashing
       with React re-renders and memory spikes). */
    body, header, aside, nav, main {
      transition: background-color 0.45s ease, color 0.45s ease, border-color 0.45s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>


  <script type="module" src="./communication-admin.jsx"></script>
</body>
</html>
