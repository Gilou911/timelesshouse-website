<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tableau de bord — TimelessHouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
      "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1",
      "lucide-react": "https://esm.sh/lucide-react@0.439.0?deps=react@18.3.1"
    }
  }
  </script>

  <!-- Apply theme BEFORE rendering to avoid flash -->
  <script>
    (function(){
      try {
        if (localStorage.getItem('th-dark-mode') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {}
    })();
  </script>

  <style>
    body { margin: 0; background: #e9e4d9; font-family: 'Manrope', system-ui, sans-serif; transition: background 0.5s ease; }
    [data-theme="dark"] body { background: #181b20; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(134,121,106,0.32); border-radius: 4px; }
    [data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(232,216,190,0.18); }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: rgba(232,216,190,0.32); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .loading-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #e9e4d9; z-index: 9999; transition: opacity 0.5s ease, background 0.5s ease; }
    [data-theme="dark"] .loading-screen { background: #181b20; }
    .loading-screen.hide { opacity: 0; pointer-events: none; }
    .loading-spinner { width: 38px; height: 38px; border: 2.5px solid #d8d1c0; border-top-color: #2a2620; border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 18px; }
    [data-theme="dark"] .loading-spinner { border-color: rgba(232,216,190,0.18); border-top-color: #e8d8be; box-shadow: 0 0 14px rgba(232,216,190,0.35); }
    .loading-text { font-family: 'Instrument Serif', serif; font-size: 22px; color: #2a2620; letter-spacing: -0.01em; }
    [data-theme="dark"] .loading-text { color: #e6e8eb; }
    .loading-sub { font-size: 12px; color: #86796a; margin-top: 4px; }
    [data-theme="dark"] .loading-sub { color: #7e828b; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Overrides Tailwind pour mode DARK (palette cyan + graphite) ─── */
    [data-theme="dark"] .text-stone-900 { color: #e6e8eb !important; }
    [data-theme="dark"] .text-stone-800 { color: #d4d6dc !important; }
    [data-theme="dark"] .text-stone-700 { color: #b6b9c0 !important; }
    [data-theme="dark"] .text-stone-600 { color: #969aa3 !important; }
    [data-theme="dark"] .text-stone-500 { color: #7e828b !important; }
    [data-theme="dark"] .text-stone-400 { color: #686c75 !important; }
    [data-theme="dark"] .text-stone-300 { color: #4f535c !important; }
    [data-theme="dark"] .bg-white { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-50 { background-color: #1d2025 !important; }
    [data-theme="dark"] .bg-stone-100 { background-color: #22262d !important; }
    [data-theme="dark"] .bg-stone-200 { background-color: rgba(232,216,190,0.12) !important; }
    [data-theme="dark"] .bg-stone-300 { background-color: rgba(232,216,190,0.18) !important; }
    [data-theme="dark"] .bg-stone-900 { background-color: #e8d8be !important; }
    [data-theme="dark"] .text-white { color: #1a1410 !important; }
    [data-theme="dark"] .placeholder\:text-stone-400::placeholder { color: #686c75 !important; }
    [data-theme="dark"] .border-stone-200 { border-color: rgba(255,255,255,0.07) !important; }
    [data-theme="dark"] .border-stone-300 { border-color: rgba(232,216,190,0.22) !important; }
    [data-theme="dark"] hr { border-color: rgba(255,255,255,0.07) !important; }

    /* — Tabs / underlines — cyan en dark */
    [data-theme="dark"] .border-stone-900 { border-color: #e8d8be !important; }

    /* — Hover states sur boutons cyan (bg-stone-900 → cyan, hover doit rester cyan-darker, pas gris) */
    [data-theme="dark"] .hover\:bg-stone-800:hover { background-color: #1bbabe !important; }
    [data-theme="dark"] .hover\:bg-white\/20:hover { background-color: rgba(232,216,190,0.18) !important; }

    /* — bg-stone-700 / bg-stone-800 statiques (rares — calendar today photo chip, etc.) */
    [data-theme="dark"] .bg-stone-700 { background-color: rgba(255,255,255,0.08) !important; }
    [data-theme="dark"] .bg-stone-800 { background-color: #1bbabe !important; }

    /* — Status colors — emerald / amber / rose adoucis pour fond graphite */
    [data-theme="dark"] .bg-emerald-50  { background-color: rgba(52,211,153,0.10) !important; }
    [data-theme="dark"] .bg-emerald-100 { background-color: rgba(52,211,153,0.14) !important; }
    [data-theme="dark"] .text-emerald-700 { color: #6ee7b7 !important; }
    [data-theme="dark"] .text-emerald-600 { color: #34d399 !important; }
    [data-theme="dark"] .text-emerald-500 { color: #34d399 !important; }
    [data-theme="dark"] .bg-emerald-500 { background-color: #10b981 !important; }
    [data-theme="dark"] .bg-emerald-600 { background-color: #10b981 !important; }
    [data-theme="dark"] .hover\:bg-emerald-100:hover { background-color: rgba(52,211,153,0.20) !important; }

    [data-theme="dark"] .bg-amber-100 { background-color: rgba(251,191,36,0.14) !important; }
    [data-theme="dark"] .text-amber-700 { color: #fcd34d !important; }
    [data-theme="dark"] .text-amber-600 { color: #fbbf24 !important; }
    [data-theme="dark"] .text-amber-200 { color: #fde68a !important; }
    [data-theme="dark"] .bg-amber-400 { background-color: #f59e0b !important; }

    [data-theme="dark"] .bg-rose-50  { background-color: rgba(244,114,182,0.10) !important; }
    [data-theme="dark"] .bg-rose-100 { background-color: rgba(244,114,182,0.14) !important; }
    [data-theme="dark"] .text-rose-700 { color: #fda4af !important; }
    [data-theme="dark"] .text-rose-400 { color: #fb7185 !important; }
    [data-theme="dark"] .bg-rose-600 { background-color: #e11d48 !important; }
    [data-theme="dark"] .hover\:bg-rose-100:hover { background-color: rgba(244,114,182,0.20) !important; }

    /* — Recharts (Cartesian grid + Axis ticks + Tooltip) */
    [data-theme="dark"] .recharts-cartesian-grid line { stroke: rgba(255,255,255,0.06) !important; }
    [data-theme="dark"] .recharts-cartesian-axis-tick-value tspan { fill: #7e828b !important; }
    [data-theme="dark"] .recharts-default-tooltip { background-color: #22262d !important; border-color: rgba(232,216,190,0.25) !important; color: #e6e8eb !important; }
    [data-theme="dark"] .recharts-tooltip-label,
    [data-theme="dark"] .recharts-tooltip-item { color: #e6e8eb !important; }

    /* — Utilitaires custom : glow cyan signature */
    .th-glow-accent { transition: box-shadow 0.3s ease; }
    [data-theme="dark"] .th-glow-accent { box-shadow: 0 0 24px rgba(232,216,190,0.28); }
    [data-theme="dark"] .th-glow-accent:hover { box-shadow: 0 0 32px rgba(232,216,190,0.45); }

    /* — Transitions thème globales — */
    body, .text-stone-900, .text-stone-800, .text-stone-700, .text-stone-600,
    .text-stone-500, .text-stone-400, .text-stone-300, .bg-white, .bg-stone-50,
    .bg-stone-100, .bg-stone-200, .bg-stone-300, .bg-stone-900,
    .border-stone-200, .border-stone-300, .border-stone-900 {
      transition: background-color 0.45s ease, color 0.45s ease, border-color 0.45s ease;
    }

    /* — Selection texte — cyan glow en dark, warm en light */
    ::selection { background: rgba(42,38,32,0.18); color: #2a2620; }
    [data-theme="dark"] ::selection { background: rgba(232,216,190,0.35); color: #1a1410; }

    /* — Focus visible (accessibilité) — */
    [data-theme="dark"] *:focus-visible { outline: 2px solid #e8d8be; outline-offset: 2px; }
    *:focus-visible { outline: 2px solid #2a2620; outline-offset: 2px; }
  
    /* ════════════════════════════════════════════════
       DURCISSEMENT RESPONSIVE UNIVERSEL — TimelessHouse
       Filet de sécurité mobile/tablette, additif et non destructif
       ════════════════════════════════════════════════ */

    /* 1 — Anti-débordement horizontal global */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }
    *, *::before, *::after { -webkit-tap-highlight-color: transparent; }
    img, video, svg, iframe { max-width: 100%; height: auto; }
    video, iframe { display: block; }

    /* 2 — 100vh → utilise la hauteur dynamique réelle (barre URL mobile) */
    @supports (height: 100dvh) {
      .full-h, .hero, .min-h-screen { min-height: 100dvh; }
    }

    /* 3 — Confort tactile : cibles ≥ 44px sur écrans tactiles */
    @media (hover: none) and (pointer: coarse) {
      a, button, [role="button"], input[type="submit"], input[type="button"], .btn, .btn-primary, .btn-action, .filter-btn {
        min-height: 44px;
      }
      a:not(.logo):not(.inline-link), button, [role="button"] {
        touch-action: manipulation;
      }
    }

    /* 4 — Empêche le zoom auto iOS sur focus champ (police ≥ 16px) */
    @media (max-width: 768px) {
      input, select, textarea {
        font-size: 16px !important;
      }
    }

    /* 5 — Safe-area : encoches & barre gestuelle iPhone */
    @supports (padding: max(0px)) {
      body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* 6 — Tablette : conteneurs fluides */
    @media (max-width: 1024px) {
      .container, .wrapper, [class*="max-w-"] {
        padding-left: clamp(16px, 4vw, 40px);
        padding-right: clamp(16px, 4vw, 40px);
      }
    }

    /* 7 — Téléphone : typographie & espacement resserrés */
    @media (max-width: 640px) {
      h1 { font-size: clamp(1.6rem, 7vw, 2.4rem); line-height: 1.1; }
      h2 { font-size: clamp(1.3rem, 5.5vw, 2rem); }
      h3 { font-size: clamp(1.1rem, 4.5vw, 1.5rem); }
      .grid, [class*="grid-cols"] { gap: 12px; }
    }

    /* 8 — Très petits écrans : grilles multi-colonnes → 1 colonne */
    @media (max-width: 420px) {
      [style*="grid-template-columns"]:not([data-keep-grid]) {
        grid-template-columns: 1fr !important;
      }
    }

    /* 9 — Scroll fluide tactile pour barres horizontales */
    .filter-bar, .scroll-x, [class*="overflow-x"] {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar, .scroll-x::-webkit-scrollbar { display: none; }

    /* 10 — Désactive le hover « collant » sur tactile */
    @media (hover: none) {
      *:hover { transition: none !important; }
    }

  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Chargement de votre espace</div>
    <div class="loading-sub">Connexion sécurisée…</div>
  </div>

  <div id="root"></div>

  <script src="supabase-config.js"></script>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const code = sessionStorage.getItem('access_granted');
    if (!code) { window.location.href = 'communication.html'; throw new Error('No access'); }

    const sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    const { data: client, error: cErr } = await sb
      .from('clients').select('*').eq('code', code).eq('active', true).maybeSingle();

    if (cErr || !client) {
      sessionStorage.removeItem('access_granted');
      window.location.href = 'communication.html';
      throw new Error('Client not found');
    }

    const [mediaRes, invoicesRes, shootsRes, analyticsRes, documentsRes] = await Promise.all([
      sb.from('media').select('*').eq('client_id', client.id).order('position'),
      sb.from('invoices').select('*').eq('client_id', client.id).order('created_at', { ascending: false }),
      sb.from('shoots').select('*').eq('client_id', client.id).order('year').order('date_day'),
      sb.from('analytics').select('*').eq('client_id', client.id).maybeSingle(),
      sb.from('documents').select('*').eq('client_id', client.id).order('position').order('created_at', { ascending: false }),
    ]);

    const mediaIds = (mediaRes.data || []).map(m => m.id);
    const { data: allComments } = mediaIds.length
      ? await sb.from('media_comments').select('*').in('media_id', mediaIds).order('created_at')
      : { data: [] };

    // Exposé global pour que l'app React puisse rappeler Supabase (commentaires, approbations)
    window.__SUPABASE = sb;
    window.__CLIENT = client;

    window.CLIENT_DATA = {
      name:       client.name,
      greeting:   client.greeting || (client.name || '').split(' ')[0],
      initials:   client.initials || '',
      sector:     client.sector || '',
      code:       client.code,
      agencyName: client.agency_name || 'TimelessHouse',
      analyticsEnabled: client.analytics_enabled === true,
      mediaEnabled:     client.media_enabled    !== false,
      invoicesEnabled:  client.invoices_enabled !== false,
      shootsEnabled:    client.shoots_enabled   !== false,
      documentsEnabled: client.documents_enabled !== false,
      media: (mediaRes.data || []).map(m => ({
        id:              m.id,
        type:            m.type,
        title:           m.title,
        url:             m.url || '',
        preview_url:     m.preview_url || '',
        date:            m.date_label || '',
        duration:        m.duration,
        size:            m.size_label,
        tag:             m.tag,
        thumb:           m.thumb_grad || 'linear-gradient(135deg,#1a1a1d 0%,#3a3a3d 100%)',
        thumb_url:       m.thumb_url,
        shoot_id:        m.shoot_id,
        approval_status: m.approval_status || 'pending',
      })),
      invoices: (invoicesRes.data || []).map(i => ({
        id: i.reference, date: i.date_label || '', amount: parseFloat(i.amount || 0),
        status: i.status, desc: i.description || '', url: i.pdf_url,
      })),
      shoots: (shootsRes.data || []).map(s => ({
        id: s.id, title: s.title, type: s.type, date: s.date_day,
        month: s.month_label || 'Avr', time: s.time_label || '', location: s.location || '',
      })),
      documents: (documentsRes.data || []).map(d => ({
        id: d.id, title: d.title, category: d.category || 'Autre',
        url: d.file_url, date: d.date_label || '', size: d.size_label || '',
      })),
      comments: allComments || [],
      analytics: analyticsRes.data ? {
        kpis: {
          totalFollowers:  analyticsRes.data.total_followers,  followersDelta:  analyticsRes.data.followers_delta,
          engagement:      analyticsRes.data.engagement,       engagementDelta: analyticsRes.data.engagement_delta,
          reach:           analyticsRes.data.reach,            reachDelta:      analyticsRes.data.reach_delta,
          clicks:          analyticsRes.data.clicks,           clicksDelta:     analyticsRes.data.clicks_delta,
          spentDelta:      analyticsRes.data.spent_delta,      mediaDelta:      analyticsRes.data.media_delta,
        },
        platforms:       analyticsRes.data.platforms        || [],
        demographics:    analyticsRes.data.demographics     || [],
        followerGrowth:  analyticsRes.data.follower_growth  || [],
        engagementByDay: analyticsRes.data.engagement_by_day || [],
        aiSummary:       analyticsRes.data.ai_summary,
      } : {},
    };

    document.getElementById('loadingScreen').classList.add('hide');
    setTimeout(() => document.getElementById('loadingScreen').remove(), 500);

    const script = document.createElement('script');
    script.type = 'text/babel';
    script.dataset.type = 'module';
    script.dataset.presets = 'react';
    script.src = 'communication-app.jsx';
    document.body.appendChild(script);
    if (window.Babel && window.Babel.transformScriptTags) window.Babel.transformScriptTags();
  </script>
</body>
</html>
