<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Galerie photos de mariage — TimelessHouse Private Collection" />

  <meta property="og:title" content="TimelessHouse — Galerie Photos" />
  <meta property="og:description" content="Galerie photos — Collection privée." />
  <meta property="og:type" content="website" />

  <title>TimelessHouse — Galerie Photos</title>

  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <!-- 🔐 Config Supabase (URL + ANON_KEY) -->
  <script src="supabase-config.js"></script>

  <!-- 📥 Chargement de la config depuis Supabase (top-level await) -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    function showError(type, clientName) {
      document.body.style.opacity = '1';
      document.body.innerHTML = `
        <div style="
          min-height:100vh; background:#0a0a0a; display:flex; align-items:center;
          justify-content:center; font-family:'Montserrat',sans-serif; padding:24px;
        ">
          <div style="text-align:center; max-width:460px;">
            <div style="
              font-family:'Cormorant Garamond',serif; font-style:italic;
              font-size:clamp(2rem,6vw,3rem); color:#b08968; margin-bottom:8px; letter-spacing:0.02em;
            ">TimelessHouse<span style="color:#555">.</span></div>
            <div style="width:40px; height:1px; background:#b08968; opacity:0.4; margin:20px auto;"></div>
            ${type === 'not-ready' ? `
              <div style="font-size:11px; letter-spacing:0.25em; color:#666; text-transform:uppercase; margin-bottom:16px;">Votre espace</div>
              <div style="font-family:'Cormorant Garamond',serif; font-size:clamp(1.4rem,4vw,1.9rem); color:#f4f0eb; margin-bottom:16px; line-height:1.3;">
                ${clientName ? clientName + ',<br>' : ''}votre galerie est en cours de préparation.
              </div>
              <p style="font-size:13px; color:#666; line-height:1.7; margin-bottom:28px;">
                Nous finalisons votre espace privé. Vous recevrez un email dès qu'il sera disponible.
              </p>
              <a href="mailto:service@timelesshouse.org" style="
                display:inline-block; padding:12px 28px; border:1px solid #333;
                color:#b08968; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
                text-decoration:none; transition:all 0.2s;
              ">Contacter TimelessHouse</a>
            ` : `
              <div style="font-size:11px; letter-spacing:0.25em; color:#666; text-transform:uppercase; margin-bottom:16px;">Accès</div>
              <div style="font-family:'Cormorant Garamond',serif; font-size:clamp(1.4rem,4vw,1.9rem); color:#f4f0eb; margin-bottom:16px;">
                Code non reconnu.
              </div>
              <p style="font-size:13px; color:#666; line-height:1.7; margin-bottom:28px;">
                Votre code d'accès semble incorrect ou expiré. Merci de le vérifier ou de contacter votre photographe.
              </p>
              <a href="mariage.html" style="
                display:inline-block; padding:12px 28px; border:1px solid #333;
                color:#b08968; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
                text-decoration:none; margin-right:12px;
              ">Réessayer</a>
              <a href="mailto:service@timelesshouse.org" style="
                display:inline-block; padding:12px 28px; border:1px solid #222;
                color:#555; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
                text-decoration:none;
              ">Contacter</a>
            `}
          </div>
        </div>
      `;
    }

    const code = sessionStorage.getItem('access_granted');
    if (!code) { window.location.href = 'mariage.html'; throw new Error('No access'); }

    const { data: client, error: cErr } = await sb.from('clients')
      .select('id, code, name, universe, agency_name')
      .eq('code', code).eq('active', true).maybeSingle();

    if (cErr || !client) {
      sessionStorage.removeItem('access_granted');
      showError('invalid');
      throw new Error('Client not found');
    }

    const { data: pages } = await sb.from('event_pages')
      .select('page_type, config')
      .eq('client_id', client.id);

    const photosPage = (pages || []).find(p => p.page_type === 'photos');
    const videoPage  = (pages || []).find(p => p.page_type === 'video');

    if (!photosPage) {
      // Vidéo existe → redirige silencieusement ; rien du tout → écran "en préparation"
      if (videoPage) {
        const dest = client.universe === 'anniversaire-mariage' ? 'event-anniversary.html'
          : client.universe === 'fiancailles' ? 'event-engagement.html'
          : 'event-video.html';
        window.location.href = dest;
      } else {
        showError('not-ready', client.name);
      }
      throw new Error('No photos page');
    }

    // Liens croisés auto + valeurs par défaut
    const cfg = Object.assign({
      couple: client.name,
      date: '',
      lieu: '',
      dateISO: '',
      cloudName: '',
      rootFolder: '',
      categories: [],
      zipDriveId: '',
      layout: 'masonry',
      theme: 'noir',
      galleryMode: 'categorized',
      style: 'classic',          // 'classic' | 'cinematic'
    }, photosPage.config || {});

    // 🎞️ Routage de style : si l'admin a choisi la galerie cinématique
    // (pic-time), on bascule vers le template dédié. Le template cible
    // recharge la config tout seul (même flux d'accès Supabase).
    if (cfg.style === 'cinematic') {
      window.location.replace('event-photos-cinematic.html');
      throw new Error('redirect → cinematic');
    }

    cfg.videoUrl = videoPage
      ? (client.universe === 'anniversaire-mariage' ? 'event-anniversary.html'
        : client.universe === 'fiancailles' ? 'event-engagement.html'
        : 'event-video.html')
      : '';
    const COUPLE_UNIVERSES = ['mariage', 'fiancailles', 'anniversaire-mariage'];
    cfg.accueilUrl = COUPLE_UNIVERSES.includes(client.universe)
      ? 'mariage.html'
      : (client.universe ? client.universe + '.html' : 'index.html');

    window.WEDDING_CONFIG = cfg;
    window.__CLIENT = client;
    window.dispatchEvent(new CustomEvent('config-ready'));
  </script>

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-deeper: #050505;
      --bg-elev: #111111;
      --text-light: #f4f0eb;
      --text-muted: #8a8578;
      --text-dim: #5a5850;
      --accent: #b08968;
      --accent-dark: #9a7555;
      --accent-soft: rgba(176, 137, 104, 0.15);
      --border-subtle: rgba(244, 240, 235, 0.08);
      --border-medium: rgba(244, 240, 235, 0.12);
      --gap: 14px;
      --radius: 2px;
      --ease-cinema: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 30px 80px rgba(0, 0, 0, 0.7);
    }

    /* ================================================
       THÈMES — appliqués via data-theme sur <body>
       ================================================ */
    [data-theme="creme"] {
      --bg-dark: #f2ede6;
      --bg-deeper: #ebe4db;
      --bg-elev: #e6dfd6;
      --text-light: #1a1714;
      --text-muted: #6b6560;
      --text-dim: #9a948e;
      --accent: #8b6a48;
      --accent-dark: #7a5a3a;
      --accent-soft: rgba(139, 106, 72, 0.12);
      --border-subtle: rgba(26, 23, 20, 0.08);
      --border-medium: rgba(26, 23, 20, 0.14);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
      --shadow-lg: 0 30px 80px rgba(0, 0, 0, 0.2);
    }
    [data-theme="creme"] .aspect {
      background: linear-gradient(110deg, #ddd6cd 8%, #e6dfd6 18%, #ddd6cd 33%) !important;
    }
    [data-theme="creme"] .lightbox { background: rgba(242, 237, 230, 0) !important; }
    [data-theme="creme"] .lightbox.active { background: rgba(242, 237, 230, 0.97) !important; }
    [data-theme="creme"] .cinema-loader { background: var(--bg-deeper); }

    [data-theme="ardoise"] {
      --bg-dark: #13161c;
      --bg-deeper: #0d1014;
      --bg-elev: #1a1e26;
      --text-light: #e8eaef;
      --text-muted: #7a8090;
      --text-dim: #50565e;
      --accent: #7a9bb8;
      --accent-dark: #6585a0;
      --accent-soft: rgba(122, 155, 184, 0.15);
      --border-subtle: rgba(232, 234, 239, 0.07);
      --border-medium: rgba(232, 234, 239, 0.12);
    }
    [data-theme="ardoise"] .aspect {
      background: linear-gradient(110deg, #181c24 8%, #1e2230 18%, #181c24 33%) !important;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Montserrat", sans-serif;
      font-weight: 300;
      background-color: var(--bg-dark);
      color: var(--text-light);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    ::selection { background: var(--accent); color: var(--bg-dark); }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 2px;
    }

    img { -webkit-user-drag: none; user-select: none; }

    /* ================================================
       LOADER D'ENTRÉE CINÉMATOGRAPHIQUE
       ================================================ */
    .cinema-loader {
      position: fixed; inset: 0;
      background: var(--bg-deeper);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 1.2s var(--ease-cinema), visibility 1.2s var(--ease-cinema);
    }
    .cinema-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .cinema-loader::before, .cinema-loader::after {
      content: ""; position: fixed; left: 0; right: 0; height: 50vh;
      background: #000; z-index: 10000; pointer-events: none;
      transition: transform 1.4s var(--ease-cinema);
    }
    .cinema-loader::before { top: 0; }
    .cinema-loader::after { bottom: 0; }
    .cinema-loader.reveal::before { transform: translateY(-100%); }
    .cinema-loader.reveal::after { transform: translateY(100%); }
    .loader-content { text-align: center; animation: fadeInLoader 1.4s var(--ease-cinema) 0.2s both; }
    .loader-mark {
      font-family: "Cormorant Garamond", serif; font-style: italic;
      font-size: 2rem; color: var(--accent); letter-spacing: 0.05em; margin-bottom: 24px;
    }
    .loader-line {
      width: 1px; height: 0; background: var(--accent); margin: 0 auto;
      animation: lineGrow 1.6s var(--ease-cinema) 0.6s forwards;
    }
    @keyframes lineGrow { to { height: 60px; } }
    @keyframes fadeInLoader {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Grain cinéma subtil */
    .film-grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      opacity: 0.04; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    .ambient-glow {
      position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse at center, var(--accent-soft) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ================================================
       HEADER
       ================================================ */
    .gallery-header {
      text-align: center;
      padding: 90px 20px 50px;
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    .logo {
      font-family: "Cormorant Garamond", serif; font-size: 0.85rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.35em; text-decoration: none;
      display: inline-block; margin-bottom: 40px;
      transition: color 0.4s var(--ease-cinema);
      opacity: 0; animation: revealUp 1s var(--ease-cinema) 0.3s forwards;
    }
    .logo:hover { color: var(--accent); }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 300; font-style: italic;
      margin: 0 0 20px 0; line-height: 1; letter-spacing: 0.01em;
      opacity: 0; animation: revealUp 1.2s var(--ease-cinema) 0.5s forwards;
    }

    .date {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.4em;
      color: var(--accent); margin-bottom: 40px; display: block;
      opacity: 0; animation: revealUp 1s var(--ease-cinema) 0.7s forwards;
    }

    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin: 0 auto 40px;
      opacity: 0; animation: revealUp 1s var(--ease-cinema) 0.8s forwards;
    }
    .divider::before, .divider::after {
      content: ""; width: 40px; height: 1px; background: var(--accent); opacity: 0.4;
    }
    .divider-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
      opacity: 0;
      animation: revealUp 1s var(--ease-cinema) 0.9s forwards;
    }

    .btn-action {
      padding: 12px 28px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 10px;
      font-weight: 400;
      border-radius: var(--radius);
      transition: all 0.4s var(--ease-cinema);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .btn-action.primary {
      background: var(--accent);
      color: var(--bg-dark);
      border: 1px solid var(--accent);
      font-weight: 500;
    }
    .btn-action.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(176, 137, 104, 0.3);
    }

    .btn-action.ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-action.ghost::before {
      content: ""; position: absolute; inset: 0;
      background: var(--accent); transform: translateY(100%);
      transition: transform 0.4s var(--ease-cinema); z-index: -1;
    }
    .btn-action.ghost:hover { color: var(--bg-dark); }
    .btn-action.ghost:hover::before { transform: translateY(0); }

    .btn-action svg { width: 14px; height: 14px; }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ================================================
       BARRE DE FILTRES STICKY
       ================================================ */
    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 4px;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      background: rgba(10, 10, 10, 0.75);
      z-index: 100;
      border-bottom: 1px solid transparent;
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      opacity: 0;
      animation: revealUp 1s var(--ease-cinema) 1s forwards;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-bar.scrolled {
      border-bottom-color: var(--border-subtle);
      background: rgba(10, 10, 10, 0.92);
    }

    .filter-btn {
      background: none;
      border: none;
      font-family: "Montserrat", sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      cursor: pointer;
      padding: 9px 18px;
      border-radius: 999px;
      transition: all 0.4s var(--ease-cinema);
      white-space: nowrap;
      scroll-snap-align: center;
      flex-shrink: 0;
      font-weight: 300;
    }
    .filter-btn:hover {
      color: var(--text-light);
      background: rgba(244, 240, 235, 0.04);
    }
    .filter-btn.active {
      color: var(--bg-dark);
      background: var(--accent);
      font-weight: 500;
    }
    .filter-btn .count {
      margin-left: 8px;
      font-size: 9px;
      opacity: 0.7;
      letter-spacing: 0.1em;
    }

    /* ================================================
       LOADER BARRE DE CHARGEMENT
       ================================================ */
    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      z-index: 1000;
      overflow: hidden;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    .loader-container.hidden { opacity: 0; }
    .loader-bar {
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      width: 40%;
      animation: loading 1.2s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ================================================
       SCROLL TO TOP
       ================================================ */
    .scroll-top {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 48px;
      height: 48px;
      background: rgba(17, 17, 17, 0.9);
      color: var(--text-light);
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.4s var(--ease-cinema);
      box-shadow: var(--shadow-md);
      z-index: 99;
      backdrop-filter: blur(10px);
    }
    .scroll-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .scroll-top:hover {
      background: var(--accent);
      color: var(--bg-dark);
      border-color: var(--accent);
      transform: translateY(-4px);
    }
    .scroll-top svg { width: 18px; height: 18px; }

    /* ================================================
       GRILLE — SYSTÈME MULTI-LAYOUT
       ================================================ */
    .gallery-container {
      max-width: 1700px;
      margin: 24px auto;
      padding: 0 20px;
      min-height: 60vh;
      position: relative;
      z-index: 2;
    }

    .empty-state {
      text-align: center;
      padding: 120px 20px;
      color: var(--text-dim);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.4rem;
      font-style: italic;
    }

    /* ── MASONRY (default) — flex justified rows, hauteurs fixes, largeurs au ratio réel ── */
    .masonry-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap);
      opacity: 1;
      transition: opacity 0.4s var(--ease-cinema);
    }
    .masonry-grid.fade-out { opacity: 0; }

    /* ── GRID — grille uniforme 3-4 colonnes, recadrage centré ── */
    .masonry-grid[data-layout="grid"] {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--gap);
    }
    .masonry-grid[data-layout="grid"] .photo-item {
      width: 100% !important;
      height: 220px !important;
      aspect-ratio: unset !important;
    }
    .masonry-grid[data-layout="grid"] .photo-item img {
      object-fit: cover !important;
    }
    @media (max-width: 768px) {
      .masonry-grid[data-layout="grid"] {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 480px) {
      .masonry-grid[data-layout="grid"] {
        grid-template-columns: repeat(2, 1fr);
        gap: 4px;
      }
      .masonry-grid[data-layout="grid"] .photo-item { height: 150px !important; }
    }

    /* ── COLUMNS — vraie masonry CSS, hauteur naturelle, effet Pinterest ── */
    .masonry-grid[data-layout="columns"] {
      display: block;
      column-count: 3;
      column-gap: var(--gap);
    }
    .masonry-grid[data-layout="columns"] .photo-item {
      display: block;
      break-inside: avoid;
      width: 100% !important;
      height: auto !important;
      aspect-ratio: unset !important;
      margin-bottom: var(--gap);
    }
    .masonry-grid[data-layout="columns"] .photo-item img {
      position: static !important;
      height: auto !important;
      object-fit: cover !important;
    }
    .masonry-grid[data-layout="columns"] .photo-item .aspect { display: none; }
    @media (max-width: 900px) {
      .masonry-grid[data-layout="columns"] { column-count: 2; }
    }
    @media (max-width: 480px) {
      .masonry-grid[data-layout="columns"] { column-count: 2; column-gap: 4px; }
      .masonry-grid[data-layout="columns"] .photo-item { margin-bottom: 4px; }
    }

    /* ── EDITORIAL — une photo par rangée, pleine largeur, format cinéma ── */
    .masonry-grid[data-layout="editorial"] {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .masonry-grid[data-layout="editorial"] .photo-item {
      width: 100% !important;
      height: clamp(340px, 55vw, 700px) !important;
      aspect-ratio: unset !important;
      border-radius: 0;
    }
    .masonry-grid[data-layout="editorial"] .photo-item img {
      object-fit: cover !important;
    }
    @media (max-width: 640px) {
      .masonry-grid[data-layout="editorial"] .photo-item {
        height: clamp(220px, 65vw, 400px) !important;
      }
    }

    .photo-item {
      position: relative;
      cursor: zoom-in;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--bg-elev);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s var(--ease-out), transform 0.6s var(--ease-out);
      will-change: transform, opacity;
      height: 300px;
      flex: 0 1 auto;
      max-width: 100%;
    }
    .photo-item.loaded {
      opacity: 1;
      transform: translateY(0);
    }

    .photo-item .aspect {
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, #141414 8%, #1a1a1a 18%, #141414 33%);
      background-size: 200% 100%;
      animation: shimmer 1.8s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .photo-item.img-ready .aspect { animation: none; background: transparent; }

    .photo-item img {
      width: 100%;
      height: 100%;
      display: block;
      position: absolute;
      top: 0; left: 0;
      object-fit: contain;
      object-position: center;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.7s var(--ease-cinema);
    }
    .photo-item img.img-loaded { opacity: 1; }
    .photo-item:hover img { transform: scale(1.03); }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 40%);
      opacity: 0;
      transition: opacity 0.35s var(--ease-cinema);
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 14px;
      pointer-events: none;
    }
    .photo-item:hover .photo-overlay,
    .photo-item:focus-visible .photo-overlay { opacity: 1; }

    .icon-dl {
      width: 36px; height: 36px;
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid var(--border-medium);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light);
      box-shadow: var(--shadow-md);
      text-decoration: none;
      transition: all 0.3s var(--ease-cinema);
      pointer-events: auto;
      backdrop-filter: blur(6px);
    }
    .icon-dl:hover {
      transform: scale(1.1);
      background: var(--accent);
      color: var(--bg-dark);
      border-color: var(--accent);
    }
    .icon-dl svg { width: 16px; height: 16px; }

    /* ================================================
       LIGHTBOX
       ================================================ */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 5, 0);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s var(--ease-cinema),
                  visibility 0.4s var(--ease-cinema),
                  background 0.4s var(--ease-cinema);
    }
    .lightbox.active {
      opacity: 1;
      visibility: visible;
      background: rgba(5, 5, 5, 0.97);
    }

    .lightbox-stage {
      position: relative;
      max-height: 92vh;
      max-width: 94vw;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      overflow: hidden;
    }

    .lightbox img {
      max-height: 92vh;
      max-width: 94vw;
      display: block;
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-subtle);
      border-radius: var(--radius);
      opacity: 0;
      transform: translate3d(0, 0, 0) scale(0.96);
      transform-origin: center center;
      transition: opacity 0.3s ease, transform 0.5s var(--ease-cinema);
      user-select: none;
      -webkit-user-drag: none;
      cursor: zoom-in;
      will-change: transform;
    }
    .lightbox.active img { transform: translate3d(0, 0, 0) scale(1); opacity: 1; }

    .lightbox img.zoomed { cursor: grab; }
    .lightbox img.zoomed.dragging { transition: none; cursor: grabbing; }
    .lightbox img.panning { transition: none; }

    .zoom-indicator {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(10, 10, 10, 0.85);
      color: var(--text-light);
      border: 1px solid var(--border-medium);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      opacity: 0;
      pointer-events: none;
      z-index: 12;
      backdrop-filter: blur(10px);
      transition: opacity 0.25s ease, transform 0.25s var(--ease-cinema);
    }
    .zoom-indicator.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .lightbox-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease 0.15s;
    }
    .lightbox.active .lightbox-topbar { opacity: 1; }

    .lightbox-counter {
      color: var(--accent);
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    .lightbox-actions {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .lb-btn {
      width: 42px; height: 42px;
      background: rgba(244, 240, 235, 0.05);
      border: 1px solid var(--border-medium);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s var(--ease-cinema);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-decoration: none;
    }
    .lb-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-dark);
      transform: scale(1.05);
    }
    .lb-btn:active { transform: scale(0.95); }
    .lb-btn svg { width: 18px; height: 18px; }
    .lightbox-close svg { width: 16px; height: 16px; }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      background: rgba(244, 240, 235, 0.04);
      border: 1px solid var(--border-medium);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light);
      cursor: pointer;
      user-select: none;
      transition: all 0.3s var(--ease-cinema);
      backdrop-filter: blur(10px);
      z-index: 10;
      opacity: 0;
    }
    .lightbox.active .lightbox-nav { opacity: 1; }
    .lightbox-nav:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-dark);
      transform: translateY(-50%) scale(1.08);
    }
    .lightbox-nav:active { transform: translateY(-50%) scale(0.95); }
    .lightbox-nav svg { width: 20px; height: 20px; }
    .prev { left: 28px; }
    .next { right: 28px; }

    .lightbox img.slide-out-left {
      transform: translateX(-40px) scale(0.96); opacity: 0;
    }
    .lightbox img.slide-out-right {
      transform: translateX(40px) scale(0.96); opacity: 0;
    }

    .lightbox-progress {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(244, 240, 235, 0.05);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .lightbox.active .lightbox-progress { opacity: 1; }
    .lightbox-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s var(--ease-cinema);
    }

    .swipe-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(244, 240, 235, 0.4);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      z-index: 11;
      pointer-events: none;
    }
    .swipe-hint.show {
      animation: fadeInOut 2.8s ease-in-out;
    }
    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      20%, 70% { opacity: 0.7; }
    }

    /* ================================================
       FOOTER
       ================================================ */
    footer {
      text-align: center;
      margin-top: 100px;
      padding: 40px 20px 60px;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
    }
    footer::before {
      content: "";
      display: block;
      width: 40px;
      height: 1px;
      background: var(--border-subtle);
      margin: 0 auto 24px;
    }

    /* ================================================
       RESPONSIVE
       ================================================ */
    @media (max-width: 1100px) {
      .photo-item { height: 240px; }
    }
    @media (max-width: 768px) {
      .gallery-header { padding: 60px 20px 26px; }
      h1 { font-size: 2.1rem; line-height: 1.05; }
      .date { font-size: 11px; margin-bottom: 22px; }
      .actions { gap: 10px; padding: 0 16px; }
      .btn-action { padding: 11px 22px; font-size: 9.5px; }
      .filter-btn { font-size: 10.5px; padding: 8px 16px; }
    }
    @media (max-width: 640px) {
      .masonry-grid { gap: 6px; --gap: 6px; }
      .photo-item { height: 180px; }
      .gallery-container { padding: 0 10px; margin-top: 14px; }
      .gallery-header { padding: 50px 18px 24px; }
      h1 { font-size: 1.85rem; }
      .kicker { font-size: 9.5px; letter-spacing: 0.3em; }
      .date { font-size: 10px; margin-bottom: 22px; letter-spacing: 0.16em; }
      .scroll-top { bottom: 20px; right: 20px; width: 42px; height: 42px; }
      .filter-bar { padding: 10px 12px; justify-content: flex-start; gap: 2px; }
      .filter-btn { font-size: 9.5px; padding: 7px 12px; letter-spacing: 0.14em; }
      .filter-btn .count { font-size: 8.5px; margin-left: 5px; }
      .actions { gap: 8px; padding: 0 12px; }
      .btn-action { padding: 10px 18px; font-size: 9px; gap: 6px; }
      .btn-action svg { width: 12px; height: 12px; }
      .lightbox-topbar { padding: 12px 14px; padding-top: max(12px, env(safe-area-inset-top)); }
      .lb-btn { width: 38px; height: 38px; }
      .lb-btn svg { width: 15px; height: 15px; }
      .lightbox-counter { font-size: 9px; letter-spacing: 0.25em; }
      .lightbox-actions { gap: 8px; }
      .lightbox-nav { display: none; }
      .prev, .next { display: none; }
    }
    @media (max-width: 380px) {
      .photo-item { height: 150px; }
      .actions { gap: 6px; flex-direction: column; align-items: stretch; padding: 0 24px; }
      .btn-action { padding: 11px 14px; justify-content: center; }
      .filter-btn { font-size: 9px; padding: 6px 10px; }
      h1 { font-size: 1.65rem; }
      .gallery-header { padding: 40px 16px 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .photo-item { opacity: 1; transform: none; }
    }
  
    /* ════════════════════════════════════════════════
       DURCISSEMENT RESPONSIVE UNIVERSEL — TimelessHouse
       Filet de sécurité mobile/tablette, additif et non destructif
       ════════════════════════════════════════════════ */

    /* 1 — Anti-débordement horizontal global */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }
    *, *::before, *::after { -webkit-tap-highlight-color: transparent; }
    img, video, svg, iframe { max-width: 100%; height: auto; }
    video, iframe { display: block; }

    /* 2 — 100vh → utilise la hauteur dynamique réelle (barre URL mobile) */
    @supports (height: 100dvh) {
      .full-h, .hero, .min-h-screen { min-height: 100dvh; }
    }

    /* 3 — Confort tactile : cibles ≥ 44px sur écrans tactiles */
    @media (hover: none) and (pointer: coarse) {
      a, button, [role="button"], input[type="submit"], input[type="button"], .btn, .btn-primary, .btn-action, .filter-btn {
        min-height: 44px;
      }
      a:not(.logo):not(.inline-link), button, [role="button"] {
        touch-action: manipulation;
      }
    }

    /* 4 — Empêche le zoom auto iOS sur focus champ (police ≥ 16px) */
    @media (max-width: 768px) {
      input, select, textarea {
        font-size: 16px !important;
      }
    }

    /* 5 — Safe-area : encoches & barre gestuelle iPhone */
    @supports (padding: max(0px)) {
      body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* 6 — Tablette : conteneurs fluides */
    @media (max-width: 1024px) {
      .container, .wrapper, [class*="max-w-"] {
        padding-left: clamp(16px, 4vw, 40px);
        padding-right: clamp(16px, 4vw, 40px);
      }
    }

    /* 7 — Téléphone : typographie & espacement resserrés */
    @media (max-width: 640px) {
      h1 { font-size: clamp(1.6rem, 7vw, 2.4rem); line-height: 1.1; }
      h2 { font-size: clamp(1.3rem, 5.5vw, 2rem); }
      h3 { font-size: clamp(1.1rem, 4.5vw, 1.5rem); }
      .grid, [class*="grid-cols"] { gap: 12px; }
    }

    /* 8 — Très petits écrans : grilles multi-colonnes → 1 colonne */
    @media (max-width: 420px) {
      [style*="grid-template-columns"]:not([data-keep-grid]) {
        grid-template-columns: 1fr !important;
      }
    }

    /* 9 — Scroll fluide tactile pour barres horizontales */
    .filter-bar, .scroll-x, [class*="overflow-x"] {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar, .scroll-x::-webkit-scrollbar { display: none; }

    /* 10 — Désactive le hover « collant » sur tactile */
    @media (hover: none) {
      *:hover { transition: none !important; }
    }

  </style>
</head>
<body>

  <div class="cinema-loader" id="cinemaLoader" aria-hidden="true">
    <div class="loader-content">
      <div class="loader-mark">TimelessHouse</div>
      <div class="loader-line"></div>
    </div>
  </div>

  <div class="film-grain" aria-hidden="true"></div>

  <div class="loader-container hidden" id="loader" aria-hidden="true">
    <div class="loader-bar"></div>
  </div>

  <button class="scroll-top" id="scrollTop" aria-label="Remonter en haut">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
  </button>

  <header class="gallery-header">
    <div class="ambient-glow" aria-hidden="true"></div>
    <a href="#" class="logo" id="logoLink">TimelessHouse</a>
    <h1 id="coupleTitle">—</h1>
    <time class="date" id="dateLieu">—</time>

    <div class="divider" aria-hidden="true">
      <span class="divider-dot"></span>
    </div>

    <div class="actions">
      <a href="#" class="btn-action ghost" id="videoLink">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Voir le Film
      </a>
      <a href="#" id="downloadAll" target="_blank" rel="noopener" class="btn-action primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Tout Télécharger
      </a>
    </div>
  </header>

  <nav class="filter-bar" id="filterContainer" aria-label="Catégories"></nav>

  <main class="gallery-container">
    <div class="masonry-grid" id="galleryGrid" role="list"></div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visionneuse photo">
    <div class="lightbox-topbar">
      <div class="lightbox-counter" id="lightboxCounter" aria-live="polite">1 / 1</div>
      <div class="lightbox-actions">
        <a class="lb-btn" id="lbDownload" download title="Télécharger" aria-label="Télécharger cette photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </a>
        <button class="lb-btn lightbox-close" onclick="closeLightbox()" title="Fermer (Échap)" aria-label="Fermer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <button class="lightbox-nav prev" onclick="changeImage(-1)" aria-label="Photo précédente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav next" onclick="changeImage(1)" aria-label="Photo suivante">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <div class="lightbox-stage">
      <img id="lightbox-img" src="" alt="" />
    </div>

    <div class="zoom-indicator" id="zoomIndicator">100%</div>
    <div class="swipe-hint" id="swipeHint">← glissez pour naviguer →</div>

    <div class="lightbox-progress" aria-hidden="true">
      <div class="lightbox-progress-fill" id="lightboxProgress"></div>
    </div>
  </div>

  <footer>
    &copy; 2025 TimelessHouse — Private Collection
  </footer>

  <script>
  // ⏳ Attend que la config Supabase soit chargée avant d'initialiser
  function __runApp() {
    // ============================================
    // APPLICATION DE LA CONFIGURATION
    // ============================================
    (function applyConfig() {
      const c = WEDDING_CONFIG;

      document.title = c.couple + ' — Galerie Photos';
      document.querySelector('meta[property="og:title"]')
        .setAttribute('content', c.couple + ' — Galerie Photos');
      document.querySelector('meta[name="description"]')
        .setAttribute('content', 'Galerie photos du mariage de ' + c.couple + ' — ' + c.date + ', ' + c.lieu + '.');

      // Thème visuel
      if (c.theme && c.theme !== 'noir') {
        document.body.setAttribute('data-theme', c.theme);
      }
      // Layout de galerie
      if (c.layout && c.layout !== 'masonry') {
        document.getElementById('galleryGrid').setAttribute('data-layout', c.layout);
      }

      document.getElementById('coupleTitle').textContent = c.couple;
      document.getElementById('dateLieu').textContent = c.date + ' • ' + c.lieu;
      document.getElementById('dateLieu').setAttribute('datetime', c.dateISO);

      document.getElementById('logoLink').href = c.accueilUrl;
      
      // LOGIQUE POUR LE BOUTON VIDÉO
      const videoBtn = document.getElementById('videoLink');
      if (c.videoUrl && c.videoUrl.trim() !== "") {
        videoBtn.href = c.videoUrl;
      } else {
        videoBtn.style.display = 'none';
      }

      document.getElementById('downloadAll').href =
        'https://drive.google.com/uc?export=download&id=' + c.zipDriveId;
    })();

    // ============================================
    // LOADER CINÉMA D'ENTRÉE
    // ============================================
    // ⚠️ On ne peut pas utiliser window.addEventListener('load') ici
    // car __runApp() s'exécute après un fetch Supabase asynchrone —
    // l'événement 'load' est donc déjà passé quand on arrive ici.
    // On déclenche directement les timeouts.
    (function revealCinemaLoader() {
      const cinemaLoader = document.getElementById('cinemaLoader');
      if (!cinemaLoader) return;
      setTimeout(() => cinemaLoader.classList.add('reveal'), 300);
      setTimeout(() => cinemaLoader.classList.add('hidden'), 1700);
    })();

    // ============================================
    // GALERIE
    // ============================================
    const CLOUD_NAME = WEDDING_CONFIG.cloudName;
    const ROOT_FOLDER = WEDDING_CONFIG.rootFolder;
    const CATEGORIES_CONFIG = WEDDING_CONFIG.categories;

    const galleryGrid = document.getElementById('galleryGrid');
    const filterContainer = document.getElementById('filterContainer');
    const loader = document.getElementById('loader');
    const scrollTopBtn = document.getElementById('scrollTop');
    const filterBar = document.getElementById('filterContainer');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCounter = document.getElementById('lightboxCounter');
    const lightboxProgress = document.getElementById('lightboxProgress');
    const lbDownload = document.getElementById('lbDownload');
    const swipeHint = document.getElementById('swipeHint');

    let currentFilteredImages = [];
    let currentLightboxIndex = 0;
    let hasSeenSwipeHint = false;

    // GALLERY_DATA : structure unifiée alimentée soit par l'Edge Function
    // (mode dynamique, recommandé — zéro numérotation), soit par l'ancien
    // système numéroté (fallback de compatibilité).
    //   [{ folder, name, count, images: [{ publicId|baseFilename }] }]
    let GALLERY_DATA = [];

    // Legacy : ancien format de nom de fichier ("01.jpg", "012.jpg"…)
    const formatNumber = (n) => "0" + n;
    const showLoader = () => loader.classList.remove('hidden');
    const hideLoader = () => loader.classList.add('hidden');

    // --- Scroll indicators ---
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      if (y > 500) scrollTopBtn.classList.add('visible');
      else scrollTopBtn.classList.remove('visible');
      if (y > 4) filterBar.classList.add('scrolled');
      else filterBar.classList.remove('scrolled');
    }, { passive: true });

    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // --- Lazy loading ---
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          loadImage(entry.target);
          io.unobserve(entry.target);
        }
      });
    }, { rootMargin: '400px 0px', threshold: 0.01 });

    // --- Init : récupère la liste réelle des photos (Edge Function) ---
    async function initGallery() {
      showLoader();
      try {
        await loadGalleryFromCloudinary();   // mode dynamique
      } catch (e) {
        console.warn('[galerie] Edge Function indisponible, fallback legacy :', e);
        loadGalleryLegacy();                  // ancien mode numéroté
      }

      if (!GALLERY_DATA.length || GALLERY_DATA.every(c => c.count === 0)) {
        galleryGrid.innerHTML = '<div class="empty-state">Galerie en cours de préparation</div>';
        hideLoader();
        return;
      }

      const totalCount = GALLERY_DATA.reduce((s, c) => s + c.count, 0);
      
      // Décide d'afficher les filtres selon : 
      // - Mode galerie (categorized vs flat)
      // - Nombre de catégories (plusieurs catégories = besoin de filtres)
      const galleryMode = WEDDING_CONFIG.galleryMode || 'categorized';
      const hasMultipleCats = GALLERY_DATA.length > 1
        || (GALLERY_DATA[0] && GALLERY_DATA[0].folder !== '_racine_');
      const showFilters = galleryMode === 'categorized' && hasMultipleCats;

      if (showFilters) {
        createFilterButton("Tout voir", "all", true, totalCount);
        GALLERY_DATA.forEach(cat => {
          if (cat.count > 0) createFilterButton(cat.name, cat.folder, false, cat.count);
        });
      } else {
        filterContainer.style.display = 'none';
      }
      generateImages('all');
    }

    // ── Mode DYNAMIQUE : appelle l'Edge Function Supabase ──────────────
    // Plus aucune numérotation ni comptage. La fonction renvoie la liste
    // exacte des photos depuis Cloudinary (clé secrète gardée côté serveur).
    async function loadGalleryFromCloudinary() {
      const code = sessionStorage.getItem('access_granted');
      const base = (window.SUPABASE_URL || '').replace(/\/+$/, '');
      if (!code || !base) throw new Error('Contexte Supabase manquant');

      const resp = await fetch(base + '/functions/v1/list-gallery', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': window.SUPABASE_ANON_KEY || '',
          'Authorization': 'Bearer ' + (window.SUPABASE_ANON_KEY || ''),
        },
        body: JSON.stringify({ code }),
      });

      if (!resp.ok) throw new Error('list-gallery HTTP ' + resp.status);
      const data = await resp.json();
      if (!data || !Array.isArray(data.categories)) throw new Error('Réponse invalide');

      // Curation optionnelle : si l'admin a défini un ordre/des noms
      // dans cfg.categories, on les respecte ; sinon ordre auto.
      const cfgCats = Array.isArray(WEDDING_CONFIG.categories) ? WEDDING_CONFIG.categories : [];
      const apiByFolder = new Map(data.categories.map(c => [c.folder, c]));

      let ordered = [];
      if (cfgCats.length) {
        cfgCats.forEach(cc => {
          const api = apiByFolder.get(cc.folder);
          if (api && api.count > 0) {
            ordered.push({ folder: cc.folder, name: cc.name || api.name, count: api.count, images: api.images });
            apiByFolder.delete(cc.folder);
          }
        });
        // Dossiers détectés non listés dans la config → ajoutés à la fin
        apiByFolder.forEach(api => { if (api.count > 0) ordered.push(api); });
      } else {
        ordered = data.categories.filter(c => c.count > 0);
      }

      GALLERY_DATA = ordered.map(c => ({
        folder: c.folder,
        name: c.name,
        count: c.count,
        images: c.images.map(img => ({ publicId: img.publicId, w: img.width, h: img.height })),
      }));
    }

    // ── Mode LEGACY : compatibilité anciens clients (fichiers numérotés) ─
    function loadGalleryLegacy() {
      const cats = Array.isArray(CATEGORIES_CONFIG) ? CATEGORIES_CONFIG : [];
      GALLERY_DATA = cats
        .filter(c => c.count > 0)
        .map(c => ({
          folder: c.folder,
          name: c.name,
          count: c.count,
          images: Array.from({ length: c.count }, (_, i) => ({
            baseFilename: formatNumber(i + 1),
          })),
        }));
    }

    function createFilterButton(name, filterId, isActive, count) {
      const btn = document.createElement('button');
      btn.className = `filter-btn ${isActive ? 'active' : ''}`;
      btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      btn.innerHTML = `${name}<span class="count">${count}</span>`;
      btn.onclick = () => {
        if (btn.classList.contains('active')) return;
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        switchCategory(filterId);
      };
      filterContainer.appendChild(btn);
    }

    function switchCategory(filterId) {
      showLoader();
      galleryGrid.classList.add('fade-out');

      const galleryTop = document.querySelector('.gallery-container').offsetTop - 80;
      if (window.scrollY > galleryTop) {
        window.scrollTo({ top: galleryTop, behavior: 'smooth' });
      }

      setTimeout(() => {
        generateImages(filterId);
        requestAnimationFrame(() => {
          galleryGrid.classList.remove('fade-out');
        });
      }, 350);
    }

    function generateImages(filterId) {
      galleryGrid.innerHTML = '';
      currentFilteredImages = [];

      const categories = filterId === 'all'
        ? GALLERY_DATA
        : GALLERY_DATA.filter(c => c.folder === filterId);

      const totalToLoad = categories.reduce((sum, c) => sum + c.count, 0);

      if (totalToLoad === 0) {
        galleryGrid.innerHTML = '<div class="empty-state">Aucune photo dans cette catégorie</div>';
        hideLoader();
        return;
      }

      categories.forEach(cat => {
        cat.images.forEach((img, idx) => {
          // imagePath : soit le public_id renvoyé par Cloudinary (mode
          // dynamique, ZÉRO numérotation), soit l'ancien chemin numéroté.
          const imagePath = img.publicId
            ? img.publicId
            : `${ROOT_FOLDER}/${cat.folder}/${img.baseFilename}`;

          const hdUrl    = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto:best,f_auto/${imagePath}`;
          const gridUrl  = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/c_scale,w_900,q_auto:good,f_auto/${imagePath}`;
          const thumbUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/c_scale,w_40,e_blur:800,q_auto:low,f_auto/${imagePath}`;

          const niceName = (img.publicId
            ? img.publicId.split('/').pop()
            : `${cat.name}-${img.baseFilename}`) + '.jpg';

          const imageData = {
            hdUrl, gridUrl, thumbUrl,
            fileName: niceName,
            category: cat.name,
            folder: cat.folder,
            w: img.w || null, h: img.h || null,
          };
          currentFilteredImages.push(imageData);
          const localIndex = currentFilteredImages.length - 1;

          const item = document.createElement('div');
          item.className = 'photo-item';
          item.setAttribute('role', 'listitem');
          item.setAttribute('tabindex', '0');
          item.setAttribute('aria-label', `Photo ${cat.name} ${idx + 1}, ouvrir en grand`);
          item.dataset.index = localIndex;
          item.dataset.gridUrl = gridUrl;
          item.dataset.thumbUrl = thumbUrl;
          item.dataset.alt = `${cat.name} - ${WEDDING_CONFIG.couple}`;
          item.dataset.folder = cat.folder;

          const layout = galleryGrid.getAttribute('data-layout') || 'masonry';
          // En mode masonry : si Cloudinary a renvoyé les dimensions, on
          // pré-calcule le ratio exact (zéro saut de mise en page).
          if (layout === 'masonry') {
            const defaultRowHeight = window.innerWidth <= 640 ? 180 : (window.innerWidth <= 1100 ? 240 : 300);
            if (img.w && img.h) {
              item.style.width = (defaultRowHeight * (img.w / img.h)) + 'px';
              item.style.aspectRatio = `${img.w} / ${img.h}`;
            } else {
              item.style.width = (defaultRowHeight * 1.5) + 'px';
              item.style.aspectRatio = '3 / 2';
            }
          }

          const aspect = document.createElement('span');
          aspect.className = 'aspect';
          item.appendChild(aspect);

          const overlay = document.createElement('div');
          overlay.className = 'photo-overlay';
          const dlLink = document.createElement('a');
          dlLink.className = 'icon-dl';
          dlLink.href = hdUrl;
          dlLink.setAttribute('download', imageData.fileName);
          dlLink.title = 'Télécharger';
          dlLink.setAttribute('aria-label', 'Télécharger cette photo');
          dlLink.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
          dlLink.addEventListener('click', e => e.stopPropagation());
          overlay.appendChild(dlLink);
          item.appendChild(overlay);

          item.addEventListener('click', () => openLightbox(parseInt(item.dataset.index)));
          item.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openLightbox(parseInt(item.dataset.index));
            }
          });

          galleryGrid.appendChild(item);
          io.observe(item);
        });
      });

      setTimeout(hideLoader, 400);
    }

    function loadImage(item) {
      const gridUrl = item.dataset.gridUrl;
      const thumbUrl = item.dataset.thumbUrl;
      const alt = item.dataset.alt;

      const img = document.createElement('img');
      img.alt = alt;
      img.loading = 'lazy';
      img.decoding = 'async';
      img.src = thumbUrl;
      item.appendChild(img);

      img.onload = () => {
        item.classList.add('loaded');
        const hd = new Image();
        hd.src = gridUrl;
        hd.onload = () => {
          img.src = gridUrl;
          img.classList.add('img-loaded');
          if (hd.naturalWidth && hd.naturalHeight) {
            const layout = galleryGrid.getAttribute('data-layout') || 'masonry';
            if (layout === 'masonry') {
              // Largeur calculée à partir du ratio réel de l'image et
              // de la hauteur de rangée actuelle (différente selon breakpoint).
              const rowHeight = parseInt(getComputedStyle(item).height) || 300;
              const ratio = hd.naturalWidth / hd.naturalHeight;
              const computedWidth = rowHeight * ratio;
              item.style.width = computedWidth + 'px';
              item.style.aspectRatio = `${hd.naturalWidth} / ${hd.naturalHeight}`;
            }
            item.classList.add('img-ready');
          }
        };
        hd.onerror = () => img.classList.add('img-loaded');
      };

      img.onerror = () => { item.style.display = 'none'; };
    }

    // ============================================
    // LIGHTBOX
    // ============================================
    function openLightbox(index) {
      currentLightboxIndex = index;
      updateLightboxImage(true);
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';

      if (!hasSeenSwipeHint && window.innerWidth <= 640) {
        swipeHint.classList.add('show');
        hasSeenSwipeHint = true;
        setTimeout(() => swipeHint.classList.remove('show'), 2900);
      }
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      resetZoom(false);
    }

    function changeImage(direction) {
      const total = currentFilteredImages.length;
      if (total === 0) return;
      if (scale > 1.02) resetZoom(false);

      lightboxImg.classList.add(direction > 0 ? 'slide-out-left' : 'slide-out-right');

      setTimeout(() => {
        currentLightboxIndex += direction;
        if (currentLightboxIndex < 0) currentLightboxIndex = total - 1;
        if (currentLightboxIndex >= total) currentLightboxIndex = 0;
        updateLightboxImage(false);
        lightboxImg.classList.remove('slide-out-left', 'slide-out-right');
      }, 180);
    }

    function updateLightboxImage(instant) {
      const data = currentFilteredImages[currentLightboxIndex];
      if (!data) return;
      resetZoom(false);

      lightboxImg.src = data.thumbUrl;
      lightboxImg.alt = `${data.category} — ${WEDDING_CONFIG.couple}`;

      const hd = new Image();
      hd.src = data.hdUrl;
      hd.onload = () => {
        if (currentFilteredImages[currentLightboxIndex] === data) {
          lightboxImg.src = data.hdUrl;
        }
      };

      lbDownload.href = data.hdUrl;
      lbDownload.setAttribute('download', data.fileName);

      lightboxCounter.textContent = `${currentLightboxIndex + 1} / ${currentFilteredImages.length}`;

      const progress = ((currentLightboxIndex + 1) / currentFilteredImages.length) * 100;
      lightboxProgress.style.width = progress + '%';

      preloadAdjacentImages();
    }

    function preloadAdjacentImages() {
      const total = currentFilteredImages.length;
      if (total <= 1) return;
      const nextIndex = (currentLightboxIndex + 1) % total;
      const prevIndex = (currentLightboxIndex - 1 + total) % total;
      [nextIndex, prevIndex].forEach(i => {
        const img = new Image();
        img.src = currentFilteredImages[i].hdUrl;
      });
    }

    // ============================================
    // ZOOM & PAN (souris, molette, double-clic, pinch)
    // ============================================
    const MIN_ZOOM = 1;
    const MAX_ZOOM = 5;
    const zoomIndicator = document.getElementById('zoomIndicator');

    let scale = 1;
    let translateX = 0;
    let translateY = 0;

    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragStartTx = 0, dragStartTy = 0;

    let activeTouches = [];
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let pinchCenter = { x: 0, y: 0 };
    let touchStartTx = 0, touchStartTy = 0;
    let swipeStartX = 0, swipeStartY = 0;
    let swipeStartTime = 0;
    let lastTapTime = 0;

    function applyTransform(withTransition = false) {
      lightboxImg.style.transition = withTransition ? 'transform 0.3s var(--ease-cinema)' : 'none';
      lightboxImg.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
    }

    function showZoomIndicator() {
      zoomIndicator.textContent = Math.round(scale * 100) + '%';
      zoomIndicator.classList.add('show');
      clearTimeout(zoomIndicator._timer);
      zoomIndicator._timer = setTimeout(() => zoomIndicator.classList.remove('show'), 900);
    }

    function resetZoom(animated = true) {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform(animated);
      lightboxImg.classList.remove('zoomed', 'dragging', 'panning');
    }

    function clampTranslation() {
      if (scale <= 1) { translateX = 0; translateY = 0; return; }
      const imgWidth = lightboxImg.offsetWidth * scale;
      const imgHeight = lightboxImg.offsetHeight * scale;
      const maxX = Math.max(0, (imgWidth - window.innerWidth) / 2 + 40);
      const maxY = Math.max(0, (imgHeight - window.innerHeight) / 2 + 40);
      translateX = Math.max(-maxX, Math.min(maxX, translateX));
      translateY = Math.max(-maxY, Math.min(maxY, translateY));
    }

    function zoomAt(newScale, centerX, centerY) {
      newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newScale));
      if (newScale === scale) return;

      const rect = lightboxImg.getBoundingClientRect();
      const imgCenterX = rect.left + rect.width / 2;
      const imgCenterY = rect.top + rect.height / 2;
      const offsetX = (centerX - imgCenterX - translateX) / scale;
      const offsetY = (centerY - imgCenterY - translateY) / scale;

      translateX = centerX - imgCenterX - offsetX * newScale;
      translateY = centerY - imgCenterY - offsetY * newScale;

      scale = newScale;
      clampTranslation();

      if (scale > 1.02) {
        lightboxImg.classList.add('zoomed');
      } else {
        lightboxImg.classList.remove('zoomed');
        translateX = 0;
        translateY = 0;
      }

      applyTransform(true);
      showZoomIndicator();
    }

    lightbox.addEventListener('wheel', (e) => {
      if (!lightbox.classList.contains('active')) return;
      e.preventDefault();
      const delta = -e.deltaY * 0.005;
      zoomAt(scale * (1 + delta), e.clientX, e.clientY);
    }, { passive: false });

    lightboxImg.addEventListener('dblclick', (e) => {
      e.preventDefault();
      if (scale > 1.02) resetZoom(true);
      else zoomAt(2.5, e.clientX, e.clientY);
    });

    lightboxImg.addEventListener('mousedown', (e) => {
      if (scale <= 1.02) return;
      e.preventDefault();
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragStartTx = translateX;
      dragStartTy = translateY;
      lightboxImg.classList.add('dragging');
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = dragStartTx + (e.clientX - dragStartX);
      translateY = dragStartTy + (e.clientY - dragStartY);
      clampTranslation();
      applyTransform(false);
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        lightboxImg.classList.remove('dragging');
        applyTransform(true);
      }
    });

    // --- Tactile ---
    function getTouchDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchCenter(touches) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }

    lightbox.addEventListener('touchstart', (e) => {
      activeTouches = Array.from(e.touches);

      if (activeTouches.length === 2) {
        e.preventDefault();
        pinchStartDist = getTouchDistance(activeTouches);
        pinchStartScale = scale;
        pinchCenter = getTouchCenter(activeTouches);
        touchStartTx = translateX;
        touchStartTy = translateY;
        lightboxImg.classList.add('panning');
      } else if (activeTouches.length === 1) {
        const t = activeTouches[0];
        const now = Date.now();
        if (now - lastTapTime < 300) {
          e.preventDefault();
          if (scale > 1.02) resetZoom(true);
          else zoomAt(2.5, t.clientX, t.clientY);
          lastTapTime = 0;
          return;
        }
        lastTapTime = now;

        swipeStartX = t.clientX;
        swipeStartY = t.clientY;
        swipeStartTime = now;

        if (scale > 1.02) {
          dragStartX = t.clientX;
          dragStartY = t.clientY;
          dragStartTx = translateX;
          dragStartTy = translateY;
          isDragging = true;
          lightboxImg.classList.add('dragging');
        }
      }
    }, { passive: false });

    lightbox.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dist = getTouchDistance(Array.from(e.touches));
        const newScale = pinchStartScale * (dist / pinchStartDist);
        const center = getTouchCenter(Array.from(e.touches));
        const clamped = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newScale));
        scale = clamped;

        const rect = lightboxImg.getBoundingClientRect();
        const imgCenterX = rect.left + rect.width / 2 - translateX;
        const imgCenterY = rect.top + rect.height / 2 - translateY;

        translateX = center.x - imgCenterX - (pinchCenter.x - imgCenterX) * (scale / pinchStartScale) + touchStartTx * (scale / pinchStartScale);
        translateY = center.y - imgCenterY - (pinchCenter.y - imgCenterY) * (scale / pinchStartScale) + touchStartTy * (scale / pinchStartScale);

        if (scale > 1.02) lightboxImg.classList.add('zoomed');
        clampTranslation();
        applyTransform(false);
      } else if (e.touches.length === 1 && isDragging && scale > 1.02) {
        e.preventDefault();
        const t = e.touches[0];
        translateX = dragStartTx + (t.clientX - dragStartX);
        translateY = dragStartTy + (t.clientY - dragStartY);
        clampTranslation();
        applyTransform(false);
      }
    }, { passive: false });

    lightbox.addEventListener('touchend', (e) => {
      const wasPinching = activeTouches.length === 2;
      activeTouches = Array.from(e.touches);

      if (wasPinching) {
        lightboxImg.classList.remove('panning');
        if (scale < 1.05) resetZoom(true);
        else { showZoomIndicator(); applyTransform(true); }
        return;
      }

      if (isDragging) {
        isDragging = false;
        lightboxImg.classList.remove('dragging');
        applyTransform(true);
        return;
      }

      if (scale <= 1.02 && e.changedTouches.length > 0) {
        const t = e.changedTouches[0];
        const dx = t.clientX - swipeStartX;
        const dy = t.clientY - swipeStartY;
        const duration = Date.now() - swipeStartTime;

        if (Math.abs(dy) > Math.abs(dx) && dy > 80 && duration < 500) {
          closeLightbox();
          return;
        }
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
          if (dx < 0) changeImage(1);
          else changeImage(-1);
        }
      }
    }, { passive: true });

    // --- Clavier ---
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') {
        if (scale > 1.02) resetZoom(true);
        else closeLightbox();
      }
      else if (e.key === 'ArrowLeft') changeImage(-1);
      else if (e.key === 'ArrowRight') changeImage(1);
      else if (e.key === 'Home') { currentLightboxIndex = 0; updateLightboxImage(true); }
      else if (e.key === 'End') { currentLightboxIndex = currentFilteredImages.length - 1; updateLightboxImage(true); }
      else if (e.key === '0') resetZoom(true);
      else if (e.key === '+' || e.key === '=') {
        zoomAt(scale * 1.25, window.innerWidth / 2, window.innerHeight / 2);
      }
      else if (e.key === '-' || e.key === '_') {
        zoomAt(scale * 0.8, window.innerWidth / 2, window.innerHeight / 2);
      }
    });

    lightbox.addEventListener('click', (e) => {
      if (scale > 1.02) return;
      if (e.target === lightbox || e.target.classList.contains('lightbox-stage')) {
        closeLightbox();
      }
    });

    document.addEventListener('contextmenu', (e) => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });

    // --- Boot ---
    initGallery().catch(err => {
      console.error('[galerie] échec initialisation :', err);
      hideLoader();
      galleryGrid.innerHTML = '<div class="empty-state">Galerie momentanément indisponible</div>';
    });

    // Expose pour les onclick HTML
    window.closeLightbox = closeLightbox;
    window.changeImage = changeImage;
  } // fin __runApp

  // Si la config est déjà prête, on lance ; sinon on attend l'événement
  if (window.WEDDING_CONFIG) __runApp();
  else window.addEventListener('config-ready', __runApp);
  </script>

</body>
