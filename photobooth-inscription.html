<!DOCTYPE html>
<html lang="fr" data-theme="noir">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Inscription au photobooth — TimelessHouse" />
  <title>Inscription photobooth — TimelessHouse</title>
  <link rel="icon" type="image/png" href="/favicon-th.png?v=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #0a0a0a; --bg-deep: #050505; --bg-elev: #131312;
      --ink: #f4f0eb; --ink-soft: #a39c8f; --ink-dim: #5a554b;
      --accent: #b08968; --accent-gl: rgba(176,137,104,0.14);
      --line: rgba(244,240,235,0.10);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    [data-theme="creme"] { --bg:#f3eee7; --bg-deep:#ece5db; --bg-elev:#e9e2d8;
      --ink:#1a1714; --ink-soft:#6b6560; --ink-dim:#a39d95;
      --accent:#8b6a48; --accent-gl:rgba(139,106,72,0.12); --line:rgba(26,23,20,0.10); }
    [data-theme="ardoise"] { --bg:#13161c; --bg-deep:#0d1014; --bg-elev:#1a1e26;
      --ink:#e8eaef; --ink-soft:#828a98; --ink-dim:#4a505a;
      --accent:#7fa0bd; --accent-gl:rgba(127,160,189,0.15); --line:rgba(232,234,239,0.09); }
    [data-theme="fumee"] { --bg:#1a1714; --bg-deep:#131110; --bg-elev:#221e1a;
      --ink:#ece5da; --ink-soft:#9c9286; --ink-dim:#5d5549;
      --accent:#b1916f; --accent-gl:rgba(177,145,111,0.13); --line:rgba(236,229,218,0.09); }
    [data-theme="encre"] { --bg:#0d0f14; --bg-deep:#090a0e; --bg-elev:#161922;
      --ink:#e6e8ee; --ink-soft:#8b909e; --ink-dim:#4d525e;
      --accent:#8a93a6; --accent-gl:rgba(138,147,166,0.14); --line:rgba(230,232,238,0.09); }
    [data-theme="sapin"] { --bg:#0c0f0d; --bg-deep:#080a09; --bg-elev:#141813;
      --ink:#e7ebe4; --ink-soft:#8a9387; --ink-dim:#4e564b;
      --accent:#8a9c84; --accent-gl:rgba(138,156,132,0.13); --line:rgba(231,235,228,0.08); }
    [data-theme="lin"] { --bg:#f1ece3; --bg-deep:#e9e2d6; --bg-elev:#eae3d7;
      --ink:#2b2620; --ink-soft:#7a7164; --ink-dim:#a89e8d;
      --accent:#8a7458; --accent-gl:rgba(138,116,88,0.12); --line:rgba(43,38,32,0.10); }
    [data-theme="sauge"] { --bg:#e8ebe4; --bg-deep:#dfe3d9; --bg-elev:#e0e4da;
      --ink:#242821; --ink-soft:#6f766a; --ink-dim:#9aa090;
      --accent:#6e7d63; --accent-gl:rgba(110,125,99,0.12); --line:rgba(36,40,33,0.10); }
    [data-theme="brume"] { --bg:#e9ebee; --bg-deep:#e0e3e7; --bg-elev:#e2e5e9;
      --ink:#21252b; --ink-soft:#6c7480; --ink-dim:#97a0ac;
      --accent:#6b7785; --accent-gl:rgba(107,119,133,0.12); --line:rgba(33,37,43,0.10); }
    [data-theme="bordeaux"] { --bg:#45100f; --bg-deep:#2c0a0a; --bg-elev:#531818;
      --ink:#f3e7e0; --ink-soft:#b89a90; --ink-dim:#7a5953;
      --accent:#d2b48c; --accent-gl:rgba(210,180,140,0.16); --line:rgba(243,231,224,0.10); }
    [data-theme="acajou"] { --bg:#2a1812; --bg-deep:#1a0f0b; --bg-elev:#3a241b;
      --ink:#efe4d9; --ink-soft:#b59a88; --ink-dim:#745b4b;
      --accent:#c98a5e; --accent-gl:rgba(201,138,94,0.15); --line:rgba(239,228,217,0.09); }
    [data-theme="foret"] { --bg:#0e2118; --bg-deep:#07140e; --bg-elev:#173025;
      --ink:#e7efe7; --ink-soft:#8fa596; --ink-dim:#4f6356;
      --accent:#c2a878; --accent-gl:rgba(194,168,120,0.15); --line:rgba(231,239,231,0.08); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Jost", sans-serif; font-weight: 300;
      background: var(--bg); color: var(--ink);
      min-height: 100svh; -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }
    ::selection { background: var(--accent); color: var(--bg); }
    :focus-visible { outline: 1px solid var(--accent); outline-offset: 3px; }

    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 3;
      opacity: 0.035; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }
    .boot {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg-deep);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 0.8s var(--ease), visibility 0.8s var(--ease);
    }
    .boot.gone { opacity: 0; visibility: hidden; pointer-events: none; }
    .boot-mark {
      font-family: "Cormorant Garamond", serif; font-style: italic;
      font-size: 1.7rem; color: var(--accent); letter-spacing: 0.06em;
    }
    .boot-mark span { color: var(--ink-dim); }

    .wrap { max-width: 30rem; margin: 0 auto; padding: clamp(28px, 6vh, 64px) 20px 60px; }
    .kicker {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.4em;
      color: var(--ink-soft); margin-bottom: 16px;
    }
    h1 {
      font-family: "Cormorant Garamond", serif; font-weight: 300; font-style: italic;
      font-size: clamp(2rem, 8vw, 2.9rem); line-height: 1.05; margin-bottom: 10px;
    }
    .lead { font-size: 14px; color: var(--ink-soft); line-height: 1.65; margin-bottom: 28px; }

    label { display: block; margin: 18px 0 0; font-size: 11.5px;
      text-transform: uppercase; letter-spacing: 0.22em; color: var(--ink-soft); }
    input[type="text"], input[type="email"] {
      width: 100%; margin-top: 8px; padding: 13px 2px; font: inherit; font-size: 16px;
      background: none; border: none; border-bottom: 1px solid var(--line);
      color: var(--ink); transition: border-color 0.3s;
    }
    input:focus { outline: none; border-bottom-color: var(--accent); }

    .selfie-zone {
      margin-top: 10px; border: 1px dashed var(--line); border-radius: 4px;
      padding: 18px; text-align: center; cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
    }
    .selfie-zone:hover { border-color: var(--accent); background: var(--accent-gl); }
    .selfie-zone input { position: absolute; opacity: 0; width: 0; height: 0; }
    .selfie-zone .ph-icon { font-size: 22px; display: block; margin-bottom: 6px; color: var(--accent); }
    .selfie-zone .txt { font-size: 12.5px; color: var(--ink-soft); }
    .selfie-zone img { max-width: 120px; border-radius: 4px; display: block; margin: 0 auto 8px; }

    .consent { display: flex; gap: 10px; align-items: flex-start;
      margin-top: 20px; font-size: 12.5px; color: var(--ink-soft); line-height: 1.6;
      text-transform: none; letter-spacing: 0; }
    .consent input { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--accent); }
    .consent a { color: var(--accent); }

    button.submit {
      margin-top: 28px; width: 100%; padding: 16px; cursor: pointer;
      background: none; border: 1px solid var(--accent); color: var(--accent);
      font-family: "Jost", sans-serif; font-size: 11px;
      letter-spacing: 0.28em; text-transform: uppercase;
      transition: background 0.3s, color 0.3s, opacity 0.3s;
    }
    button.submit:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
    button.submit:active:not(:disabled) { transform: scale(0.98); }
    button.submit:disabled { opacity: 0.55; cursor: wait; }

    .err {
      margin-top: 18px; padding: 13px 15px; font-size: 13px; line-height: 1.6;
      border: 1px solid rgba(220,120,90,0.4); color: var(--ink);
      background: rgba(220,120,90,0.08); display: none;
    }
    .err.on { display: block; }

    .alt-hint { margin-top: 26px; font-size: 12px; color: var(--ink-soft); line-height: 1.7; }

    /* Écrans d'état (succès, lien mort…) */
    .state { text-align: center; padding-top: clamp(30px, 8vh, 80px); }
    .state .ln { width: 1px; height: 52px; background: var(--accent); opacity: 0.5; margin: 0 auto 26px; }
    .state h1 { margin-bottom: 14px; }
    .state p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.7;
      margin-bottom: 18px; }
    .state .link-box {
      margin: 22px 0; padding: 14px; border: 1px solid var(--line);
      font-size: 12px; color: var(--ink-soft); word-break: break-all;
    }
    .state a.btn, .state button.btn {
      display: inline-block; margin: 4px 6px; padding: 13px 26px; cursor: pointer;
      background: none; border: 1px solid var(--accent); color: var(--accent);
      font-family: "Jost", sans-serif; font-size: 10.5px; letter-spacing: 0.24em;
      text-transform: uppercase; text-decoration: none; transition: background 0.3s, color 0.3s;
    }
    .state a.btn:hover, .state button.btn:hover { background: var(--accent); color: var(--bg); }
    .state .note { font-size: 12px; color: var(--ink-soft); line-height: 1.7; margin-top: 26px; }

    footer { margin-top: 60px; text-align: center; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.3em; color: var(--ink-soft); }
    footer a { color: var(--accent); text-decoration: none; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="boot" id="boot"><div class="boot-mark">TimelessHouse<span>.</span></div></div>

  <div class="wrap"><div id="app"></div>
    <footer>Photobooth par <a href="https://timelesshouse.org">TimelessHouse</a></footer>
  </div>

  <script type="module">
    import { createClient } from '@supabase/supabase-js';

    const sb = createClient(
      import.meta.env.VITE_SUPABASE_URL,
      import.meta.env.VITE_SUPABASE_ANON_KEY
    );

    const app = document.getElementById('app');
    const boot = document.getElementById('boot');
    const eventCode = new URLSearchParams(location.search).get('e');

    const LIGHT = new Set(['creme', 'lin', 'sauge', 'brume']);
    const THEMES = new Set(['noir','creme','ardoise','fumee','encre','sapin',
                            'lin','sauge','brume','bordeaux','acajou','foret']);
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g,
      (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function stateScreen(title, body, extra = '') {
      boot.classList.add('gone');
      app.innerHTML = `<div class="state"><div class="ln"></div>
        <p class="kicker">Photobooth</p>
        <h1>${title}</h1><p>${body}</p>${extra}</div>`;
    }

    /* ── Réduction du selfie côté téléphone : ~200 Ko envoyés, pas 5 Mo.
       Le canvas ré-encode aussi les HEIC iPhone en JPEG universel. ── */
    let selfieB64 = null;
    async function shrink(file) {
      const bitmap = await createImageBitmap(file).catch(() => null);
      if (!bitmap) throw new Error('unreadable');
      const MAX = 1280;
      const scale = Math.min(1, MAX / Math.max(bitmap.width, bitmap.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(bitmap.width * scale);
      canvas.height = Math.round(bitmap.height * scale);
      canvas.getContext('2d').drawImage(bitmap, 0, 0, canvas.width, canvas.height);
      let dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      if (dataUrl.length > 700000) dataUrl = canvas.toDataURL('image/jpeg', 0.68);
      return dataUrl;
    }

    function renderForm(cfg) {
      const eventName = cfg.event_name || 'La soirée';
      app.innerHTML = `
        <p class="kicker">Photobooth — Inscription</p>
        <h1>${esc(eventName)}</h1>
        <p class="lead">Inscris-toi : chaque photo où tu apparais rejoindra ta
          galerie privée, et tu recevras le lien par email.</p>

        <form id="f" novalidate>
          <label>Prénom
            <input type="text" name="first_name" maxlength="80" autocomplete="given-name" required>
          </label>
          <label>Email
            <input type="email" name="email" maxlength="200" autocomplete="email" required>
          </label>
          <label style="margin-bottom:8px">Selfie de référence</label>
          <label class="selfie-zone" id="zone">
            <input type="file" name="selfie" accept="image/*">
            <span id="zone-inner">
              <span class="ph-icon">◉</span>
              <span class="txt">Prends un selfie — bien éclairé, de face, seul</span>
            </span>
          </label>

          <label class="consent">
            <input type="checkbox" name="consent" required>
            <span>J'accepte que mon selfie serve uniquement à retrouver mes photos.
            Il transite par un serveur sécurisé le temps du traitement
            (quelques minutes), y est supprimé, puis reste sur l'ordinateur du
            studio jusqu'à sa suppression après l'événement.
            <a href="https://timelesshouse.org/confidentialite" target="_blank"
               rel="noopener">Politique de confidentialité</a></span>
          </label>
          <label class="consent">
            <input type="checkbox" name="marketing">
            <span>Je souhaite recevoir les actualités et offres de TimelessHouse
            (facultatif).</span>
          </label>

          <div class="err" id="err"></div>
          <button type="submit" class="submit" id="go">M'inscrire</button>
        </form>

        <p class="alt-hint">Pas de réseau ici&nbsp;? La tablette à l'entrée du
        studio fait exactement la même chose, sans internet.</p>
      `;

      const form = document.getElementById('f');
      const zone = document.getElementById('zone');
      const err = document.getElementById('err');
      const go = document.getElementById('go');

      zone.querySelector('input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const inner = document.getElementById('zone-inner');
        inner.innerHTML = '<span class="txt">Préparation de la photo…</span>';
        try {
          const dataUrl = await shrink(file);
          selfieB64 = dataUrl.split(',')[1];
          inner.innerHTML = `<img src="${dataUrl}" alt="Ton selfie">
            <span class="txt">Parfait — touche pour changer</span>`;
        } catch (e2) {
          selfieB64 = null;
          inner.innerHTML = `<span class="ph-icon">◉</span>
            <span class="txt">Photo illisible — réessaie avec l'appareil photo</span>`;
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.classList.remove('on');
        const firstName = form.first_name.value.trim();
        const email = form.email.value.trim().toLowerCase();

        const fail = (msg) => { err.textContent = msg; err.classList.add('on'); };
        if (!firstName) return fail('Ton prénom est obligatoire.');
        if (!email.includes('@')) return fail('Une adresse email valide est obligatoire.');
        if (!selfieB64) return fail('Ajoute un selfie pour qu’on puisse retrouver tes photos.');
        if (!form.consent.checked) return fail('Coche la case de consentement pour continuer.');

        go.disabled = true;
        go.textContent = 'Envoi en cours…';
        try {
          const { data, error } = await sb.rpc('photobooth_signup', {
            p_event: eventCode,
            p_first_name: firstName,
            p_email: email,
            p_selfie_b64: selfieB64,
            p_marketing: form.marketing.checked,
          });
          if (error) throw error;
          if (data.error === 'saturated') {
            fail('Les inscriptions en ligne sont saturées — passe à la tablette à l’entrée du studio.');
          } else if (data.error === 'event_unknown') {
            fail('Ce lien d’inscription n’est plus actif.');
          } else if (data.error) {
            fail('Vérifie tes informations et réessaie.');
          } else {
            renderSuccess(firstName, data.token);
            return;
          }
        } catch (e2) {
          console.error(e2);
          fail('Le réseau n’a pas répondu — réessaie, ou utilise la tablette à l’entrée.');
        }
        go.disabled = false;
        go.textContent = "M'inscrire";
      });
    }

    function renderSuccess(firstName, token) {
      const url = 'https://timelesshouse.org/photobooth?g=' + token;
      app.innerHTML = `
        <div class="state">
          <div class="ln"></div>
          <p class="kicker">C'est noté</p>
          <h1>Merci ${esc(firstName)}&nbsp;!</h1>
          <p>Ta reconnaissance sera active <strong>d'ici quelques minutes</strong> —
          ensuite, chaque photo où tu apparais rejoindra ta galerie toute seule.</p>
          <div class="link-box">${esc(url)}</div>
          <a class="btn" href="${esc(url)}">Ouvrir ma galerie</a>
          <button class="btn" id="copy">Copier le lien</button>
          <p class="note">Tu recevras aussi le lien par email dès ta première
          photo — <strong>c'est lui qui fait foi</strong>, garde-le. Si tes photos
          ne semblent pas arriver, réinscris-toi avec le même email : ton selfie
          sera simplement remplacé.</p>
        </div>`;
      document.getElementById('copy').addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(url); } catch (e) {}
        document.getElementById('copy').textContent = 'Copié ✓';
      });
    }

    async function start() {
      if (!eventCode) {
        stateScreen('Lien incomplet.',
          'Ce lien d’inscription ne précise pas l’événement. Scanne le QR '
          + 'code affiché au studio, ou utilise la tablette à l’entrée.');
        return;
      }
      const { data, error } = await sb.rpc('photobooth_event_info', { p_event: eventCode });
      if (error) {
        stateScreen('Petit souci de réseau.', 'Réessaie dans un instant — ou utilise la tablette à l’entrée du studio.');
        return;
      }
      if (!data) {
        stateScreen('Inscriptions fermées.',
          'Ce lien ne correspond à aucun événement en cours. Vérifie le QR code '
          + 'affiché au studio.');
        return;
      }
      const theme = THEMES.has(data.theme) ? data.theme : 'noir';
      document.documentElement.dataset.theme = theme;
      document.documentElement.classList.toggle('is-light', LIGHT.has(theme));
      const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta && bg) meta.setAttribute('content', bg);
      renderForm(data);
      boot.classList.add('gone');
    }

    start();
  </script>
</body>
</html>
