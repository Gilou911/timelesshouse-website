<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Définition d'un nouveau mot de passe (SaaS B.3, brique 8).
       Cible des liens de récupération envoyés par account-recovery :
       supabase-js lit le jeton présent dans l'URL et ouvre une session
       de récupération, puis on appelle updateUser({ password }). -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#e9e4d9" />
  <title>Nouveau mot de passe</title>
  <link rel="icon" href="/favicon-th.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#e9e4d9; --surface:#efeae0; --pressed:#e3ddd0; --ink:#2a2620;
      /* HIG §6 : 4.5:1 mini sous 18 px — #7c756a valait 3.6:1 et #a49b8d 2.2:1 */
      --muted:#635c50; --faint:#6b6357;
      --shadow-d:rgba(168,156,134,0.32); --shadow-l:rgba(255,253,247,0.92);
      --btn-bg:#2a2620; --btn-text:#f5f1e6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#181b20; --surface:#22262d; --pressed:#14171c; --ink:#e8e4dc;
        --muted:#9aa0ab; --faint:#8b93a1;
        --shadow-d:rgba(0,0,0,0.55); --shadow-l:rgba(54,60,72,0.28);
        --btn-bg:#e8e4dc; --btn-text:#181b20;
      }
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; min-height:100dvh; background:var(--bg); color:var(--ink);
      font-family:'Manrope',-apple-system,sans-serif;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:24px; gap:26px;
    }
    .mark { text-align:center; }
    .mark .name { font-family:'Instrument Serif',Georgia,serif; font-style:italic; font-size:clamp(1.8rem,5.5vw,2.2rem); }
    .mark .name span { color:var(--faint); }
    .mark .tag { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-top:8px; font-weight:600; }
    .card {
      width:100%; max-width:420px; background:var(--surface); border-radius:28px; padding:28px 26px;
      box-shadow:10px 10px 24px var(--shadow-d), -10px -10px 24px var(--shadow-l);
    }
    h2 { font-family:'Instrument Serif',Georgia,serif; font-weight:400; font-size:22px; }
    p.hint { font-size:13.5px; line-height:1.6; color:var(--muted); margin-top:6px; }
    label { display:block; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint); font-weight:700; margin:18px 0 8px; }
    input {
      width:100%; min-height:48px; padding:0 18px; border:none; border-radius:999px;
      background:var(--pressed); color:var(--ink); font-size:16px; font-family:inherit; outline:none;
      box-shadow:inset 3px 3px 6px var(--shadow-d), inset -3px -3px 6px var(--shadow-l);
    }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; width:100%;
      min-height:48px; margin-top:20px; border:none; border-radius:999px;
      background:var(--btn-bg); color:var(--btn-text);
      font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; text-decoration:none;
      transition:transform .12s ease;
    }
    .btn:active { transform:scale(.97); }
    .btn[disabled] { opacity:.5; }
    .msg { font-size:13px; line-height:1.55; margin-top:14px; display:none; }
    .msg.err { color:#c2413f; }
    .msg.ok  { color:#3f7d54; }
    footer { font-size:11.5px; color:var(--faint); text-align:center; }
    footer a { color:inherit; }
    /* ── Correctifs HIG vague 1 (P0) — audit du 20/07/2026 ── */
    /* §16 : focus clavier toujours visible (des champs posent outline:none) */
    :focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 3px;
      border-radius: 6px;
    }
    /* §16 : respecter « réduire les animations » */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    /* §4 : les liens de pied de page restent des cibles de 44 px */
    footer a, .legal a {
      display: inline-flex; align-items: center; min-height: 44px; padding: 0 4px;
    }
    /* §3 : contenu hors de l'encoche et de la barre home (iPhone) */
    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>
  <div class="mark">
    <div class="name" id="markName">La Loge<span>.</span></div>
    <div class="tag">Sécurité du compte</div>
  </div>

  <main class="card">
    <h2 id="title">Nouveau mot de passe</h2>
    <p class="hint" id="hint">Vérification du lien…</p>

    <form id="form" style="display:none">
      <label for="pwd">Nouveau mot de passe</label>
      <input type="password" id="pwd" autocomplete="new-password" minlength="8" required placeholder="8 caractères minimum" />
      <label for="pwd2">Confirmation</label>
      <input type="password" id="pwd2" autocomplete="new-password" minlength="8" required placeholder="Retapez le mot de passe" />
      <button class="btn" type="submit" id="btn">Enregistrer</button>
    </form>

    <a class="btn" id="backBtn" href="/communication-admin.html" style="display:none">Retour à la connexion</a>
    <div class="msg" id="msg"></div>
  </main>

  <footer>Un souci&nbsp;? <a href="mailto:service@timelesshouse.org">Écrivez-nous</a>.</footer>

  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const sb = createClient(import.meta.env.VITE_SUPABASE_URL, import.meta.env.VITE_SUPABASE_ANON_KEY);

    const el = (id) => document.getElementById(id);
    const show = (node, on = true) => { node.style.display = on ? '' : 'none'; };
    const say = (text, kind) => { const m = el('msg'); m.textContent = text; m.className = 'msg ' + (kind || ''); show(m); };

    // Marque neutre selon l'hôte (sous-domaine d'agence → son nom)
    const sub = location.hostname.match(/^([a-z0-9-]+)\.laloge\.house$/);
    if (sub && !['www', 'app'].includes(sub[1])) {
      sb.rpc('resolve_agency_brand', { p_slug: sub[1] }).then(({ data }) => {
        if (data?.name) el('markName').innerHTML = `${data.name}<span>.</span>`;
      });
    } else if (/timelesshouse\.org$/.test(location.hostname)) {
      el('markName').innerHTML = 'TimelessHouse<span>.</span>';
    }

    // Le lien de récupération ouvre une session éphémère : supabase-js
    // la détecte dans l'URL au chargement (detectSessionInUrl).
    let ready = false;
    const armer = () => {
      if (ready) return;
      ready = true;
      el('hint').textContent = 'Choisissez un mot de passe pour votre console.';
      show(el('form'));
    };
    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') armer();
    });
    (async () => {
      const { data } = await sb.auth.getSession();
      if (data?.session) return armer();
      setTimeout(async () => {
        const { data: d2 } = await sb.auth.getSession();
        if (d2?.session) return armer();
        el('title').textContent = 'Lien expiré';
        el('hint').textContent = "Ce lien de réinitialisation n'est plus valable (il expire après 1 heure et ne sert qu'une fois).";
        show(el('backBtn'));
      }, 1400);
    })();

    el('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd = el('pwd').value, pwd2 = el('pwd2').value;
      if (pwd.length < 8) return say('Le mot de passe doit faire au moins 8 caractères.', 'err');
      if (pwd !== pwd2) return say('Les deux mots de passe ne correspondent pas.', 'err');
      el('btn').disabled = true; say('Enregistrement…');
      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) { say(error.message || "Impossible d'enregistrer ce mot de passe.", 'err'); el('btn').disabled = false; return; }
      say('Mot de passe enregistré. Redirection vers votre console…', 'ok');
      setTimeout(() => { window.location.href = '/communication-admin.html'; }, 1200);
    });
  </script>
</body>
</html>
